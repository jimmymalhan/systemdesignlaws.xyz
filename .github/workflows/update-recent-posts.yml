name: Update Recent Posts

permissions:
  contents: write

on:
  schedule:
    - cron: '0 12 * * *'  # Daily at noon UTC
  workflow_dispatch:      # Manual trigger from Actions tab

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch Substack feed and update recent-posts.json
        run: |
          curl -s "https://newsletter.systemdesignlaws.xyz/feed" -o feed.xml
          python3 .github/scripts/fetch_recent_posts.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add recent-posts.json
          if git diff --staged --quiet; then
            echo "No changes"
          else
            git commit -m "chore: update recent posts from Substack"
            git push
          fi
