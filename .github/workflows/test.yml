name: CI

on:
  push:
    branches: [main, 'feature/**', 'fix/**']
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run Python tests
        run: python3 -m unittest discover -s tests -v

      - name: Validate recent-posts.json schema (if exists)
        run: |
          if [ -f recent-posts.json ]; then
            python3 -c "import json; d=json.load(open('recent-posts.json')); assert 'posts' in d and all('title' in p and 'url' in p and 'description' in p for p in d['posts'])"
          fi

      - name: Newsletter draft dry-run (if newsletter/ exists)
        run: |
          if [ -d newsletter ] && [ -f newsletter/scripts/create_draft.py ]; then
            pip install -q python-substack 2>/dev/null || true
            python3 newsletter/scripts/create_draft.py --dry-run || echo "Dry-run skipped (no credentials)"
          fi

      - name: Validate index.html structure
        run: |
          grep -q '<div class="recent-list" id="recent-list">' index.html && echo "Recent Issues container OK"
          grep -q 'id="recent-posts-data"' index.html && echo "Inline posts data OK"
          grep -q 'recent-posts.json' index.html && echo "Dynamic fetch OK"
          grep -q 'id="recent-updated"' index.html && echo "Last updated container OK"
          grep -q 'id="subscribe-section"' index.html && echo "Substack email signup section OK"
          grep -q 'newsletter.systemdesignlaws.xyz' index.html && echo "Subscribe links point to newsletter subdomain OK"
          grep -q 'guardrail-issue' index.html && echo "Frontend guardrail fallback OK"

  e2e-website:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Playwright
        run: |
          pip install playwright
          playwright install chromium --with-deps

      - name: Run E2E website tests
        run: python3 -m unittest tests.e2e_website_test -v

  merge:
    name: Auto-merge PR
    runs-on: ubuntu-latest
    needs: [test, e2e-website]
    if: github.event_name == 'pull_request' && github.event.pull_request.state == 'open' && github.base_ref == 'main'
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Merge PR (never delete main)
        run: |
          echo "All checks passed. Merging PR (deletes feature branch only, main is protected)."
          gh pr merge ${{ github.event.pull_request.number }} --merge --delete-branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
