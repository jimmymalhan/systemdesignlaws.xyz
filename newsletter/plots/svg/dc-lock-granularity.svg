<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" style="background:#FFFFFF">
  <text x="450" y="32" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="22" fill="#1B1B1F" font-weight="bold">Lock Granularity: Scope vs Concurrency</text>

  <!-- Table lock -->
  <rect x="30" y="60" width="260" height="175" rx="6" fill="#FFEBEE" stroke="#D32F2F" stroke-width="2"/>
  <text x="160" y="85" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="16" fill="#D32F2F" font-weight="bold">Table Lock</text>

  <rect x="50" y="100" width="220" height="25" rx="3" fill="#FFCDD2" stroke="#D32F2F" stroke-width="1"/>
  <text x="160" y="118" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#D32F2F">Row 1: Alice (LOCKED)</text>
  <rect x="50" y="130" width="220" height="25" rx="3" fill="#FFCDD2" stroke="#D32F2F" stroke-width="1"/>
  <text x="160" y="148" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#D32F2F">Row 2: Bob (LOCKED)</text>
  <rect x="50" y="160" width="220" height="25" rx="3" fill="#FFCDD2" stroke="#D32F2F" stroke-width="1"/>
  <text x="160" y="178" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#D32F2F">Row 3: Carol (LOCKED)</text>

  <text x="160" y="210" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#D32F2F">All rows blocked!</text>
  <text x="160" y="228" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#D32F2F">Kills concurrency</text>

  <!-- Row lock -->
  <rect x="320" y="60" width="260" height="175" rx="6" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
  <text x="450" y="85" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="16" fill="#2E7D32" font-weight="bold">Row Lock</text>

  <rect x="340" y="100" width="220" height="25" rx="3" fill="#C8E6C9" stroke="#2E7D32" stroke-width="1"/>
  <text x="450" y="118" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#2E7D32">Row 1: Alice (LOCKED)</text>
  <rect x="340" y="130" width="220" height="25" rx="3" fill="#FFFFFF" stroke="#1B1B1F" stroke-width="1"/>
  <text x="450" y="148" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#2E7D32">Row 2: Bob (available)</text>
  <rect x="340" y="160" width="220" height="25" rx="3" fill="#FFFFFF" stroke="#1B1B1F" stroke-width="1"/>
  <text x="450" y="178" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#2E7D32">Row 3: Carol (available)</text>

  <text x="450" y="210" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#2E7D32">Only one row blocked</text>
  <text x="450" y="228" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#2E7D32">Max concurrency</text>

  <!-- Advisory lock -->
  <rect x="610" y="60" width="260" height="175" rx="6" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="2"/>
  <text x="740" y="85" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="16" fill="#7B1FA2" font-weight="bold">Advisory Lock</text>

  <rect x="630" y="100" width="220" height="55" rx="3" fill="#E1BEE7" stroke="#7B1FA2" stroke-width="1"/>
  <text x="740" y="120" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#7B1FA2">Application-level lock</text>
  <text x="740" y="138" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#7B1FA2">on "concert:123"</text>

  <text x="740" y="180" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#7B1FA2">Custom scope: lock a</text>
  <text x="740" y="198" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#7B1FA2">logical resource, not a row</text>
  <text x="740" y="218" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#7B1FA2">pg_advisory_lock()</text>

  <!-- Rules -->
  <text x="450" y="265" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="16" fill="#1B1B1F" font-weight="bold">Lock Granularity Rules</text>

  <rect x="30" y="280" width="410" height="55" rx="6" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="235" y="302" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#2E7D32" font-weight="bold">Lock as few rows as possible</text>
  <text x="235" y="322" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Ticket purchase? Lock only that concert row.</text>

  <rect x="460" y="280" width="410" height="55" rx="6" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/>
  <text x="665" y="302" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#E65100" font-weight="bold">Hold locks as briefly as possible</text>
  <text x="665" y="322" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Milliseconds, not seconds. Do work outside lock.</text>

  <rect x="140" y="350" width="620" height="50" rx="6" fill="#E8F4FD" stroke="#1565C0" stroke-width="1.5"/>
  <text x="450" y="370" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1565C0" font-weight="bold">Wide lock = simple but slow. Narrow lock = fast but complex.</text>
  <text x="450" y="390" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1565C0">Start narrow (row lock). Widen only if needed for correctness.</text>

  <text x="878" y="412" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.22">systemdesignlaws.xyz</text>
</svg>