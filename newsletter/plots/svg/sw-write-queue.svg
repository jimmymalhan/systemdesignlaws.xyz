<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" style="background:#FFFFFF">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0.5 L9,3.5 L0,6.5" fill="#1B1B1F" stroke="#1B1B1F" stroke-width="1"/>
    </marker>
  </defs>
  <text x="450" y="32" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="20" fill="#1B1B1F" font-weight="bold">Write Queue: Burst Absorption</text>
  <text x="450" y="60" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F">Buffer Writes Through a Message Queue</text>
  <rect x="30" y="90" width="150" height="50" rx="6" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
  <text x="105.0" y="112.0" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F" font-weight="bold">App Servers</text>
  <text x="105.0" y="130.0" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#555">burst: 10K w/s</text>
  <rect x="280" y="80" width="200" height="70" rx="6" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
  <text x="380.0" y="112.0" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F" font-weight="bold">Queue</text>
  <text x="380.0" y="130.0" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#555">Kafka / SQS</text>
  <line x1="180" y1="115" x2="280" y2="115" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="580" y="90" width="150" height="50" rx="6" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
  <text x="655.0" y="112.0" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F" font-weight="bold">Workers</text>
  <text x="655.0" y="130.0" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#555">drain: 2K w/s</text>
  <line x1="480" y1="115" x2="580" y2="115" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="810" y="90" width="70" height="50" rx="6" fill="#F3E5F5" stroke="#1B1B1F" stroke-width="2"/>
  <text x="845.0" y="120.0" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F" font-weight="bold">DB</text>
  <line x1="730" y1="115" x2="810" y2="115" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>
  <text x="450" y="185" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="15" fill="#1B1B1F">Write Timeline</text>
  <rect x="80" y="200" width="300" height="30" rx="4" fill="#FFEBEE" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="230" y="220" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Burst: 10,000 writes/sec</text>
  <rect x="80" y="240" width="300" height="30" rx="4" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="230" y="260" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Queue absorbs spike</text>
  <rect x="80" y="280" width="700" height="30" rx="4" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="430" y="300" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Workers drain at sustainable 2,000 writes/sec</text>
  <rect x="200" y="340" width="500" height="50" rx="6" fill="#FFEBEE" stroke="#1B1B1F" stroke-width="2"/>
  <text x="450.0" y="362.0" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F" font-weight="bold">Risk: Unbounded Queue Growth</text>
  <text x="450.0" y="380.0" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#555">If burst > drain for too long, latency grows forever</text>

  <text x="878" y="412" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.22">systemdesignlaws.xyz</text>
</svg>