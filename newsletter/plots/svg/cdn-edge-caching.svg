<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" style="background:#FFFFFF">
  <defs>
    <marker id="arr-cdn-r" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0.5 L9,3.5 L0,6.5" fill="#D32F2F" stroke="#D32F2F" stroke-width="1"/>
    </marker>
    <marker id="arr-cdn-g" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0.5 L9,3.5 L0,6.5" fill="#2E7D32" stroke="#2E7D32" stroke-width="1"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="22" fill="#1B1B1F" font-weight="bold">CDN Edge Caching</text>

  <!-- World outline (oval) -->
  <ellipse cx="450" cy="210" rx="370" ry="155" fill="none" stroke="#E0E0E0" stroke-width="1.5" stroke-dasharray="8,4"/>

  <!-- Origin Server (center) -->
  <rect x="410" y="190" width="80" height="50" rx="8" fill="#FFEBEE" stroke="#D32F2F" stroke-width="2"/>
  <text x="450" y="212" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" font-weight="bold">Origin</text>
  <text x="450" y="228" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">Server</text>

  <!-- Edge 1: Top -->
  <circle cx="450" cy="80" r="26" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
  <text x="450" y="78" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F" font-weight="bold">Edge</text>
  <text x="450" y="91" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="9" fill="#1B1B1F">US-East</text>

  <!-- Edge 2: Top-Right -->
  <circle cx="710" cy="140" r="26" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
  <text x="710" y="138" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F" font-weight="bold">Edge</text>
  <text x="710" y="151" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="9" fill="#1B1B1F">Europe</text>

  <!-- Edge 3: Bottom-Right -->
  <circle cx="720" cy="290" r="26" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
  <text x="720" y="288" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F" font-weight="bold">Edge</text>
  <text x="720" y="301" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="9" fill="#1B1B1F">Asia</text>

  <!-- Edge 4: Bottom -->
  <circle cx="450" cy="340" r="26" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
  <text x="450" y="338" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F" font-weight="bold">Edge</text>
  <text x="450" y="351" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="9" fill="#1B1B1F">S. America</text>

  <!-- Edge 5: Bottom-Left -->
  <circle cx="185" cy="300" r="26" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
  <text x="185" y="298" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F" font-weight="bold">Edge</text>
  <text x="185" y="311" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="9" fill="#1B1B1F">Africa</text>

  <!-- Edge 6: Top-Left -->
  <circle cx="190" cy="140" r="26" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
  <text x="190" y="138" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F" font-weight="bold">Edge</text>
  <text x="190" y="151" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="9" fill="#1B1B1F">US-West</text>

  <!-- Users near edge nodes -->
  <text x="412" y="60" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#666">User</text>
  <text x="755" y="130" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#666">User</text>
  <text x="760" y="305" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#666">User</text>
  <text x="125" y="130" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#666">User</text>

  <!-- Direct path (red, dashed): User to Origin (slow) -->
  <path d="M435,62 C440,90 445,155 448,188" stroke="#D32F2F" stroke-width="2" fill="none" marker-end="url(#arr-cdn-r)" stroke-dasharray="6,4"/>

  <!-- CDN path (green, solid): User to Edge (fast) -->
  <path d="M755,130 C745,132 738,135 736,138" stroke="#2E7D32" stroke-width="2.5" fill="none" marker-end="url(#arr-cdn-g)"/>

  <!-- Connection lines from origin to edges (thin, showing sync) -->
  <path d="M450,190 L450,106" stroke="#CCC" stroke-width="1" fill="none" stroke-dasharray="3,3"/>
  <path d="M490,205 L686,142" stroke="#CCC" stroke-width="1" fill="none" stroke-dasharray="3,3"/>
  <path d="M490,225 L696,288" stroke="#CCC" stroke-width="1" fill="none" stroke-dasharray="3,3"/>
  <path d="M450,240 L450,314" stroke="#CCC" stroke-width="1" fill="none" stroke-dasharray="3,3"/>
  <path d="M410,225 L209,296" stroke="#CCC" stroke-width="1" fill="none" stroke-dasharray="3,3"/>
  <path d="M410,205 L214,142" stroke="#CCC" stroke-width="1" fill="none" stroke-dasharray="3,3"/>

  <!-- Legend box -->
  <rect x="22" y="380" width="290" height="25" rx="6" fill="#FAFAFA" stroke="#1B1B1F" stroke-width="1.5"/>

  <!-- Direct path legend -->
  <line x1="32" y1="392" x2="68" y2="392" stroke="#D32F2F" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="76" y="397" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#D32F2F">Direct: ~250ms</text>

  <!-- CDN path legend -->
  <line x1="180" y1="392" x2="216" y2="392" stroke="#2E7D32" stroke-width="2.5"/>
  <text x="224" y="397" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#2E7D32">CDN: ~20-40ms</text>

  <!-- Watermark -->
  <text x="878" y="412" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.22">systemdesignlaws.xyz</text>
</svg>