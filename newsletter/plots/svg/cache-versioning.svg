<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" style="background:#FFFFFF">
  <defs>
    <marker id="arr-cv" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1B1B1F"/>
    </marker>
    <marker id="arr-cv-g" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2E7D32"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="20" fill="#1B1B1F" font-weight="bold">Cache Versioning</text>

  <!-- Divider line -->
  <line x1="450" y1="45" x2="450" y2="395" stroke="#CCC" stroke-width="1" stroke-dasharray="6,4"/>

  <!-- LEFT SIDE: WRITE PATH -->
  <text x="225" y="62" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="15" fill="#E65100" font-weight="bold">WRITE PATH</text>

  <!-- Step 1: DB Write -->
  <rect x="60" y="80" width="200" height="55" rx="8" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
  <text x="160" y="103" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F" font-weight="bold">Database Write</text>
  <text x="160" y="124" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">version: 42 to 43</text>

  <!-- Arrow down -->
  <line x1="160" y1="140" x2="160" y2="162" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr-cv)"/>

  <!-- Step 2: New cache key -->
  <rect x="60" y="168" width="200" height="50" rx="8" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
  <text x="160" y="190" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#2E7D32" font-weight="bold">New Cache Key</text>
  <text x="160" y="208" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F" font-weight="bold">event:123:v43</text>

  <!-- Arrow down to old key -->
  <line x1="160" y1="222" x2="160" y2="252" stroke="#999" stroke-width="1.5" stroke-dasharray="4,3"/>

  <!-- Step 3: Old cache key (greyed out) -->
  <g opacity="0.4">
    <rect x="60" y="258" width="200" height="50" rx="8" fill="#F5F5F5" stroke="#999" stroke-width="2"/>
    <text x="160" y="280" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F">Old Cache Key</text>
    <text x="160" y="298" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">event:123:v42</text>
  </g>

  <!-- Unreachable label on old key -->
  <rect x="270" y="268" width="100" height="24" rx="5" fill="#FFEBEE" stroke="#D32F2F" stroke-width="1.5"/>
  <text x="320" y="285" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#D32F2F" font-weight="bold">unreachable</text>
  <!-- strike line -->
  <line x1="70" y1="283" x2="250" y2="283" stroke="#D32F2F" stroke-width="1.5" stroke-dasharray="3,2" opacity="0.4"/>

  <!-- TTL note -->
  <text x="160" y="330" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#999">expires naturally via TTL</text>

  <!-- RIGHT SIDE: READ PATH -->
  <text x="675" y="62" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="15" fill="#1565C0" font-weight="bold">READ PATH</text>

  <!-- Step 1: Get version -->
  <rect x="575" y="80" width="200" height="50" rx="8" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
  <text x="675" y="102" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F" font-weight="bold">Get Current Version</text>
  <text x="675" y="120" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">version = 43</text>

  <!-- Arrow down -->
  <line x1="675" y1="135" x2="675" y2="162" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr-cv)"/>

  <!-- Step 2: Lookup versioned key -->
  <rect x="575" y="168" width="200" height="50" rx="8" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
  <text x="675" y="190" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F" font-weight="bold">Lookup Cache</text>
  <text x="675" y="208" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">event:123:v43</text>

  <!-- Arrow down -->
  <line x1="675" y1="222" x2="675" y2="252" stroke="#2E7D32" stroke-width="2" marker-end="url(#arr-cv-g)"/>

  <!-- Step 3: Cache hit -->
  <rect x="600" y="258" width="150" height="48" rx="8" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
  <text x="675" y="279" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#2E7D32" font-weight="bold">Cache HIT!</text>
  <text x="675" y="296" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#2E7D32">Fresh data returned</text>

  <!-- No race condition annotation -->
  <rect x="545" y="325" width="260" height="48" rx="8" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2" stroke-dasharray="5,3"/>
  <text x="675" y="346" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#2E7D32" font-weight="bold">No Race Condition</text>
  <text x="675" y="364" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#2E7D32">Version in key = always consistent</text>

  <!-- Stale reads note -->
  <text x="675" y="393" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#999">stale reads impossible: new version = new key</text>

  <!-- Connecting concept: write side version feeds read side -->
  <path d="M 260,105 Q 450,65 575,105" fill="none" stroke="#1565C0" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr-cv)"/>
  <text x="420" y="75" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1565C0">version propagates</text>

  <!-- Watermark -->
  <text x="878" y="412" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.22">systemdesignlaws.xyz</text>
</svg>