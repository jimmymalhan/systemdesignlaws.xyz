<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" style="background:#FFFFFF">
  <defs>
    <marker id="arr-sg" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0.5 L9,3.5 L0,6.5" fill="#1B1B1F" stroke="#1B1B1F" stroke-width="1"/>
    </marker>
    <marker id="arr-sg-r" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0.5 L9,3.5 L0,6.5" fill="#D32F2F" stroke="#D32F2F" stroke-width="1"/>
    </marker>
  </defs>
  <text x="450" y="30" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="22" fill="#1B1B1F" font-weight="bold">Saga Pattern: Compensating Transactions</text>

  <!-- Orchestrator -->
  <rect x="340" y="45" width="220" height="40" rx="6" fill="#F3E5F5" stroke="#1B1B1F" stroke-width="2"/>
  <text x="450" y="70" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F" font-weight="bold">Saga Orchestrator</text>

  <!-- Steps (happy path) -->
  <rect x="15" y="105" width="870" height="95" rx="6" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5" opacity="0.3"/>
  <text x="450" y="122" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#2E7D32" font-weight="bold">Happy Path (all steps succeed)</text>

  <!-- Step 1 -->
  <rect x="30" y="135" width="200" height="50" rx="6" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
  <text x="130" y="155" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F" font-weight="bold">Step 1: Debit Alice</text>
  <text x="130" y="175" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#2E7D32">COMMIT in DB A</text>

  <!-- Arrow -->
  <line x1="230" y1="160" x2="268" y2="160" stroke="#2E7D32" stroke-width="2" marker-end="url(#arr-sg)"/>

  <!-- Step 2 -->
  <rect x="280" y="135" width="200" height="50" rx="6" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
  <text x="380" y="155" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F" font-weight="bold">Step 2: Credit Bob</text>
  <text x="380" y="175" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#2E7D32">COMMIT in DB B</text>

  <line x1="480" y1="160" x2="518" y2="160" stroke="#2E7D32" stroke-width="2" marker-end="url(#arr-sg)"/>

  <!-- Step 3 -->
  <rect x="530" y="135" width="200" height="50" rx="6" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
  <text x="630" y="155" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F" font-weight="bold">Step 3: Notify</text>
  <text x="630" y="175" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#2E7D32">Send confirmation</text>

  <rect x="760" y="142" width="100" height="36" rx="6" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
  <text x="810" y="165" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#2E7D32" font-weight="bold">DONE</text>

  <!-- Failure path -->
  <rect x="15" y="215" width="870" height="115" rx="6" fill="#FFEBEE" stroke="#D32F2F" stroke-width="1.5" opacity="0.3"/>
  <text x="450" y="232" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#D32F2F" font-weight="bold">Failure Path (Step 2 fails, compensate Step 1)</text>

  <!-- Step 1 success -->
  <rect x="30" y="245" width="200" height="40" rx="6" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
  <text x="130" y="262" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#2E7D32" font-weight="bold">Step 1: Debit Alice</text>
  <text x="130" y="278" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#2E7D32">COMMITTED</text>

  <line x1="230" y1="265" x2="268" y2="265" stroke="#2E7D32" stroke-width="2" marker-end="url(#arr-sg)"/>

  <!-- Step 2 fails -->
  <rect x="280" y="245" width="200" height="40" rx="6" fill="#FFEBEE" stroke="#D32F2F" stroke-width="2"/>
  <text x="380" y="262" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#D32F2F" font-weight="bold">Step 2: Credit Bob</text>
  <text x="380" y="278" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#D32F2F">FAILED (account closed)</text>

  <!-- Compensate arrow -->
  <line x1="280" y1="305" x2="230" y2="305" stroke="#D32F2F" stroke-width="2" marker-end="url(#arr-sg-r)"/>

  <!-- Compensation -->
  <rect x="30" y="295" width="200" height="30" rx="6" fill="#FFF3E0" stroke="#E65100" stroke-width="2"/>
  <text x="130" y="315" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#E65100" font-weight="bold">Compensate: Credit Alice</text>

  <!-- Key properties -->
  <rect x="30" y="345" width="260" height="55" rx="6" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="160" y="365" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#2E7D32" font-weight="bold">No cross-DB locks</text>
  <text x="160" y="385" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Each step commits locally</text>

  <rect x="310" y="345" width="280" height="55" rx="6" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/>
  <text x="450" y="365" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#E65100" font-weight="bold">Temporary inconsistency</text>
  <text x="450" y="385" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Between steps, state is partial</text>

  <rect x="610" y="345" width="260" height="55" rx="6" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1.5"/>
  <text x="740" y="365" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#7B1FA2" font-weight="bold">Durable orchestrator</text>
  <text x="740" y="385" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Temporal, Cadence, state machine</text>

  <text x="878" y="412" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.22">systemdesignlaws.xyz</text>
</svg>