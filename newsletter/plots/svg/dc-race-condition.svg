<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" style="background:#FFFFFF">
  <defs>
    <marker id="arr-rc" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0.5 L9,3.5 L0,6.5" fill="#1B1B1F" stroke="#1B1B1F" stroke-width="1"/>
    </marker>
    <marker id="arr-rc-r" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0.5 L9,3.5 L0,6.5" fill="#D32F2F" stroke="#D32F2F" stroke-width="1"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="22" fill="#1B1B1F" font-weight="bold">Race Condition: The Double-Booking Problem</text>

  <!-- Timeline line -->
  <line x1="80" y1="70" x2="80" y2="390" stroke="#CCC" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="450" y1="70" x2="450" y2="390" stroke="#CCC" stroke-width="2" stroke-dasharray="6,4"/>
  <line x1="750" y1="70" x2="750" y2="390" stroke="#CCC" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- Column headers -->
  <rect x="20" y="50" width="120" height="30" rx="4" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
  <text x="80" y="71" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F" font-weight="bold">Alice</text>

  <rect x="390" y="50" width="120" height="30" rx="4" fill="#F3E5F5" stroke="#1B1B1F" stroke-width="2"/>
  <text x="450" y="71" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F" font-weight="bold">Database</text>

  <rect x="690" y="50" width="120" height="30" rx="4" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
  <text x="750" y="71" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F" font-weight="bold">Bob</text>

  <!-- DB state -->
  <rect x="395" y="95" width="110" height="28" rx="4" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="450" y="114" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#2E7D32" font-weight="bold">seats = 1</text>

  <!-- Alice reads -->
  <path d="M80,145 L438,145" stroke="#1B1B1F" stroke-width="2" fill="none" marker-end="url(#arr-rc)"/>
  <text x="260" y="138" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">READ seats</text>

  <!-- Alice gets 1 -->
  <path d="M450,160 L92,160" stroke="#1B1B1F" stroke-width="2" fill="none" stroke-dasharray="5,3" marker-end="url(#arr-rc)"/>
  <text x="260" y="175" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">returns 1</text>

  <!-- Bob reads -->
  <path d="M750,195 L462,195" stroke="#1B1B1F" stroke-width="2" fill="none" marker-end="url(#arr-rc)"/>
  <text x="600" y="188" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">READ seats</text>

  <!-- Bob gets 1 -->
  <path d="M450,210 L738,210" stroke="#1B1B1F" stroke-width="2" fill="none" stroke-dasharray="5,3" marker-end="url(#arr-rc)"/>
  <text x="600" y="225" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">returns 1</text>

  <!-- Danger zone -->
  <rect x="15" y="245" width="870" height="80" rx="4" fill="#FFEBEE" stroke="#D32F2F" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="450" y="262" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#D32F2F" font-weight="bold">RACE CONDITION WINDOW</text>

  <!-- Alice writes -->
  <path d="M80,280 L438,280" stroke="#D32F2F" stroke-width="2" fill="none" marker-end="url(#arr-rc-r)"/>
  <text x="260" y="275" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#D32F2F">SET seats = 0</text>

  <!-- Bob writes -->
  <path d="M750,300 L462,300" stroke="#D32F2F" stroke-width="2" fill="none" marker-end="url(#arr-rc-r)"/>
  <text x="600" y="295" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#D32F2F">SET seats = 0</text>

  <!-- Result -->
  <rect x="380" y="340" width="140" height="28" rx="4" fill="#FFEBEE" stroke="#D32F2F" stroke-width="2"/>
  <text x="450" y="359" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#D32F2F" font-weight="bold">seats = -1 (BUG!)</text>

  <!-- Both get tickets -->
  <text x="80" y="365" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#D32F2F">Gets ticket</text>
  <text x="750" y="365" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#D32F2F">Gets ticket</text>

  <!-- Lesson -->
  <rect x="200" y="380" width="500" height="24" rx="4" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/>
  <text x="450" y="397" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#E65100" font-weight="bold">Gap between READ and WRITE allows concurrent corruption</text>

  <!-- Watermark -->
  <text x="878" y="412" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.22">systemdesignlaws.xyz</text>
</svg>