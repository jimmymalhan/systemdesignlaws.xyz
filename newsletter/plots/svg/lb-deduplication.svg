<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420">
<rect width="900" height="420" fill="#FFFFFF"/>
<defs>
  <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
    <path d="M0,0.5 L9,3.5 L0,6.5" fill="#1B1B1F" stroke="#1B1B1F" stroke-width="1"/>
  </marker>
</defs>

<!-- Title -->
<text x="450" y="32" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="20" font-weight="bold" fill="#1B1B1F">Deduplication Strategies</text>
<text x="450" y="52" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F" opacity="0.6">Avoid storing duplicate content at different granularities</text>

<!-- File-level dedup -->
<rect x="40" y="70" width="260" height="130" rx="8" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
<text x="170" y="95" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#1B1B1F">File-Level Dedup</text>
<text x="60" y="118" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Hash entire file: SHA-256</text>
<text x="60" y="136" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">If hash exists: skip upload</text>
<text x="60" y="154" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Simple to implement</text>
<text x="60" y="178" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.6">Limitation: 1-byte change = new file</text>
<text x="60" y="194" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.6">Good for: identical file copies</text>

<!-- Chunk-level dedup -->
<rect x="320" y="70" width="260" height="130" rx="8" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
<text x="450" y="95" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#1B1B1F">Chunk-Level Dedup</text>
<text x="340" y="118" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Split file into fixed chunks</text>
<text x="340" y="136" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Hash each chunk independently</text>
<text x="340" y="154" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Upload only new chunks</text>
<text x="340" y="178" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.6">Better dedup for edited files</text>
<text x="340" y="194" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.6">Good for: Dropbox, file sync</text>

<!-- Content-defined chunking -->
<rect x="600" y="70" width="260" height="130" rx="8" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
<text x="730" y="95" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#1B1B1F">Content-Defined Chunks</text>
<text x="620" y="118" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Rolling hash (Rabin fingerprint)</text>
<text x="620" y="136" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Chunk boundaries by content</text>
<text x="620" y="154" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Insertions do not shift all chunks</text>
<text x="620" y="178" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.6">Best dedup, most complex</text>
<text x="620" y="194" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.6">Good for: backup systems</text>

<!-- Example flow -->
<text x="450" y="230" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#1B1B1F">Example: Chunk-Level Dedup</text>

<rect x="40" y="245" width="120" height="70" rx="8" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
<text x="100" y="265" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" font-weight="bold" fill="#1B1B1F">Original File</text>
<text x="100" y="282" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">[A][B][C][D]</text>
<text x="100" y="298" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">4 chunks stored</text>

<line x1="160" y1="280" x2="200" y2="280" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>

<rect x="205" y="245" width="145" height="70" rx="8" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
<text x="277" y="265" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" font-weight="bold" fill="#1B1B1F">Edited File</text>
<text x="277" y="282" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">[A][B'][C][D]</text>
<text x="277" y="298" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">B changed to B'</text>

<line x1="350" y1="280" x2="390" y2="280" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>

<rect x="395" y="245" width="175" height="70" rx="8" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
<text x="482" y="265" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" font-weight="bold" fill="#1B1B1F">Upload Decision</text>
<text x="482" y="282" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">A: exists. Skip.</text>
<text x="482" y="295" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">B': new! Upload.</text>
<text x="482" y="308" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">C,D: exist. Skip.</text>

<line x1="570" y1="280" x2="610" y2="280" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>

<rect x="615" y="250" width="240" height="60" rx="8" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
<text x="735" y="275" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#1B1B1F">Result: 1 chunk uploaded</text>
<text x="735" y="298" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">75% bandwidth saved</text>

<!-- Bottom insight -->
<rect x="100" y="340" width="700" height="55" rx="8" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
<text x="450" y="362" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#1B1B1F">Dedup in Interviews</text>
<text x="450" y="382" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Mention chunk-level dedup for Dropbox/Drive. File-level for simpler systems.</text>
<text x="450" y="395" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.7">Dropbox reported 75%+ storage savings from chunk-level deduplication across users.</text>

<!-- Watermark -->
<text x="878" y="412" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.22">systemdesignlaws.xyz</text>
</svg>