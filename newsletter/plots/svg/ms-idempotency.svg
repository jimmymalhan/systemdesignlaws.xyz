<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420">
<rect width="900" height="420" fill="#FFFFFF"/>

<text x="450" y="30" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="20" font-weight="bold" fill="#1B1B1F">Idempotency: Safe to Retry</text>
<text x="450" y="50" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F" opacity="0.6">Same input, same result. Multiple calls produce the same outcome.</text>
<rect x="50" y="80" width="380" height="110" rx="10" fill="#FFEBEE" stroke="#1B1B1F" stroke-width="2"/>
<text x="240" y="105" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#1B1B1F">Without Idempotency</text>
<text x="240" y="125" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">chargePayment($50) - first call: charged $50</text>
<text x="240" y="145" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">chargePayment($50) - retry: charged $50 AGAIN</text>
<text x="240" y="170" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F" font-weight="bold">Total: $100 charged. Customer furious.</text>
<rect x="470" y="80" width="380" height="110" rx="10" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
<text x="660" y="105" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#1B1B1F">With Idempotency</text>
<text x="660" y="125" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">chargePayment($50, key=abc123) - charged $50</text>
<text x="660" y="145" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">chargePayment($50, key=abc123) - already done</text>
<text x="660" y="170" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F" font-weight="bold">Total: $50 charged. Correct.</text>
<rect x="150" y="220" width="600" height="80" rx="10" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
<text x="450" y="245" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#1B1B1F">How It Works</text>
<text x="450" y="265" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">1. Generate unique idempotency key per operation (order ID + step name)</text>
<text x="450" y="282" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">2. Before executing: check if key exists in database</text>
<text x="450" y="299" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">3. If exists: return stored result. If not: execute, store result with key.</text>
<rect x="150" y="330" width="600" height="50" rx="10" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
<text x="450" y="360" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Activities in workflow engines MUST be idempotent. The engine may retry on ack failure.</text>
<text x="878" y="412" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.22">systemdesignlaws.xyz</text>
</svg>