<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" style="background:#FFFFFF">
  <defs>
    <marker id="arr-ru" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0.5 L9,3.5 L0,6.5" fill="#1B1B1F" stroke="#1B1B1F" stroke-width="1"/>
    </marker>
  </defs>
  <text x="450" y="32" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="22" fill="#1B1B1F" font-weight="bold">READ UNCOMMITTED: Dirty Read Problem</text>

  <!-- Timeline -->
  <line x1="150" y1="55" x2="150" y2="380" stroke="#CCC" stroke-width="1.5" stroke-dasharray="5,4"/>
  <line x1="450" y1="55" x2="450" y2="380" stroke="#CCC" stroke-width="1.5" stroke-dasharray="5,4"/>
  <line x1="750" y1="55" x2="750" y2="380" stroke="#CCC" stroke-width="1.5" stroke-dasharray="5,4"/>

  <rect x="70" y="50" width="160" height="28" rx="4" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
  <text x="150" y="69" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F" font-weight="bold">Transaction A</text>
  <rect x="370" y="50" width="160" height="28" rx="4" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
  <text x="450" y="69" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F" font-weight="bold">Database</text>
  <rect x="670" y="50" width="160" height="28" rx="4" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
  <text x="750" y="69" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F" font-weight="bold">Transaction B</text>

  <!-- Initial state -->
  <rect x="390" y="95" width="120" height="24" rx="4" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="450" y="112" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#2E7D32">balance = $100</text>

  <!-- Txn A writes -->
  <line x1="150" y1="140" x2="438" y2="140" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr-ru)"/>
  <text x="294" y="135" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">UPDATE balance = $50</text>

  <rect x="390" y="150" width="120" height="24" rx="4" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/>
  <text x="450" y="167" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#E65100">balance = $50*</text>

  <text x="530" y="167" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#E65100">*uncommitted</text>

  <!-- Txn B reads dirty -->
  <line x1="750" y1="200" x2="462" y2="200" stroke="#D32F2F" stroke-width="2" marker-end="url(#arr-ru)"/>
  <text x="610" y="195" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#D32F2F">READ balance</text>

  <line x1="450" y1="215" x2="738" y2="215" stroke="#D32F2F" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arr-ru)"/>
  <text x="594" y="230" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#D32F2F" font-weight="bold">Returns $50 (DIRTY!)</text>

  <!-- Txn A rolls back -->
  <line x1="150" y1="260" x2="438" y2="260" stroke="#D32F2F" stroke-width="2" marker-end="url(#arr-ru)"/>
  <text x="294" y="255" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#D32F2F" font-weight="bold">ROLLBACK</text>

  <rect x="390" y="272" width="120" height="24" rx="4" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="450" y="289" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#2E7D32">balance = $100</text>

  <!-- Problem -->
  <rect x="580" y="260" width="280" height="50" rx="6" fill="#FFEBEE" stroke="#D32F2F" stroke-width="2"/>
  <text x="720" y="282" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#D32F2F" font-weight="bold">Txn B used $50 balance</text>
  <text x="720" y="300" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#D32F2F">But real balance is $100!</text>

  <!-- Lesson -->
  <rect x="100" y="330" width="700" height="55" rx="6" fill="#FFEBEE" stroke="#D32F2F" stroke-width="1.5"/>
  <text x="450" y="352" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#D32F2F" font-weight="bold">Dirty reads see data that never actually committed</text>
  <text x="450" y="374" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#D32F2F">Decisions made on phantom data. Almost never appropriate in production.</text>

  <text x="878" y="412" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.22">systemdesignlaws.xyz</text>
</svg>