<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" style="background:#FFFFFF">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0.5 L9,3.5 L0,6.5" fill="#1B1B1F" stroke="#1B1B1F" stroke-width="1"/>
    </marker>
  </defs>
  <text x="450" y="32" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="20" fill="#1B1B1F" font-weight="bold">Decision Tree: Scaling Writes</text>
  <rect x="300" y="55" width="300" height="40" rx="6" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
  <text x="450.0" y="80.0" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F" font-weight="bold">Write bottleneck detected</text>
  <rect x="50" y="130" width="220" height="40" rx="6" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
  <text x="160.0" y="155.0" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F" font-weight="bold">Can hardware handle it?</text>
  <rect x="630" y="130" width="220" height="40" rx="6" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
  <text x="740.0" y="155.0" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F" font-weight="bold">Is traffic bursty?</text>
  <line x1="400" y1="95" x2="160" y2="130" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="500" y1="95" x2="740" y2="130" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="20" y="200" width="130" height="35" rx="6" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
  <text x="85.0" y="222.5" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F" font-weight="bold">Yes: Vertical</text>
  <rect x="170" y="200" width="130" height="35" rx="6" fill="#FFEBEE" stroke="#1B1B1F" stroke-width="2"/>
  <text x="235.0" y="222.5" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F" font-weight="bold">No: Shard</text>
  <line x1="120" y1="170" x2="85" y2="200" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="200" y1="170" x2="235" y2="200" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="600" y="200" width="130" height="35" rx="6" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
  <text x="665.0" y="222.5" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F" font-weight="bold">Yes: Queue</text>
  <rect x="750" y="200" width="130" height="35" rx="6" fill="#FFEBEE" stroke="#1B1B1F" stroke-width="2"/>
  <text x="815.0" y="222.5" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F" font-weight="bold">No: Steady</text>
  <line x1="700" y1="170" x2="665" y2="200" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="780" y1="170" x2="815" y2="200" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="140" y="270" width="190" height="35" rx="6" fill="#F3E5F5" stroke="#1B1B1F" stroke-width="2"/>
  <text x="235.0" y="292.5" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F" font-weight="bold">Hot key problem?</text>
  <line x1="235" y1="235" x2="235" y2="270" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="80" y="335" width="130" height="35" rx="6" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
  <text x="145.0" y="357.5" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" font-weight="bold">Yes: Split key</text>
  <rect x="230" y="335" width="130" height="35" rx="6" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
  <text x="295.0" y="357.5" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" font-weight="bold">No: Rebalance</text>
  <line x1="200" y1="305" x2="145" y2="335" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="270" y1="305" x2="295" y2="335" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="720" y="270" width="160" height="35" rx="6" fill="#F3E5F5" stroke="#1B1B1F" stroke-width="2"/>
  <text x="800.0" y="292.5" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F" font-weight="bold">Volume too high?</text>
  <line x1="815" y1="235" x2="800" y2="270" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="660" y="335" width="130" height="35" rx="6" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
  <text x="725.0" y="357.5" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" font-weight="bold">Yes: Batch</text>
  <rect x="810" y="335" width="130" height="35" rx="6" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
  <text x="875.0" y="357.5" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" font-weight="bold">Aggregate</text>
  <line x1="770" y1="305" x2="725" y2="335" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="830" y1="305" x2="875" y2="335" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>

  <text x="878" y="412" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.22">systemdesignlaws.xyz</text>
</svg>