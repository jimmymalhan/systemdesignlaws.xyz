<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333333"/>
    </marker>
  </defs>
  <rect width="800" height="480" fill="#ffffff"/>

  <!-- Title -->
  <text x="400" y="34" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Hop 2: Source-to-Server Decision Tree</text>
  <text x="400" y="54" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#555555" text-anchor="middle">Choose how updates flow from source to your endpoint servers</text>

  <!-- Start node -->
  <rect x="290" y="72" width="220" height="40" rx="20" fill="#1a1a1a" stroke="none"/>
  <text x="400" y="97" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">How many servers?</text>

  <!-- Arrow down -->
  <line x1="400" y1="112" x2="400" y2="140" stroke="#333333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Q1: Scale? -->
  <rect x="280" y="140" width="240" height="44" rx="8" fill="#e8f4fd" stroke="#4a90d9" stroke-width="2"/>
  <text x="400" y="158" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Fewer than 10 endpoint</text>
  <text x="400" y="176" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#1a1a1a" text-anchor="middle">servers?</text>

  <!-- Yes branch left: Pull Polling -->
  <line x1="280" y1="162" x2="175" y2="162" stroke="#333333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="228" y="155" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#27ae60">Yes</text>

  <rect x="40" y="140" width="135" height="70" rx="8" fill="#fdf8e8" stroke="#d4a017" stroke-width="2"/>
  <text x="108" y="162" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Pull Polling</text>
  <text x="108" y="178" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#555555" text-anchor="middle">Poll DB every 1-2s</text>
  <text x="108" y="194" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#888888" text-anchor="middle">Simple, low infra cost</text>

  <!-- No arrow down -->
  <line x1="400" y1="184" x2="400" y2="220" stroke="#333333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="412" y="208" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#c0392b">No (10+)</text>

  <!-- Q2: Per-connection state? -->
  <rect x="260" y="220" width="280" height="44" rx="8" fill="#e8f4fd" stroke="#4a90d9" stroke-width="2"/>
  <text x="400" y="238" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Heavy per-connection state?</text>
  <text x="400" y="256" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#555555" text-anchor="middle">(loaded documents, sync buffers, etc.)</text>

  <!-- Yes branch left: Consistent Hashing -->
  <line x1="260" y1="242" x2="175" y2="280" stroke="#333333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="210" y="258" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#27ae60">Yes</text>

  <rect x="20" y="268" width="155" height="80" rx="8" fill="#e8fde8" stroke="#4ab54a" stroke-width="2"/>
  <text x="98" y="290" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Consistent</text>
  <text x="98" y="306" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Hashing</text>
  <text x="98" y="322" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#555555" text-anchor="middle">Pin user to server</text>
  <text x="98" y="338" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#888888" text-anchor="middle">Google Docs, gaming</text>

  <!-- No branch right: Pub/Sub -->
  <line x1="540" y1="242" x2="610" y2="280" stroke="#333333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="582" y="258" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#c0392b">No</text>

  <rect x="560" y="268" width="195" height="80" rx="8" fill="#f5e8ff" stroke="#8e44ad" stroke-width="2"/>
  <text x="658" y="292" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Pub/Sub</text>
  <text x="658" y="310" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#555555" text-anchor="middle">Kafka / Redis broadcasts</text>
  <text x="658" y="326" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#555555" text-anchor="middle">Lightweight connections</text>
  <text x="658" y="342" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#888888" text-anchor="middle">Chat, notifications, feeds</text>

  <!-- Key differences table-style -->
  <rect x="40" y="375" width="720" height="92" rx="8" fill="#fff8e8" stroke="#d4a017" stroke-width="1.5"/>
  <text x="400" y="395" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Quick Comparison</text>

  <!-- Pull Polling column -->
  <text x="140" y="415" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#d4a017" text-anchor="middle">Pull Polling</text>
  <text x="140" y="432" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#555555" text-anchor="middle">Simplest</text>
  <text x="140" y="447" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#555555" text-anchor="middle">DB bottleneck at scale</text>
  <text x="140" y="460" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#888888" text-anchor="middle">Higher latency</text>

  <!-- Consistent Hashing column -->
  <text x="400" y="415" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#27ae60" text-anchor="middle">Consistent Hashing</text>
  <text x="400" y="432" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#555555" text-anchor="middle">Predictable routing</text>
  <text x="400" y="447" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#555555" text-anchor="middle">Needs ZooKeeper/etcd</text>
  <text x="400" y="460" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#888888" text-anchor="middle">Best for heavy state</text>

  <!-- Pub/Sub column -->
  <text x="660" y="415" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#8e44ad" text-anchor="middle">Pub/Sub</text>
  <text x="660" y="432" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#555555" text-anchor="middle">Easy broadcast</text>
  <text x="660" y="447" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#555555" text-anchor="middle">Extra hop latency</text>
  <text x="660" y="460" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#888888" text-anchor="middle">Best for lightweight fans</text>
</svg>
