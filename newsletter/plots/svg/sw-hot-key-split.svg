<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" style="background:#FFFFFF">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0.5 L9,3.5 L0,6.5" fill="#1B1B1F" stroke="#1B1B1F" stroke-width="1"/>
    </marker>
  </defs>
  <text x="450" y="32" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="20" fill="#1B1B1F" font-weight="bold">Hot Key Split Strategy</text>
  <text x="450" y="60" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F">Split Hot Keys Across Sub-Keys</text>
  <rect x="30" y="80" width="380" height="120" rx="6" fill="#FFEBEE" stroke="#1B1B1F" stroke-width="2"/>
  <text x="220.0" y="145.0" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F" font-weight="bold">Before: Single Key</text>
  <rect x="50" y="115" width="200" height="35" rx="4" fill="#FFD5D5" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="150.0" y="136.5" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F">post:viral:likes</text>
  <text x="280" y="135" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#B71C1C">100K w/s</text>
  <rect x="50" y="160" width="340" height="25" rx="4" fill="#FFD5D5" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="220.0" y="176.5" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">One shard handles all</text>
  <rect x="470" y="80" width="400" height="120" rx="6" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
  <text x="670.0" y="145.0" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F" font-weight="bold">After: Sub-Keys</text>
  <rect x="490" y="115" width="200" height="20" rx="4" fill="#C8E6C9" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="590.0" y="129.0" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">post:viral:likes-0</text>
  <rect x="490" y="137" width="200" height="20" rx="4" fill="#C8E6C9" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="590.0" y="151.0" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">post:viral:likes-1</text>
  <rect x="490" y="159" width="200" height="20" rx="4" fill="#C8E6C9" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="590.0" y="173.0" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">post:viral:likes-2</text>
  <rect x="490" y="181" width="200" height="20" rx="4" fill="#C8E6C9" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="590.0" y="195.0" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">post:viral:likes-3</text>
  <text x="770" y="135" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#2E7D32">25K w/s each</text>
  <text x="770" y="155" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#2E7D32">4 shards</text>
  <rect x="100" y="230" width="700" height="80" rx="6" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
  <text x="450.0" y="275.0" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F" font-weight="bold">Read Path: Aggregate Sub-Keys</text>
  <text x="450" y="265" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F">total_likes = SUM(post:viral:likes-0, likes-1, likes-2, likes-3)</text>
  <text x="450" y="290" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#555">Trade-off: writes scale linearly, reads cost k lookups</text>
  <rect x="100" y="340" width="320" height="50" rx="6" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
  <text x="260.0" y="362.0" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F" font-weight="bold">Static Split</text>
  <text x="260.0" y="380.0" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#555">Split ALL keys by k</text>
  <rect x="480" y="340" width="320" height="50" rx="6" fill="#F3E5F5" stroke="#1B1B1F" stroke-width="2"/>
  <text x="640.0" y="362.0" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F" font-weight="bold">Dynamic Split</text>
  <text x="640.0" y="380.0" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#555">Split ONLY hot keys</text>
  <text x="260" y="400" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#555">Simple but wastes resources</text>
  <text x="640" y="400" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#555">Efficient but needs detection</text>

  <text x="878" y="412" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.22">systemdesignlaws.xyz</text>
</svg>