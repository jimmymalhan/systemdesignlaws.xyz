<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420">
<rect width="900" height="420" fill="#FFFFFF"/>

<text x="450" y="30" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="20" font-weight="bold" fill="#1B1B1F">Durable Execution: How It Works</text>
<text x="450" y="50" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F" opacity="0.6">Code runs normally. Engine records every decision. Crash? Replay from history.</text>
<rect x="50" y="75" width="280" height="100" rx="10" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
<text x="190" y="100" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#1B1B1F">Workflow Code</text>
<text x="190" y="120" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">result = processPayment(order)</text>
<text x="190" y="135" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">if result.success:</text>
<text x="190" y="150" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">    reserveInventory(order)</text>
<text x="190" y="165" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">    shipOrder(order)</text>
<line x1="330" y1="125" x2="380" y2="125" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>
<rect x="380" y="75" width="200" height="100" rx="10" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
<text x="480" y="100" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#1B1B1F">Temporal Server</text>
<text x="480" y="120" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Records each activity</text>
<text x="480" y="135" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">result to history DB</text>
<text x="480" y="155" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Manages retries</text>
<line x1="580" y1="125" x2="630" y2="125" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>
<rect x="630" y="75" width="220" height="100" rx="10" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
<text x="740" y="100" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#1B1B1F">History Database</text>
<text x="740" y="120" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Activity 1: Payment OK</text>
<text x="740" y="135" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Activity 2: Inventory OK</text>
<text x="740" y="150" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Activity 3: (in progress)</text>
<rect x="50" y="210" width="800" height="80" rx="10" fill="#FFEBEE" stroke="#1B1B1F" stroke-width="2"/>
<text x="450" y="235" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#1B1B1F">Worker Machine Crashes</text>
<text x="450" y="258" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">New worker picks up the workflow. Replays from history.</text>
<text x="450" y="278" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Activities 1 and 2 use stored results (not re-executed). Only Activity 3 runs again.</text>
<rect x="200" y="320" width="500" height="60" rx="10" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
<text x="450" y="345" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#1B1B1F">Result: Zero-loss recovery</text>
<text x="450" y="365" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">No double charges. No lost progress. Workflow continues exactly where it stopped.</text>
<defs><marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#1B1B1F"/></marker></defs>
<text x="878" y="412" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.22">systemdesignlaws.xyz</text>
</svg>