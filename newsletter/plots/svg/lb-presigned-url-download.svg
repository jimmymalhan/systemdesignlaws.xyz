<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" style="background:#FFFFFF">
  <defs>
    <marker id="arr-pd" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0.5 L9,3.5 L0,6.5" fill="#1B1B1F" stroke="#1B1B1F" stroke-width="1"/>
    </marker>
    <marker id="arr-pd-g" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0.5 L9,3.5 L0,6.5" fill="#2E7D32" stroke="#2E7D32" stroke-width="1"/>
    </marker>
    <marker id="arr-pd-b" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0.5 L9,3.5 L0,6.5" fill="#1565C0" stroke="#1565C0" stroke-width="1"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="22" fill="#1B1B1F" font-weight="bold">Presigned URL Download Flow</text>

  <!-- Client -->
  <rect x="40" y="150" width="130" height="60" rx="6" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
  <text x="105" y="176" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="15" fill="#1B1B1F" font-weight="bold">Client</text>
  <text x="105" y="196" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#666">Wants to view file</text>

  <!-- Arrow 1: Client to App Server -->
  <path d="M170,165 L278,165" stroke="#1565C0" stroke-width="2" fill="none" marker-end="url(#arr-pd-b)"/>
  <text x="224" y="158" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1565C0">GET /file/123</text>

  <!-- App Server -->
  <rect x="282" y="150" width="150" height="60" rx="6" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
  <text x="357" y="176" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="15" fill="#1B1B1F" font-weight="bold">App Server</text>
  <text x="357" y="196" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#666">Auth + generate URL</text>

  <!-- Arrow 2: App Server generates presigned URL -->
  <path d="M432,165 L548,165" stroke="#1565C0" stroke-width="2" fill="none" marker-end="url(#arr-pd-b)"/>
  <text x="490" y="158" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1565C0">getSignedUrl</text>

  <!-- S3 -->
  <rect x="552" y="150" width="140" height="60" rx="6" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
  <text x="622" y="176" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="15" fill="#1B1B1F" font-weight="bold">S3</text>
  <text x="622" y="196" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#666">Object Storage</text>

  <!-- Arrow: URL returned -->
  <path d="M548,190 L432,190" stroke="#1565C0" stroke-width="2" fill="none" stroke-dasharray="6,4" marker-end="url(#arr-pd-b)"/>

  <!-- Arrow: URL to Client -->
  <path d="M282,190 L170,190" stroke="#1565C0" stroke-width="2" fill="none" stroke-dasharray="6,4" marker-end="url(#arr-pd-b)"/>
  <text x="224" y="205" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1565C0">302 Redirect or URL</text>

  <!-- Arrow 3: Client downloads directly from S3 -->
  <path d="M105,210 C105,300 350,320 622,210" stroke="#2E7D32" stroke-width="3" fill="none" marker-end="url(#arr-pd-g)"/>
  <text x="370" y="296" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#2E7D32" font-weight="bold">Direct download from S3</text>
  <text x="370" y="316" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#2E7D32">App server bandwidth = 0</text>

  <!-- Step labels -->
  <rect x="40" y="68" width="240" height="60" rx="6" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="1"/>
  <text x="55" y="88" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F" font-weight="bold">Step 1:</text>
  <text x="115" y="88" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Request file access</text>
  <text x="55" y="105" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F" font-weight="bold">Step 2:</text>
  <text x="115" y="105" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Get presigned URL</text>
  <text x="55" y="122" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#2E7D32" font-weight="bold">Step 3:</text>
  <text x="115" y="122" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#2E7D32">Download directly from S3</text>

  <!-- Watermark -->
  <text x="878" y="412" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.22">systemdesignlaws.xyz</text>
</svg>