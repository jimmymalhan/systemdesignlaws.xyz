<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420">
<rect width="900" height="420" fill="#FFFFFF"/>

<text x="450" y="35" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="20" font-weight="bold" fill="#1B1B1F">Crash Mid-Workflow: The Core Problem</text>
<rect x="50" y="70" width="140" height="45" rx="8" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
<text x="120" y="97" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F">1. Payment OK</text>
<line x1="190" y1="92" x2="230" y2="92" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>
<rect x="230" y="70" width="160" height="45" rx="8" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
<text x="310" y="97" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F">2. Inventory OK</text>
<line x1="390" y1="92" x2="430" y2="92" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>
<rect x="430" y="70" width="160" height="45" rx="8" fill="#FFEBEE" stroke="#1B1B1F" stroke-width="2"/>
<text x="510" y="90" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#1B1B1F">CRASH</text>
<text x="510" y="106" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Server dies here</text>
<rect x="630" y="70" width="140" height="45" rx="8" fill="#F3E5F5" stroke="#1B1B1F" stroke-width="2" stroke-dasharray="6,3"/>
<text x="700" y="97" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F" opacity="0.4">3. Shipping?</text>
<rect x="100" y="160" width="320" height="60" rx="10" fill="#FFEBEE" stroke="#1B1B1F" stroke-width="2"/>
<text x="260" y="183" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#1B1B1F">State After Crash</text>
<text x="260" y="205" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Payment: charged. Inventory: reserved. Shipping: never created.</text>
<rect x="480" y="160" width="320" height="60" rx="10" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
<text x="640" y="183" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#1B1B1F">User Experience</text>
<text x="640" y="205" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Charged $50. No shipping label. No confirmation email.</text>
<rect x="150" y="270" width="600" height="80" rx="10" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
<text x="450" y="295" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#1B1B1F">What We Need</text>
<text x="450" y="315" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">1. Resume from where we left off after crash</text>
<text x="450" y="335" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">2. Undo completed steps if we cannot continue (compensation)</text>
<defs><marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#1B1B1F"/></marker></defs>
<text x="878" y="412" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.22">systemdesignlaws.xyz</text>
</svg>