<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" style="background:#FFFFFF">
  <defs>
    <marker id="arr-nu" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0.5 L9,3.5 L0,6.5" fill="#1B1B1F" stroke="#1B1B1F" stroke-width="1"/>
    </marker>
    <marker id="arr-nu-r" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0.5 L9,3.5 L0,6.5" fill="#D32F2F" stroke="#D32F2F" stroke-width="1"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="22" fill="#1B1B1F" font-weight="bold">Naive Upload: Through the App Server</text>

  <!-- Client -->
  <rect x="40" y="160" width="130" height="60" rx="6" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
  <text x="105" y="186" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="15" fill="#1B1B1F" font-weight="bold">Client</text>
  <text x="105" y="206" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#666">500MB video</text>

  <!-- Arrow Client to App Server -->
  <path d="M170,190 L278,190" stroke="#D32F2F" stroke-width="2.5" fill="none" marker-end="url(#arr-nu-r)"/>
  <text x="224" y="180" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#D32F2F">500MB</text>

  <!-- App Server -->
  <rect x="282" y="140" width="150" height="100" rx="6" fill="#FFEBEE" stroke="#D32F2F" stroke-width="2"/>
  <text x="357" y="175" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="15" fill="#1B1B1F" font-weight="bold">App Server</text>
  <text x="357" y="195" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#D32F2F">Bottleneck!</text>
  <text x="357" y="215" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#D32F2F">CPU, Memory, Bandwidth</text>
  <text x="357" y="230" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#D32F2F">tied up for minutes</text>

  <!-- Arrow App Server to Object Storage -->
  <path d="M432,190 L548,190" stroke="#D32F2F" stroke-width="2.5" fill="none" marker-end="url(#arr-nu-r)"/>
  <text x="490" y="180" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#D32F2F">500MB</text>

  <!-- Object Storage -->
  <rect x="552" y="160" width="140" height="60" rx="6" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
  <text x="622" y="186" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="15" fill="#1B1B1F" font-weight="bold">S3</text>
  <text x="622" y="206" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#666">Object Storage</text>

  <!-- Arrow App Server to DB -->
  <path d="M357,240 L357,280" stroke="#1B1B1F" stroke-width="2" fill="none" marker-end="url(#arr-nu)"/>

  <!-- Database -->
  <rect x="282" y="284" width="150" height="50" rx="6" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
  <text x="357" y="314" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F">Metadata DB</text>

  <!-- Problem callouts -->
  <rect x="570" y="60" width="290" height="80" rx="8" fill="#FFEBEE" stroke="#D32F2F" stroke-width="2"/>
  <text x="715" y="82" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#D32F2F" font-weight="bold">Problems</text>
  <text x="590" y="100" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">- Server memory consumed by file</text>
  <text x="590" y="116" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">- Bandwidth doubled (in + out)</text>
  <text x="590" y="132" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">- Server blocked during transfer</text>

  <!-- Red X marks -->
  <text x="357" y="148" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="20" fill="#D32F2F">X</text>

  <!-- Legend -->
  <rect x="40" y="360" width="350" height="35" rx="6" fill="#FAFAFA" stroke="#DDD" stroke-width="1"/>
  <text x="60" y="382" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#D32F2F" font-weight="bold">Anti-pattern:</text>
  <text x="160" y="382" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">File passes through app server twice</text>

  <!-- Watermark -->
  <text x="878" y="412" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.22">systemdesignlaws.xyz</text>
</svg>