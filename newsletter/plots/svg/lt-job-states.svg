<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" width="900" height="420">
  <rect x="0" y="0" width="900" height="420" fill="#FFFFFF"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1B1B1F"/>
    </marker>
  </defs>
  <text x="450" y="35" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="22" fill="#1B1B1F" font-weight="bold">Job State Machine</text>
  <!-- States -->
  <rect x="50" y="160" width="120" height="50" rx="25" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
  <text x="110" y="190" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F">PENDING</text>
  <rect x="230" y="160" width="120" height="50" rx="25" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
  <text x="290" y="190" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F">QUEUED</text>
  <rect x="410" y="160" width="140" height="50" rx="25" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
  <text x="480" y="190" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F">PROCESSING</text>
  <rect x="620" y="100" width="120" height="50" rx="25" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
  <text x="680" y="130" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F">COMPLETE</text>
  <rect x="620" y="220" width="120" height="50" rx="25" fill="#FFEBEE" stroke="#1B1B1F" stroke-width="2"/>
  <text x="680" y="250" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F">FAILED</text>
  <rect x="790" y="220" width="90" height="50" rx="25" fill="#FFEBEE" stroke="#1B1B1F" stroke-width="2"/>
  <text x="835" y="250" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">DEAD</text>
  <!-- Arrows between states -->
  <line x1="170" y1="185" x2="228" y2="185" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="199" y="178" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">enqueue</text>
  <line x1="350" y1="185" x2="408" y2="185" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="379" y="178" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">pick up</text>
  <line x1="550" y1="170" x2="618" y2="130" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="590" y="140" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">success</text>
  <line x1="550" y1="200" x2="618" y2="240" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="590" y="230" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">error</text>
  <!-- Retry arrow -->
  <path d="M 680 270 Q 680 320 480 320 Q 290 320 290 212" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arrow)" fill="none" stroke-dasharray="6,3"/>
  <text x="490" y="340" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">retry (if attempts &lt; max)</text>
  <!-- Dead letter -->
  <line x1="740" y1="245" x2="788" y2="245" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="764" y="238" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="9" fill="#1B1B1F">max retries</text>
  <!-- Legend -->
  <rect x="50" y="370" width="800" height="35" rx="6" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="1"/>
  <text x="450" y="393" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F">Track state transitions to provide clients accurate status and enable retry logic</text>
  <text x="878" y="412" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.22">systemdesignlaws.xyz</text>
</svg>