<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420">
<rect width="900" height="420" fill="#FFFFFF"/>
<defs>
  <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
    <path d="M0,0.5 L9,3.5 L0,6.5" fill="#1B1B1F" stroke="#1B1B1F" stroke-width="1"/>
  </marker>
</defs>

<!-- Title -->
<text x="450" y="32" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="20" font-weight="bold" fill="#1B1B1F">Job Dependencies: DAG Execution</text>
<text x="450" y="52" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F" opacity="0.6">Some tasks depend on others. Model as a directed acyclic graph.</text>

<!-- DAG example -->
<rect x="350" y="70" width="200" height="40" rx="8" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
<text x="450" y="95" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#1B1B1F">Upload Video</text>

<line x1="380" y1="110" x2="200" y2="145" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>
<line x1="450" y1="110" x2="450" y2="145" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>
<line x1="520" y1="110" x2="700" y2="145" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>

<!-- Level 2: parallel tasks -->
<rect x="100" y="150" width="200" height="40" rx="8" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
<text x="200" y="175" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Extract Audio</text>

<rect x="350" y="150" width="200" height="40" rx="8" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
<text x="450" y="175" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Generate Thumbnails</text>

<rect x="600" y="150" width="200" height="40" rx="8" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
<text x="700" y="175" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Transcode 1080p</text>

<!-- Level 3 -->
<line x1="200" y1="190" x2="200" y2="225" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>
<line x1="700" y1="190" x2="600" y2="225" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>

<rect x="100" y="230" width="200" height="40" rx="8" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
<text x="200" y="255" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Transcribe (Speech-to-Text)</text>

<rect x="500" y="230" width="200" height="40" rx="8" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
<text x="600" y="255" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Transcode 720p, 480p</text>

<!-- Level 4: converge -->
<line x1="200" y1="270" x2="350" y2="305" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>
<line x1="450" y1="190" x2="450" y2="305" stroke="#1B1B1F" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
<line x1="600" y1="270" x2="550" y2="305" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>

<rect x="340" y="310" width="220" height="40" rx="8" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
<text x="450" y="335" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#1B1B1F">Publish (all done)</text>

<!-- Labels -->
<text x="100" y="310" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.6">Parallel where possible</text>
<text x="100" y="326" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.6">Sequential where required</text>

<!-- Key insight -->
<rect x="40" y="370" width="400" height="35" rx="6" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="1.5"/>
<text x="240" y="392" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Job starts when all dependencies complete.</text>

<rect x="470" y="370" width="390" height="35" rx="6" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="1.5"/>
<text x="665" y="392" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Use: Airflow, Temporal, or custom DAG scheduler.</text>

<!-- Watermark -->
<text x="878" y="412" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.22">systemdesignlaws.xyz</text>
</svg>