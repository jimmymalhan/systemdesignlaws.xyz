<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420">
<rect width="900" height="420" fill="#FFFFFF"/>

<text x="450" y="30" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="20" font-weight="bold" fill="#1B1B1F">Retry with Exponential Backoff</text>
<text x="450" y="50" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F" opacity="0.6">Workflow engines retry failed activities automatically with increasing delay</text>
<rect x="50" y="80" width="130" height="45" rx="8" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
<text x="115" y="107" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Activity Call</text>
<line x1="180" y1="102" x2="220" y2="102" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>
<rect x="220" y="80" width="110" height="45" rx="8" fill="#FFEBEE" stroke="#1B1B1F" stroke-width="2"/>
<text x="275" y="100" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#1B1B1F">FAIL</text>
<text x="275" y="115" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">Attempt 1</text>
<line x1="330" y1="102" x2="370" y2="102" stroke="#1B1B1F" stroke-width="2"/>
<rect x="370" y="80" width="90" height="45" rx="8" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
<text x="415" y="100" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Wait 1s</text>
<text x="415" y="115" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">Backoff</text>
<line x1="460" y1="102" x2="500" y2="102" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>
<rect x="500" y="80" width="110" height="45" rx="8" fill="#FFEBEE" stroke="#1B1B1F" stroke-width="2"/>
<text x="555" y="100" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#1B1B1F">FAIL</text>
<text x="555" y="115" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">Attempt 2</text>
<line x1="610" y1="102" x2="650" y2="102" stroke="#1B1B1F" stroke-width="2"/>
<rect x="650" y="80" width="90" height="45" rx="8" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
<text x="695" y="100" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Wait 2s</text>
<text x="695" y="115" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">Backoff</text>
<line x1="740" y1="102" x2="780" y2="102" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>
<rect x="780" y="80" width="90" height="45" rx="8" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
<text x="825" y="107" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#1B1B1F">SUCCESS</text>
<rect x="100" y="170" width="700" height="65" rx="10" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
<text x="450" y="195" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#1B1B1F">Retry Policy Configuration</text>
<text x="450" y="215" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Initial interval: 1s. Backoff multiplier: 2x. Max attempts: 5. Max interval: 30s.</text>
<text x="450" y="227" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">1s, 2s, 4s, 8s, 16s (capped at 30s)</text>
<rect x="100" y="270" width="330" height="90" rx="10" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
<text x="265" y="295" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#1B1B1F">Transient Failures</text>
<text x="265" y="315" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Network timeout, service overloaded</text>
<text x="265" y="332" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Retry with backoff is effective</text>
<text x="265" y="349" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" font-weight="bold">Action: Retry automatically</text>
<rect x="470" y="270" width="330" height="90" rx="10" fill="#FFEBEE" stroke="#1B1B1F" stroke-width="2"/>
<text x="635" y="295" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#1B1B1F">Permanent Failures</text>
<text x="635" y="315" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Invalid input, business rule violation</text>
<text x="635" y="332" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Retry will not help</text>
<text x="635" y="349" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" font-weight="bold">Action: Compensate immediately</text>
<defs><marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#1B1B1F"/></marker></defs>
<text x="878" y="412" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.22">systemdesignlaws.xyz</text>
</svg>