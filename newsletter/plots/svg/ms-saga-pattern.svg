<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420">
<rect width="900" height="420" fill="#FFFFFF"/>

<text x="450" y="35" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="20" font-weight="bold" fill="#1B1B1F">Saga Pattern: Forward and Compensate</text>
<text x="450" y="55" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F" opacity="0.6">Each step has a compensating action that undoes it on failure</text>
<rect x="60" y="90" width="140" height="60" rx="8" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
<text x="130" y="115" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#1B1B1F">Step 1</text>
<text x="130" y="135" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Charge Payment</text>
<line x1="200" y1="120" x2="250" y2="120" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>
<rect x="250" y="90" width="140" height="60" rx="8" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
<text x="320" y="115" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#1B1B1F">Step 2</text>
<text x="320" y="135" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Reserve Inventory</text>
<line x1="390" y1="120" x2="440" y2="120" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>
<rect x="440" y="90" width="140" height="60" rx="8" fill="#FFEBEE" stroke="#1B1B1F" stroke-width="2"/>
<text x="510" y="115" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#1B1B1F">Step 3 FAILS</text>
<text x="510" y="135" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Create Shipping</text>
<text x="450" y="185" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#1B1B1F">Compensating Actions (Reverse Order)</text>
<line x1="510" y1="150" x2="510" y2="210" stroke="#1B1B1F" stroke-width="2" stroke-dasharray="6,3"/>
<rect x="440" y="210" width="140" height="50" rx="8" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
<text x="510" y="240" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Undo: Release Stock</text>
<line x1="440" y1="235" x2="390" y2="235" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arrl)"/>
<rect x="250" y="210" width="140" height="50" rx="8" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
<text x="320" y="240" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Undo: Refund</text>
<rect x="100" y="300" width="700" height="50" rx="10" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
<text x="450" y="330" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F">Saga guarantees: all steps complete OR all completed steps are compensated</text>
<defs><marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#1B1B1F"/></marker><marker id="arrl" viewBox="0 0 10 10" refX="1" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 10 0 L 0 5 L 10 10 z" fill="#1B1B1F"/></marker></defs>
<text x="878" y="412" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.22">systemdesignlaws.xyz</text>
</svg>