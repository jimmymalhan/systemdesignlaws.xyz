<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333333"/>
    </marker>
    <marker id="arrow-right" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#888888"/>
    </marker>
  </defs>
  <rect width="800" height="480" fill="#ffffff"/>

  <!-- Title -->
  <text x="400" y="34" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Real-Time Updates: Full System Summary</text>
  <text x="400" y="54" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#555555" text-anchor="middle">Two independent decisions: Hop 1 (client-to-server protocol) and Hop 2 (server-to-source)</text>

  <!-- Hop 1 Box -->
  <rect x="30" y="70" width="355" height="260" rx="10" fill="#f5f9ff" stroke="#4a90d9" stroke-width="2.5"/>
  <rect x="30" y="70" width="355" height="40" rx="10" fill="#4a90d9"/>
  <rect x="30" y="98" width="355" height="12" fill="#4a90d9"/>
  <text x="207" y="96" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">Hop 1: Client-to-Server Protocol</text>

  <!-- Hop 1 options (spectrum) -->
  <text x="50" y="134" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#d4a017">Polling (2-30s interval)</text>
  <text x="50" y="150" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#555555">Simplest. HTTP GET on timer. Works everywhere.</text>
  <text x="50" y="164" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#555555">Use for: dashboards, activity feeds, status pages.</text>

  <line x1="50" y1="173" x2="365" y2="173" stroke="#e0e8f0" stroke-width="1"/>

  <text x="50" y="190" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#e67e22">Long Polling (near real-time)</text>
  <text x="50" y="206" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#555555">Server holds request until event. Near-RT but overhead.</text>
  <text x="50" y="220" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#555555">Use for: when WebSocket/SSE blocked by infrastructure.</text>

  <line x1="50" y1="229" x2="365" y2="229" stroke="#e0e8f0" stroke-width="1"/>

  <text x="50" y="246" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#27ae60">SSE (server-to-client streaming)</text>
  <text x="50" y="262" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#555555">One HTTP connection, server pushes chunks. Auto-reconnect.</text>
  <text x="50" y="276" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#555555">Use for: notifications, feeds, live comments (one-way).</text>

  <line x1="50" y1="285" x2="365" y2="285" stroke="#e0e8f0" stroke-width="1"/>

  <text x="50" y="302" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#8e44ad">WebSocket (bidirectional)</text>
  <text x="50" y="318" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#555555">Full duplex. HTTP upgrades to ws://. L4 LB required.</text>
  <text x="50" y="332" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#555555">Use for: chat, collaborative editing, multiplayer games.</text>

  <!-- Hop 2 Box -->
  <rect x="415" y="70" width="355" height="260" rx="10" fill="#f5fff5" stroke="#4ab54a" stroke-width="2.5"/>
  <rect x="415" y="70" width="355" height="40" rx="10" fill="#4ab54a"/>
  <rect x="415" y="98" width="355" height="12" fill="#4ab54a"/>
  <text x="592" y="96" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#ffffff" text-anchor="middle">Hop 2: Server-to-Source Pattern</text>

  <text x="435" y="134" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#d4a017">Pull Polling (DB query loop)</text>
  <text x="435" y="150" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#555555">Servers query DB for new rows periodically.</text>
  <text x="435" y="164" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#555555">Use when: low server count (&lt;10), simple queries.</text>

  <line x1="435" y1="173" x2="755" y2="173" stroke="#d8f0d8" stroke-width="1"/>

  <text x="435" y="190" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#2980b9">Consistent Hashing (stateful)</text>
  <text x="435" y="206" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#555555">User ID hashes to server. State stays local.</text>
  <text x="435" y="220" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#555555">Use when: user-specific state, doc sessions, per-entity.</text>

  <line x1="435" y1="229" x2="755" y2="229" stroke="#d8f0d8" stroke-width="1"/>

  <text x="435" y="246" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#c0392b">Pub/Sub (Kafka / Redis)</text>
  <text x="435" y="262" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#555555">Source publishes. All servers subscribed receive.</text>
  <text x="435" y="276" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#555555">Use when: stateless broadcast, any server serves any user.</text>

  <line x1="435" y1="285" x2="755" y2="285" stroke="#d8f0d8" stroke-width="1"/>

  <text x="435" y="302" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#8e44ad">Signaling Server (WebRTC)</text>
  <text x="435" y="318" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#555555">Lightweight broker for P2P session setup.</text>
  <text x="435" y="332" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#555555">Use when: audio/video calls, P2P data channels.</text>

  <!-- Complexity arrow -->
  <rect x="30" y="348" width="740" height="32" rx="6" fill="#f5f5f5" stroke="#cccccc" stroke-width="1"/>
  <text x="55" y="368" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#d4a017" font-weight="bold">Simple</text>
  <line x1="105" y1="364" x2="680" y2="364" stroke="#cccccc" stroke-width="1.5" marker-end="url(#arrow-right)"/>
  <text x="705" y="368" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#c0392b" font-weight="bold">Complex</text>

  <!-- Footer principle -->
  <rect x="30" y="392" width="740" height="74" rx="10" fill="#1a1a1a"/>
  <text x="400" y="416" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold" fill="#ffffff" text-anchor="middle">Golden Rule</text>
  <text x="400" y="438" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#cccccc" text-anchor="middle">Start with the simplest option that meets the latency and scale requirements.</text>
  <text x="400" y="456" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#cccccc" text-anchor="middle">Justify every step up the complexity ladder. Interviewers reward clear reasoning over clever choices.</text>
</svg>
