<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" style="background:#FFFFFF">
  <defs>
    <marker id="arr-gs-g" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2E7D32"/>
    </marker>
    <marker id="arr-gs-r" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#D32F2F"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="20" fill="#1B1B1F" font-weight="bold">Geographic Sharding</text>

  <!-- Simplified world outline: Americas -->
  <path d="M 60,100 Q 80,82 120,86 Q 160,82 180,100 Q 190,135 185,170 Q 175,205 160,222 Q 140,238 120,242 Q 100,238 90,222 Q 70,190 65,155 Z" fill="#F5F5F5" stroke="#DDD" stroke-width="1.5"/>
  <!-- Europe/Africa -->
  <path d="M 370,82 Q 400,72 430,77 Q 450,82 460,100 Q 465,128 455,162 Q 445,198 430,222 Q 415,235 400,230 Q 385,222 375,198 Q 365,162 365,128 Z" fill="#F5F5F5" stroke="#DDD" stroke-width="1.5"/>
  <!-- Asia -->
  <path d="M 650,78 Q 700,68 760,72 Q 810,78 830,95 Q 840,118 835,145 Q 825,172 800,190 Q 770,202 730,198 Q 690,192 665,172 Q 650,150 645,122 Z" fill="#F5F5F5" stroke="#DDD" stroke-width="1.5"/>

  <!-- US Region DB -->
  <rect x="55" y="262" width="190" height="75" rx="10" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
  <ellipse cx="150" cy="278" rx="40" ry="8" fill="#BBDEFB" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="150" y="308" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F" font-weight="bold">US DB</text>
  <text x="150" y="326" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">us-east-1</text>

  <!-- US Users -->
  <circle cx="100" cy="168" r="9" fill="#7BAFD4" stroke="#1B1B1F" stroke-width="1.5"/>
  <circle cx="130" cy="150" r="9" fill="#7BAFD4" stroke="#1B1B1F" stroke-width="1.5"/>
  <circle cx="145" cy="180" r="9" fill="#7BAFD4" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="130" y="208" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">US Users</text>

  <!-- Green arrow: US users to US DB (local) -->
  <line x1="130" y1="218" x2="145" y2="257" stroke="#2E7D32" stroke-width="2.5" marker-end="url(#arr-gs-g)"/>
  <rect x="80" y="228" width="50" height="18" rx="4" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1"/>
  <text x="105" y="241" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#2E7D32" font-weight="bold">~10ms</text>

  <!-- EU Region DB -->
  <rect x="355" y="262" width="190" height="75" rx="10" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
  <ellipse cx="450" cy="278" rx="40" ry="8" fill="#FFE0B2" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="450" y="308" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F" font-weight="bold">EU DB</text>
  <text x="450" y="326" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">eu-west-1</text>

  <!-- EU Users -->
  <circle cx="400" cy="140" r="9" fill="#FFB74D" stroke="#1B1B1F" stroke-width="1.5"/>
  <circle cx="430" cy="122" r="9" fill="#FFB74D" stroke="#1B1B1F" stroke-width="1.5"/>
  <circle cx="420" cy="158" r="9" fill="#FFB74D" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="420" y="185" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">EU Users</text>

  <!-- Green arrow: EU users to EU DB (local) -->
  <line x1="430" y1="195" x2="445" y2="257" stroke="#2E7D32" stroke-width="2.5" marker-end="url(#arr-gs-g)"/>
  <rect x="380" y="212" width="50" height="18" rx="4" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1"/>
  <text x="405" y="225" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#2E7D32" font-weight="bold">~10ms</text>

  <!-- Asia Region DB -->
  <rect x="655" y="262" width="190" height="75" rx="10" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
  <ellipse cx="750" cy="278" rx="40" ry="8" fill="#C8E6C9" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="750" y="308" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F" font-weight="bold">Asia DB</text>
  <text x="750" y="326" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">ap-southeast-1</text>

  <!-- Asia Users -->
  <circle cx="710" cy="140" r="9" fill="#81C784" stroke="#1B1B1F" stroke-width="1.5"/>
  <circle cx="740" cy="122" r="9" fill="#81C784" stroke="#1B1B1F" stroke-width="1.5"/>
  <circle cx="770" cy="150" r="9" fill="#81C784" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="740" y="178" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Asia Users</text>

  <!-- Green arrow: Asia users to Asia DB (local) -->
  <line x1="740" y1="188" x2="745" y2="257" stroke="#2E7D32" stroke-width="2.5" marker-end="url(#arr-gs-g)"/>
  <rect x="688" y="208" width="50" height="18" rx="4" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1"/>
  <text x="713" y="221" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#2E7D32" font-weight="bold">~10ms</text>

  <!-- Cross-region arrow: US DB to EU DB (red dashed, slow) -->
  <line x1="250" y1="298" x2="350" y2="298" stroke="#D32F2F" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arr-gs-r)"/>
  <rect x="265" y="278" width="68" height="18" rx="4" fill="#FFEBEE" stroke="#D32F2F" stroke-width="1"/>
  <text x="299" y="291" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#D32F2F" font-weight="bold">~200ms</text>

  <!-- Cross-region arrow: EU DB to Asia DB (red dashed, slow) -->
  <line x1="550" y1="298" x2="650" y2="298" stroke="#D32F2F" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arr-gs-r)"/>
  <rect x="565" y="278" width="68" height="18" rx="4" fill="#FFEBEE" stroke="#D32F2F" stroke-width="1"/>
  <text x="599" y="291" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#D32F2F" font-weight="bold">~200ms</text>

  <!-- Bottom label -->
  <rect x="250" y="355" width="400" height="32" rx="8" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
  <text x="450" y="376" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#2E7D32" font-weight="bold">Data locality = faster reads</text>

  <!-- Principle note -->
  <text x="450" y="405" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#555">Users always hit their nearest regional database</text>

  <!-- Watermark -->
  <text x="878" y="412" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.22">systemdesignlaws.xyz</text>
</svg>