<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" style="background:#FFFFFF">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0.5 L9,3.5 L0,6.5" fill="#1B1B1F" stroke="#1B1B1F" stroke-width="1"/>
    </marker>
  </defs>
  <text x="450" y="32" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="20" fill="#1B1B1F" font-weight="bold">Batching Writes</text>
  <text x="450" y="60" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F">Combine Individual Writes Into Bulk Operations</text>
  <rect x="30" y="80" width="380" height="130" rx="6" fill="#FFEBEE" stroke="#1B1B1F" stroke-width="2"/>
  <text x="220.0" y="150.0" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F" font-weight="bold">Without Batching</text>
  <rect x="50" y="115" width="38" height="30" rx="4" fill="#FFD5D5" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="69.0" y="134.0" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">W1</text>
  <rect x="94" y="115" width="38" height="30" rx="4" fill="#FFD5D5" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="113.0" y="134.0" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">W2</text>
  <rect x="138" y="115" width="38" height="30" rx="4" fill="#FFD5D5" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="157.0" y="134.0" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">W3</text>
  <rect x="182" y="115" width="38" height="30" rx="4" fill="#FFD5D5" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="201.0" y="134.0" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">W4</text>
  <rect x="226" y="115" width="38" height="30" rx="4" fill="#FFD5D5" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="245.0" y="134.0" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">W5</text>
  <rect x="270" y="115" width="38" height="30" rx="4" fill="#FFD5D5" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="289.0" y="134.0" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">W6</text>
  <rect x="314" y="115" width="38" height="30" rx="4" fill="#FFD5D5" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="333.0" y="134.0" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">W7</text>
  <rect x="358" y="115" width="38" height="30" rx="4" fill="#FFD5D5" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="377.0" y="134.0" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">W8</text>
  <text x="220" y="170" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#B71C1C">8 round trips, 8 tx, 8 index updates</text>
  <text x="220" y="190" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#B71C1C">= 8 disk syncs</text>
  <rect x="470" y="80" width="400" height="130" rx="6" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
  <text x="670.0" y="150.0" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F" font-weight="bold">With Batching</text>
  <rect x="510" y="115" width="320" height="30" rx="4" fill="#C8E6C9" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="670" y="135" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">W1, W2, W3, W4, W5, W6, W7, W8</text>
  <text x="670" y="170" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#2E7D32">1 round trip, 1 tx, 1 index pass</text>
  <text x="670" y="190" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#2E7D32">= 1 disk sync (10-50x faster)</text>
  <text x="450" y="240" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="15" fill="#1B1B1F">Three Batching Layers</text>
  <rect x="30" y="260" width="260" height="100" rx="6" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
  <text x="160.0" y="307.0" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F" font-weight="bold">App Layer</text>
  <text x="160.0" y="325.0" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#555">Buffer before sending</text>
  <text x="160" y="325" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#555">Kafka consumer batches</text>
  <rect x="320" y="260" width="260" height="100" rx="6" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
  <text x="450.0" y="307.0" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F" font-weight="bold">Intermediate</text>
  <text x="450.0" y="325.0" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#555">Like Batcher</text>
  <text x="450" y="325" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#555">100 likes = 1 counter update</text>
  <rect x="610" y="260" width="260" height="100" rx="6" fill="#F3E5F5" stroke="#1B1B1F" stroke-width="2"/>
  <text x="740.0" y="307.0" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F" font-weight="bold">DB Layer</text>
  <text x="740.0" y="325.0" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#555">Redis periodic flush</text>
  <text x="740" y="325" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#555">1000 ops = 1 disk write</text>

  <text x="878" y="412" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.22">systemdesignlaws.xyz</text>
</svg>