<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" width="900" height="420">
  <rect x="0" y="0" width="900" height="420" fill="#FFFFFF"/>
  <text x="450" y="35" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="22" fill="#1B1B1F" font-weight="bold">Exponential Backoff - Delay Growth</text>
  <!-- Y axis -->
  <line x1="100" y1="60" x2="100" y2="350" stroke="#1B1B1F" stroke-width="2"/>
  <text x="50" y="210" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F" transform="rotate(-90, 50, 210)">Delay (seconds)</text>
  <!-- X axis -->
  <line x1="100" y1="350" x2="820" y2="350" stroke="#1B1B1F" stroke-width="2"/>
  <text x="460" y="395" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F">Retry Attempt</text>
  <!-- Y labels -->
  <text x="90" y="348" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">0s</text>
  <text x="90" y="290" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">1s</text>
  <text x="90" y="230" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">2s</text>
  <text x="90" y="170" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">4s</text>
  <text x="90" y="110" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">8s</text>
  <text x="90" y="75" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">16s</text>
  <!-- Grid lines -->
  <line x1="100" y1="290" x2="820" y2="290" stroke="#1B1B1F" stroke-width="0.5" opacity="0.2"/>
  <line x1="100" y1="230" x2="820" y2="230" stroke="#1B1B1F" stroke-width="0.5" opacity="0.2"/>
  <line x1="100" y1="170" x2="820" y2="170" stroke="#1B1B1F" stroke-width="0.5" opacity="0.2"/>
  <line x1="100" y1="110" x2="820" y2="110" stroke="#1B1B1F" stroke-width="0.5" opacity="0.2"/>
  <!-- Bars - exponential -->
  <rect x="160" y="290" width="80" height="60" rx="4" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
  <text x="200" y="370" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">1</text>
  <text x="200" y="282" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">1s</text>
  <rect x="290" y="230" width="80" height="120" rx="4" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
  <text x="330" y="370" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">2</text>
  <text x="330" y="222" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">2s</text>
  <rect x="420" y="170" width="80" height="180" rx="4" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
  <text x="460" y="370" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">3</text>
  <text x="460" y="162" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">4s</text>
  <rect x="550" y="110" width="80" height="240" rx="4" fill="#FFEBEE" stroke="#1B1B1F" stroke-width="2"/>
  <text x="590" y="370" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">4</text>
  <text x="590" y="102" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">8s</text>
  <rect x="680" y="75" width="80" height="275" rx="4" fill="#FFEBEE" stroke="#1B1B1F" stroke-width="2"/>
  <text x="720" y="370" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">5</text>
  <text x="720" y="67" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">16s</text>
  <!-- Cap note -->
  <rect x="610" y="370" width="260" height="30" rx="4" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="1"/>
  <text x="740" y="390" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Cap at max_delay (e.g. 60s) to limit wait</text>
  <text x="878" y="412" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.22">systemdesignlaws.xyz</text>
</svg>