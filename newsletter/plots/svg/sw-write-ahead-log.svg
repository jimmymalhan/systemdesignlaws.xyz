<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" style="background:#FFFFFF">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0.5 L9,3.5 L0,6.5" fill="#1B1B1F" stroke="#1B1B1F" stroke-width="1"/>
    </marker>
  </defs>
  <text x="450" y="32" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="20" fill="#1B1B1F" font-weight="bold">Write-Ahead Log (WAL)</text>
  <text x="450" y="60" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F">Write-Ahead Log: Durability Before Performance</text>
  <rect x="50" y="90" width="150" height="50" rx="6" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
  <text x="125.0" y="120.0" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F" font-weight="bold">Application</text>
  <rect x="300" y="80" width="250" height="70" rx="6" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
  <text x="425.0" y="112.0" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F" font-weight="bold">Write-Ahead Log</text>
  <text x="425.0" y="130.0" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#555">Sequential disk writes</text>
  <line x1="200" y1="115" x2="300" y2="115" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="650" y="80" width="200" height="70" rx="6" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
  <text x="750.0" y="112.0" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F" font-weight="bold">In-Memory Table</text>
  <text x="750.0" y="130.0" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#555">MemTable</text>
  <line x1="550" y1="115" x2="650" y2="115" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>
  <text x="150" y="190" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#555">Step 1: Write to WAL</text>
  <text x="450" y="190" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#555">Step 2: Apply to memory</text>
  <text x="750" y="190" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#555">Step 3: Ack client</text>
  <rect x="100" y="220" width="700" height="80" rx="6" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
  <text x="450.0" y="265.0" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F" font-weight="bold">Why WAL Is Fast</text>
  <text x="450" y="260" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F">Sequential writes: 100-200 MB/s (HDD) vs 5-10 MB/s random writes</text>
  <text x="450" y="280" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F">Crash recovery: replay WAL to rebuild in-memory state</text>
  <rect x="100" y="330" width="700" height="60" rx="6" fill="#F3E5F5" stroke="#1B1B1F" stroke-width="2"/>
  <text x="450.0" y="365.0" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F" font-weight="bold">Tuning: WAL Batch Sync</text>
  <text x="450" y="365" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F">PostgreSQL: group multiple transactions into one fsync = 10x throughput</text>

  <text x="878" y="412" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.22">systemdesignlaws.xyz</text>
