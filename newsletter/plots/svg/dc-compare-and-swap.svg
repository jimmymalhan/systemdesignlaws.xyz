<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" style="background:#FFFFFF">
  <defs>
    <marker id="arr-cas" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0.5 L9,3.5 L0,6.5" fill="#1B1B1F" stroke="#1B1B1F" stroke-width="1"/>
    </marker>
  </defs>
  <text x="450" y="32" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="22" fill="#1B1B1F" font-weight="bold">Compare-And-Swap (CAS): Atomic Check + Update</text>

  <!-- CAS operation box -->
  <rect x="140" y="55" width="620" height="100" rx="6" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="2"/>
  <text x="450" y="78" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="15" fill="#7B1FA2" font-weight="bold">CAS: One atomic instruction</text>

  <text x="200" y="105" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F" font-weight="bold">1. Read current value</text>
  <text x="200" y="125" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F" font-weight="bold">2. Compare with expected</text>
  <text x="200" y="145" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F" font-weight="bold">3. Swap only if match</text>

  <text x="520" y="105" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#7B1FA2">UPDATE ... SET seats=0, version=43</text>
  <text x="520" y="125" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#7B1FA2">WHERE id=1 AND version=42</text>
  <text x="520" y="145" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#7B1FA2">(All in one atomic statement)</text>

  <!-- Success path -->
  <rect x="30" y="175" width="410" height="115" rx="6" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="235" y="198" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#2E7D32" font-weight="bold">Match: Swap succeeds</text>

  <rect x="50" y="210" width="140" height="28" rx="4" fill="#FFFFFF" stroke="#2E7D32" stroke-width="1"/>
  <text x="120" y="229" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Current: v=42</text>

  <text x="210" y="229" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#2E7D32">=</text>

  <rect x="230" y="210" width="140" height="28" rx="4" fill="#FFFFFF" stroke="#2E7D32" stroke-width="1"/>
  <text x="300" y="229" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Expected: v=42</text>

  <text x="235" y="265" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#2E7D32" font-weight="bold">1 row affected. Update applied. v becomes 43.</text>

  <!-- Failure path -->
  <rect x="460" y="175" width="410" height="115" rx="6" fill="#FFEBEE" stroke="#D32F2F" stroke-width="1.5"/>
  <text x="665" y="198" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#D32F2F" font-weight="bold">Mismatch: Swap rejected</text>

  <rect x="480" y="210" width="140" height="28" rx="4" fill="#FFFFFF" stroke="#D32F2F" stroke-width="1"/>
  <text x="550" y="229" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Current: v=43</text>

  <text x="640" y="229" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#D32F2F">!=</text>

  <rect x="660" y="210" width="140" height="28" rx="4" fill="#FFFFFF" stroke="#D32F2F" stroke-width="1"/>
  <text x="730" y="229" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Expected: v=42</text>

  <text x="665" y="265" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#D32F2F" font-weight="bold">0 rows affected. Someone else changed it. Retry.</text>

  <!-- Where CAS is used -->
  <text x="450" y="315" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="15" fill="#1B1B1F" font-weight="bold">CAS Pattern Everywhere</text>

  <rect x="30" y="330" width="200" height="65" rx="6" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="130" y="352" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F" font-weight="bold">SQL databases</text>
  <text x="130" y="370" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">UPDATE WHERE v=X</text>
  <text x="130" y="386" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Check affected rows</text>

  <rect x="250" y="330" width="200" height="65" rx="6" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="350" y="352" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F" font-weight="bold">DynamoDB</text>
  <text x="350" y="370" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">ConditionExpression</text>
  <text x="350" y="386" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Attribute = expected</text>

  <rect x="470" y="330" width="200" height="65" rx="6" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="570" y="352" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F" font-weight="bold">Redis</text>
  <text x="570" y="370" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">WATCH + MULTI/EXEC</text>
  <text x="570" y="386" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Aborts if key changed</text>

  <rect x="690" y="330" width="180" height="65" rx="6" fill="#F3E5F5" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="780" y="352" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F" font-weight="bold">CPU hardware</text>
  <text x="780" y="370" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">CMPXCHG instruction</text>
  <text x="780" y="386" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Lock-free structures</text>

  <text x="878" y="412" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.22">systemdesignlaws.xyz</text>
</svg>