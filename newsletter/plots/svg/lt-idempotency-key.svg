<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" width="900" height="420">
  <rect x="0" y="0" width="900" height="420" fill="#FFFFFF"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1B1B1F"/>
    </marker>
  </defs>
  <text x="450" y="35" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="22" fill="#1B1B1F" font-weight="bold">Idempotency Key Pattern</text>
  <!-- First execution -->
  <text x="450" y="70" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="16" fill="#1B1B1F" font-weight="bold">First Execution</text>
  <rect x="50" y="85" width="150" height="45" rx="6" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
  <text x="125" y="108" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Worker receives</text>
  <text x="125" y="123" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">task (key: abc-123)</text>
  <line x1="200" y1="107" x2="258" y2="107" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="260" y="85" width="160" height="45" rx="6" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
  <text x="340" y="108" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Check: abc-123</text>
  <text x="340" y="123" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">in DB? NO</text>
  <line x1="420" y1="107" x2="478" y2="107" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="480" y="85" width="140" height="45" rx="6" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
  <text x="550" y="108" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Execute task</text>
  <text x="550" y="123" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Send email</text>
  <line x1="620" y1="107" x2="678" y2="107" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="680" y="85" width="170" height="45" rx="6" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
  <text x="765" y="108" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Store abc-123 in DB</text>
  <text x="765" y="123" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">with result</text>
  <!-- Duplicate execution -->
  <text x="450" y="170" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="16" fill="#1B1B1F" font-weight="bold">Duplicate Execution (Retry)</text>
  <rect x="50" y="185" width="150" height="45" rx="6" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
  <text x="125" y="208" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Worker receives</text>
  <text x="125" y="223" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">task (key: abc-123)</text>
  <line x1="200" y1="207" x2="258" y2="207" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="260" y="185" width="160" height="45" rx="6" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
  <text x="340" y="208" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Check: abc-123</text>
  <text x="340" y="223" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">in DB? YES</text>
  <line x1="420" y1="207" x2="478" y2="207" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="480" y="185" width="200" height="45" rx="6" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
  <text x="580" y="208" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Skip execution</text>
  <text x="580" y="223" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Return stored result</text>
  <!-- Key generation strategies -->
  <rect x="50" y="265" width="380" height="120" rx="8" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
  <text x="240" y="290" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F" font-weight="bold">How to Generate Idempotency Keys</text>
  <text x="240" y="315" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Client-generated UUID per request</text>
  <text x="240" y="335" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Hash of (user_id + action + parameters)</text>
  <text x="240" y="355" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Job ID assigned at submission time</text>
  <text x="240" y="375" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Natural key: (order_id + step_name)</text>
  <!-- Use cases -->
  <rect x="470" y="265" width="380" height="120" rx="8" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
  <text x="660" y="290" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F" font-weight="bold">Critical For</text>
  <text x="660" y="315" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Payment processing (no double charge)</text>
  <text x="660" y="335" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Email sending (no duplicate emails)</text>
  <text x="660" y="355" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Inventory reservation (no double reserve)</text>
  <text x="660" y="375" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Any side-effect-producing operation</text>
  <text x="878" y="412" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.22">systemdesignlaws.xyz</text>
</svg>