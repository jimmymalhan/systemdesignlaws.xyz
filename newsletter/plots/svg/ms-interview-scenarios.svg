<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420">
<rect width="900" height="420" fill="#FFFFFF"/>

<!-- Title -->
<text x="450" y="32" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="20" font-weight="bold" fill="#1B1B1F">Interview Scenarios: Multi-step Processes</text>
<text x="450" y="52" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F" opacity="0.6">When to introduce workflows vs simpler solutions</text>

<!-- Scenario 1: Use workflows -->
<rect x="40" y="70" width="390" height="150" rx="8" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
<text x="235" y="92" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#1B1B1F">USE Workflow Engines</text>

<text x="60" y="115" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Payment Systems</text>
<text x="60" y="132" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.7">Multi-step, compensation, idempotency</text>

<text x="60" y="152" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Uber / Ride-sharing</text>
<text x="60" y="169" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.7">Human-in-the-loop, long waits, signals</text>

<text x="60" y="189" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Loan / Insurance Processing</text>
<text x="60" y="206" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.7">Days-long waits, document signing, approval</text>

<!-- Scenario 2: Do NOT use -->
<rect x="470" y="70" width="390" height="150" rx="8" fill="#FFEBEE" stroke="#1B1B1F" stroke-width="2"/>
<text x="665" y="92" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#1B1B1F">DO NOT USE Workflow Engines</text>

<text x="490" y="115" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Image Resize, Email Send</text>
<text x="490" y="132" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.7">Single step. Use a message queue.</text>

<text x="490" y="152" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Synchronous API Calls</text>
<text x="490" y="169" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.7">Client waits. Latency matters. No workflow.</text>

<text x="490" y="189" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Millions of Tiny Operations</text>
<text x="490" y="206" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.7">High frequency, low value. Overhead too high.</text>

<!-- What to say box -->
<rect x="40" y="240" width="820" height="70" rx="8" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
<text x="450" y="262" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#1B1B1F">What to Say in the Interview</text>
<text x="450" y="282" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">"I look for multi-step processes with partial failure risk, human waits, or compensation needs.</text>
<text x="450" y="298" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">For those, I default to Temporal. For single-step async, a message queue suffices."</text>

<!-- Trigger phrases -->
<rect x="40" y="330" width="820" height="70" rx="8" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
<text x="450" y="352" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#1B1B1F">Trigger Phrases to Listen For</text>
<text x="60" y="375" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">"if step X fails, undo step Y"</text>
<text x="320" y="375" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">"wait for user to approve"</text>
<text x="560" y="375" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">"ensure all steps complete or none do"</text>
<text x="60" y="393" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">"process takes days"</text>
<text x="320" y="393" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">"need audit trail"</text>
<text x="560" y="393" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">"what if the server crashes halfway?"</text>

<!-- Watermark -->
<text x="878" y="412" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.22">systemdesignlaws.xyz</text>
</svg>