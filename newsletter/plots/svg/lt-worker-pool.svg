<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" width="900" height="420">
  <rect x="0" y="0" width="900" height="420" fill="#FFFFFF"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1B1B1F"/>
    </marker>
  </defs>
  <text x="450" y="35" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="22" fill="#1B1B1F" font-weight="bold">Worker Pool Scaling</text>
  <!-- Queue -->
  <rect x="50" y="140" width="180" height="120" rx="8" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
  <text x="140" y="170" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="16" fill="#1B1B1F" font-weight="bold">Message Queue</text>
  <rect x="70" y="185" width="140" height="20" rx="3" fill="#FFFFFF" stroke="#1B1B1F" stroke-width="1"/>
  <text x="140" y="200" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">task-1 | task-2 | task-3</text>
  <rect x="70" y="210" width="140" height="20" rx="3" fill="#FFFFFF" stroke="#1B1B1F" stroke-width="1"/>
  <text x="140" y="225" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">task-4 | task-5 | task-6</text>
  <!-- Worker Pool Box -->
  <rect x="310" y="60" width="280" height="310" rx="10" fill="none" stroke="#1B1B1F" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="450" y="85" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="16" fill="#1B1B1F" font-weight="bold">Worker Pool</text>
  <!-- Workers -->
  <rect x="340" y="100" width="110" height="50" rx="6" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
  <text x="395" y="122" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F">Worker 1</text>
  <text x="395" y="140" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">processing task-1</text>
  <rect x="340" y="165" width="110" height="50" rx="6" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
  <text x="395" y="187" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F">Worker 2</text>
  <text x="395" y="205" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">processing task-2</text>
  <rect x="340" y="230" width="110" height="50" rx="6" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
  <text x="395" y="252" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F">Worker 3</text>
  <text x="395" y="270" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">idle - ready</text>
  <rect x="340" y="295" width="110" height="50" rx="6" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
  <text x="395" y="317" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F">Worker N</text>
  <text x="395" y="335" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">idle - ready</text>
  <!-- Autoscaler -->
  <rect x="470" y="130" width="100" height="90" rx="6" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
  <text x="520" y="155" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F" font-weight="bold">Autoscaler</text>
  <text x="520" y="175" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Queue depth</text>
  <text x="520" y="195" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">> threshold?</text>
  <text x="520" y="210" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Add workers</text>
  <!-- Arrows -->
  <line x1="230" y1="180" x2="338" y2="130" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="230" y1="200" x2="338" y2="190" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Result Store -->
  <rect x="670" y="155" width="180" height="90" rx="8" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
  <text x="760" y="185" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F" font-weight="bold">Result Store</text>
  <text x="760" y="210" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">job_id: status</text>
  <text x="760" y="230" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">job_id: result_url</text>
  <!-- Worker to Result -->
  <line x1="450" y1="130" x2="668" y2="185" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Summary -->
  <rect x="100" y="380" width="700" height="30" rx="6" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="1"/>
  <text x="450" y="400" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F">Scale workers independently of API servers. Add workers when queue depth grows.</text>
  <text x="878" y="412" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.22">systemdesignlaws.xyz</text>
</svg>