<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" width="900" height="420">
  <rect x="0" y="0" width="900" height="420" fill="#FFFFFF"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1B1B1F"/>
    </marker>
  </defs>
  <text x="450" y="35" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="22" fill="#1B1B1F" font-weight="bold">Retry with Exponential Backoff</text>
  <!-- Timeline -->
  <line x1="80" y1="80" x2="850" y2="80" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="860" y="76" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">time</text>
  <!-- Attempt 1 -->
  <rect x="100" y="100" width="80" height="45" rx="6" fill="#FFEBEE" stroke="#1B1B1F" stroke-width="2"/>
  <text x="140" y="120" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Attempt 1</text>
  <text x="140" y="138" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">FAIL</text>
  <line x1="140" y1="80" x2="140" y2="100" stroke="#1B1B1F" stroke-width="1" stroke-dasharray="3,3"/>
  <!-- Wait 1s -->
  <rect x="185" y="100" width="60" height="45" rx="4" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="215" y="128" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">1s</text>
  <!-- Attempt 2 -->
  <rect x="250" y="100" width="80" height="45" rx="6" fill="#FFEBEE" stroke="#1B1B1F" stroke-width="2"/>
  <text x="290" y="120" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Attempt 2</text>
  <text x="290" y="138" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">FAIL</text>
  <!-- Wait 2s -->
  <rect x="335" y="100" width="80" height="45" rx="4" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="375" y="128" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">2s</text>
  <!-- Attempt 3 -->
  <rect x="420" y="100" width="80" height="45" rx="6" fill="#FFEBEE" stroke="#1B1B1F" stroke-width="2"/>
  <text x="460" y="120" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Attempt 3</text>
  <text x="460" y="138" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">FAIL</text>
  <!-- Wait 4s -->
  <rect x="505" y="100" width="100" height="45" rx="4" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="1" stroke-dasharray="4,4"/>
  <text x="555" y="128" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">4s</text>
  <!-- Attempt 4 -->
  <rect x="610" y="100" width="80" height="45" rx="6" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
  <text x="650" y="120" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Attempt 4</text>
  <text x="650" y="138" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">SUCCESS</text>
  <!-- Formula -->
  <rect x="100" y="180" width="380" height="90" rx="8" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
  <text x="290" y="210" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="15" fill="#1B1B1F" font-weight="bold">Backoff Formula</text>
  <text x="290" y="235" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F">delay = base_delay x 2^(attempt - 1) + jitter</text>
  <text x="290" y="258" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Jitter prevents thundering herd on retry waves</text>
  <!-- Why backoff -->
  <rect x="530" y="180" width="330" height="90" rx="8" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
  <text x="695" y="210" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="15" fill="#1B1B1F" font-weight="bold">Why Exponential?</text>
  <text x="695" y="235" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Linear: keeps hammering a sick service</text>
  <text x="695" y="255" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Exponential: gives service time to recover</text>
  <!-- Retry categories -->
  <rect x="100" y="300" width="250" height="80" rx="6" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="1"/>
  <text x="225" y="322" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F" font-weight="bold">Retriable Errors</text>
  <text x="225" y="345" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Timeout, 503, network error</text>
  <text x="225" y="365" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Temporary resource exhaustion</text>
  <rect x="400" y="300" width="250" height="80" rx="6" fill="#FFEBEE" stroke="#1B1B1F" stroke-width="1"/>
  <text x="525" y="322" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F" font-weight="bold">Non-Retriable Errors</text>
  <text x="525" y="345" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">400 Bad Request, invalid input</text>
  <text x="525" y="365" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">403 Forbidden, business logic</text>
  <text x="878" y="412" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.22">systemdesignlaws.xyz</text>
</svg>