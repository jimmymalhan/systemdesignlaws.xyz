<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420">
<rect width="900" height="420" fill="#FFFFFF"/>

<text x="450" y="35" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="20" font-weight="bold" fill="#1B1B1F">Naive Approach: Sequential Service Calls</text>
<text x="450" y="55" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F" opacity="0.6">One server calls each step. No state persistence. No recovery.</text>
<rect x="350" y="75" width="200" height="50" rx="8" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
<text x="450" y="103" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="15" font-weight="bold" fill="#1B1B1F">API Server</text>
<line x1="450" y1="125" x2="450" y2="155" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>
<rect x="50" y="155" width="150" height="45" rx="8" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
<text x="125" y="182" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F">Payment Service</text>
<rect x="230" y="155" width="150" height="45" rx="8" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
<text x="305" y="182" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F">Inventory Service</text>
<rect x="410" y="155" width="150" height="45" rx="8" fill="#F3E5F5" stroke="#1B1B1F" stroke-width="2"/>
<text x="485" y="182" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F">Shipping Service</text>
<rect x="590" y="155" width="150" height="45" rx="8" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
<text x="665" y="182" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F">Email Service</text>
<line x1="350" y1="100" x2="200" y2="155" stroke="#1B1B1F" stroke-width="1.5" stroke-dasharray="4,3"/>
<line x1="400" y1="125" x2="305" y2="155" stroke="#1B1B1F" stroke-width="1.5" stroke-dasharray="4,3"/>
<line x1="500" y1="125" x2="485" y2="155" stroke="#1B1B1F" stroke-width="1.5" stroke-dasharray="4,3"/>
<line x1="550" y1="100" x2="665" y2="155" stroke="#1B1B1F" stroke-width="1.5" stroke-dasharray="4,3"/>
<text x="125" y="217" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">1. Call</text>
<text x="305" y="217" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">2. Call</text>
<text x="485" y="217" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">3. Call</text>
<text x="665" y="217" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">4. Call</text>
<rect x="150" y="260" width="600" height="55" rx="10" fill="#FFEBEE" stroke="#1B1B1F" stroke-width="2"/>
<text x="450" y="285" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#1B1B1F">No checkpoints. Crash = restart from scratch.</text>
<text x="450" y="303" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Cannot handle long waits (human pickup). Compensation logic is manual.</text>
<defs><marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#1B1B1F"/></marker></defs>
<text x="878" y="412" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.22">systemdesignlaws.xyz</text>
</svg>