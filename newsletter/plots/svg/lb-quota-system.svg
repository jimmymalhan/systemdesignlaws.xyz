<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" style="background:#FFFFFF">
  <defs>
    <marker id="arr-qs" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0.5 L9,3.5 L0,6.5" fill="#1B1B1F" stroke="#1B1B1F" stroke-width="1"/>
    </marker>
    <marker id="arr-qs-r" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0.5 L9,3.5 L0,6.5" fill="#D32F2F" stroke="#D32F2F" stroke-width="1"/>
    </marker>
    <marker id="arr-qs-g" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0.5 L9,3.5 L0,6.5" fill="#2E7D32" stroke="#2E7D32" stroke-width="1"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="22" fill="#1B1B1F" font-weight="bold">Storage Quota Enforcement Flow</text>

  <!-- Upload request -->
  <rect x="40" y="100" width="130" height="50" rx="6" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
  <text x="105" y="130" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F">Upload Request</text>

  <path d="M170,125 L228,125" stroke="#1B1B1F" stroke-width="2" fill="none" marker-end="url(#arr-qs)"/>

  <!-- Check quota diamond -->
  <polygon points="310,80 380,125 310,170 240,125" fill="#FFF3E0" stroke="#E65100" stroke-width="2"/>
  <text x="310" y="120" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" font-weight="bold">Check</text>
  <text x="310" y="135" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" font-weight="bold">Quota</text>

  <!-- DB lookup -->
  <path d="M310,80 L310,55" stroke="#1B1B1F" stroke-width="1.5" fill="none" stroke-dasharray="4,3"/>
  <rect x="245" y="20" width="130" height="30" rx="4" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="1"/>
  <text x="310" y="40" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#666">user_storage_used</text>

  <!-- Under quota path (green) -->
  <path d="M380,125 L458,125" stroke="#2E7D32" stroke-width="2.5" fill="none" marker-end="url(#arr-qs-g)"/>
  <text x="420" y="118" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#2E7D32">Under quota</text>

  <rect x="462" y="100" width="150" height="50" rx="6" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
  <text x="537" y="122" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#2E7D32" font-weight="bold">Generate URL</text>
  <text x="537" y="140" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#666">Presigned, time-limited</text>

  <path d="M612,125 L668,125" stroke="#2E7D32" stroke-width="2" fill="none" marker-end="url(#arr-qs-g)"/>

  <rect x="672" y="100" width="130" height="50" rx="6" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
  <text x="737" y="130" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#2E7D32">Upload to S3</text>

  <!-- Over quota path (red) -->
  <path d="M310,170 L310,228" stroke="#D32F2F" stroke-width="2.5" fill="none" marker-end="url(#arr-qs-r)"/>
  <text x="335" y="200" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#D32F2F">Over quota</text>

  <rect x="230" y="232" width="160" height="50" rx="6" fill="#FFEBEE" stroke="#D32F2F" stroke-width="2"/>
  <text x="310" y="254" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#D32F2F" font-weight="bold">403 Rejected</text>
  <text x="310" y="272" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#D32F2F">"Storage quota exceeded"</text>

  <!-- Quota tiers -->
  <rect x="40" y="310" width="250" height="90" rx="6" fill="#FAFAFA" stroke="#DDD" stroke-width="1"/>
  <text x="60" y="332" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F" font-weight="bold">Quota Tiers</text>
  <text x="60" y="352" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Free: 2 GB total, 100MB per file</text>
  <text x="60" y="370" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Pro: 100 GB total, 5GB per file</text>
  <text x="60" y="388" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Enterprise: custom limits</text>

  <!-- Enforcement details -->
  <rect x="340" y="310" width="260" height="90" rx="6" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
  <text x="360" y="332" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#E65100" font-weight="bold">Presigned URL Conditions</text>
  <text x="360" y="352" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">- content-length-range: 0 to max</text>
  <text x="360" y="370" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">- content-type: allowed MIME types</text>
  <text x="360" y="388" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">- expires: 15 minutes</text>

  <!-- Post-upload update -->
  <rect x="650" y="310" width="210" height="90" rx="6" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1"/>
  <text x="670" y="332" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#2E7D32" font-weight="bold">After Upload</text>
  <text x="670" y="352" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">S3 event notification</text>
  <text x="670" y="370" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Update user_storage_used</text>
  <text x="670" y="388" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Run virus scan</text>

  <!-- Watermark -->
  <text x="878" y="412" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.22">systemdesignlaws.xyz</text>
</svg>