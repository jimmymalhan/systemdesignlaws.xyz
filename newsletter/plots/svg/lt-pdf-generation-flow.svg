<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420">
<rect width="900" height="420" fill="#FFFFFF"/>
<defs>
  <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
    <path d="M0,0.5 L9,3.5 L0,6.5" fill="#1B1B1F" stroke="#1B1B1F" stroke-width="1"/>
  </marker>
</defs>

<!-- Title -->
<text x="450" y="32" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="20" font-weight="bold" fill="#1B1B1F">PDF Generation: Long-Running Task Example</text>
<text x="450" y="52" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F" opacity="0.6">Generate a 500-page report asynchronously, notify on completion</text>

<!-- Flow -->
<rect x="40" y="80" width="120" height="50" rx="8" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
<text x="100" y="100" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#1B1B1F">Client</text>
<text x="100" y="118" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">Request report</text>

<line x1="160" y1="105" x2="200" y2="105" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>

<rect x="205" y="75" width="140" height="60" rx="8" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
<text x="275" y="98" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#1B1B1F">API Server</text>
<text x="275" y="115" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">Return job_id</text>
<text x="275" y="128" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">202 Accepted</text>

<line x1="345" y1="105" x2="385" y2="105" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>

<rect x="390" y="80" width="130" height="50" rx="8" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
<text x="455" y="100" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#1B1B1F">Job Queue</text>
<text x="455" y="118" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">Enqueue task</text>

<line x1="520" y1="105" x2="560" y2="105" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>

<rect x="565" y="70" width="150" height="70" rx="8" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
<text x="640" y="93" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#1B1B1F">PDF Worker</text>
<text x="640" y="110" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">Fetch data</text>
<text x="640" y="123" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">Render pages</text>
<text x="640" y="136" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">Assemble PDF</text>

<line x1="715" y1="105" x2="755" y2="105" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>

<rect x="760" y="80" width="100" height="50" rx="8" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
<text x="810" y="100" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#1B1B1F">S3</text>
<text x="810" y="118" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">Store PDF</text>

<!-- Notification path -->
<line x1="640" y1="140" x2="640" y2="175" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>

<rect x="540" y="180" width="200" height="40" rx="8" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
<text x="640" y="205" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Update status: complete + URL</text>

<!-- Poll path -->
<line x1="100" y1="130" x2="100" y2="195" stroke="#1B1B1F" stroke-width="1.5" stroke-dasharray="4,3"/>
<line x1="100" y1="195" x2="275" y2="195" stroke="#1B1B1F" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr)"/>
<text x="188" y="188" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">Poll: GET /jobs/{id}</text>

<!-- Processing details -->
<text x="450" y="250" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#1B1B1F">Why This Must Be Async</text>

<rect x="40" y="265" width="260" height="80" rx="8" fill="#FFEBEE" stroke="#1B1B1F" stroke-width="2"/>
<text x="170" y="287" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#1B1B1F">Synchronous (Bad)</text>
<text x="60" y="307" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">30-second request timeout</text>
<text x="60" y="325" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Server thread blocked for minutes</text>
<text x="60" y="340" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Client connection drops on mobile</text>

<rect x="320" y="265" width="260" height="80" rx="8" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
<text x="450" y="287" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#1B1B1F">Async (Good)</text>
<text x="340" y="307" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">API responds in 50ms</text>
<text x="340" y="325" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Worker processes independently</text>
<text x="340" y="340" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Client polls or gets webhook</text>

<rect x="600" y="265" width="260" height="80" rx="8" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
<text x="730" y="287" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#1B1B1F">Scale Pattern</text>
<text x="620" y="307" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Spike: 1000 reports requested</text>
<text x="620" y="325" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Queue absorbs burst</text>
<text x="620" y="340" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Workers process at own pace</text>

<!-- Bottom -->
<rect x="100" y="365" width="700" height="35" rx="6" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="1.5"/>
<text x="450" y="387" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#1B1B1F">Same pattern for: report generation, data export, batch email, invoice creation</text>

<!-- Watermark -->
<text x="878" y="412" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.22">systemdesignlaws.xyz</text>
</svg>