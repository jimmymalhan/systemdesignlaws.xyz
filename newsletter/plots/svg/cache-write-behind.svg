<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" style="background:#FFFFFF">
  <defs>
    <marker id="arr-wb" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0.5 L9,3.5 L0,6.5" fill="#1B1B1F" stroke="#1B1B1F" stroke-width="1"/>
    </marker>
    <marker id="arr-wb-g" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0.5 L9,3.5 L0,6.5" fill="#27ae60" stroke="#27ae60" stroke-width="1"/>
    </marker>
    <marker id="arr-wb-y" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0.5 L9,3.5 L0,6.5" fill="#d4a017" stroke="#d4a017" stroke-width="1"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#1a1a1a" font-weight="bold">Write-Behind (Write-Back) Cache</text>
  <text x="400" y="52" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#888">App writes to cache, cache async batches writes to DB</text>

  <!-- Step 1: App writes to Cache -->
  <rect x="60" y="100" width="140" height="70" rx="8" fill="#E8F4FD" stroke="#2980b9" stroke-width="2"/>
  <text x="130" y="128" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#1a1a1a" font-weight="bold">Application</text>
  <text x="130" y="148" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#2980b9">write(key, value)</text>

  <!-- Arrow App to Cache -->
  <path d="M200,135 L290,135" stroke="#2980b9" stroke-width="2.5" fill="none" marker-end="url(#arr-wb)"/>
  <text x="245" y="125" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#2980b9" font-weight="bold">1. Write</text>

  <!-- Cache -->
  <rect x="300" y="100" width="140" height="70" rx="8" fill="#E8F5E9" stroke="#27ae60" stroke-width="2"/>
  <text x="370" y="128" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#1a1a1a" font-weight="bold">Cache</text>
  <text x="370" y="148" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#27ae60">Immediate ACK</text>

  <!-- Fast return arrow -->
  <path d="M370,170 C370,195 200,200 130,170" stroke="#27ae60" stroke-width="2.5" fill="none" marker-end="url(#arr-wb-g)"/>
  <rect x="210" y="186" width="110" height="22" rx="8" fill="#E8F5E9" stroke="#27ae60" stroke-width="1.5"/>
  <text x="265" y="201" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#27ae60" font-weight="bold">2. Fast Return</text>

  <!-- Async batch write -->
  <rect x="300" y="230" width="140" height="50" rx="8" fill="#FFF3E0" stroke="#d4a017" stroke-width="2" stroke-dasharray="6,3"/>
  <text x="370" y="252" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#d4a017" font-weight="bold">Write Queue</text>
  <text x="370" y="268" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#d4a017">Batches pending</text>

  <!-- Arrow Queue to DB (async) -->
  <path d="M440,255 L530,255" stroke="#d4a017" stroke-width="2" fill="none" stroke-dasharray="6,3" marker-end="url(#arr-wb-y)"/>
  <text x="485" y="245" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#d4a017" font-weight="bold">3. Async</text>
  <text x="485" y="270" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#d4a017">batch write</text>

  <!-- Database -->
  <rect x="540" y="230" width="140" height="50" rx="8" fill="#FFF8E8" stroke="#d4a017" stroke-width="2"/>
  <text x="610" y="252" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#1a1a1a" font-weight="bold">Database</text>
  <text x="610" y="268" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#d4a017">Eventually updated</text>

  <!-- Danger zone -->
  <rect x="540" y="300" width="200" height="60" rx="8" fill="#FFEBEE" stroke="#c0392b" stroke-width="2"/>
  <text x="640" y="322" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#c0392b" font-weight="bold">DATA LOSS RISK</text>
  <text x="640" y="340" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#c0392b">If cache dies before flush</text>
  <text x="640" y="355" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#c0392b">queued writes are lost</text>

  <!-- Timeline -->
  <rect x="60" y="390" width="680" height="70" rx="8" fill="#FAFAFA" stroke="#DDD" stroke-width="1"/>
  <text x="400" y="412" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#1a1a1a" font-weight="bold">Timeline Comparison</text>
  <rect x="80" y="425" width="80" height="16" rx="4" fill="#E8F5E9" stroke="#27ae60" stroke-width="1"/>
  <text x="120" y="437" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#27ae60">~1ms write</text>
  <text x="180" y="437" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#27ae60" font-weight="bold">Write-behind</text>

  <rect x="400" y="425" width="280" height="16" rx="4" fill="#FFF3E0" stroke="#d4a017" stroke-width="1"/>
  <text x="540" y="437" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#d4a017">~50ms write (cache + DB sync)</text>
  <text x="358" y="437" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#d4a017" font-weight="bold">Write-through</text>

  <!-- Watermark -->
  <text x="778" y="472" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#1a1a1a" opacity="0.22">systemdesignlaws.xyz</text>
</svg>