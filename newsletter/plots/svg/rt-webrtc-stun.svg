<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333333"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2980b9"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#27ae60"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c0392b"/>
    </marker>
    <marker id="arrow-orange" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e67e22"/>
    </marker>
  </defs>
  <rect width="800" height="460" fill="#ffffff"/>

  <!-- Title -->
  <text x="400" y="34" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#1a1a1a" text-anchor="middle">WebRTC: STUN and TURN NAT Traversal</text>
  <text x="400" y="54" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#555555" text-anchor="middle">Peers discover their public IP via STUN, then connect directly. TURN relays when STUN fails.</text>

  <!-- Client A (behind NAT) -->
  <rect x="30" y="100" width="130" height="60" rx="8" fill="#e8f4fd" stroke="#4a90d9" stroke-width="2"/>
  <text x="95" y="126" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Client A</text>
  <text x="95" y="145" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#555555" text-anchor="middle">private: 192.168.1.5</text>
  <text x="95" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#888888" text-anchor="middle">behind NAT</text>

  <!-- Client B (behind NAT) -->
  <rect x="640" y="100" width="130" height="60" rx="8" fill="#e8f4fd" stroke="#4a90d9" stroke-width="2"/>
  <text x="705" y="126" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Client B</text>
  <text x="705" y="145" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#555555" text-anchor="middle">private: 10.0.0.8</text>
  <text x="705" y="160" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#888888" text-anchor="middle">behind NAT</text>

  <!-- STUN Server -->
  <rect x="310" y="80" width="180" height="60" rx="8" fill="#fdf8e8" stroke="#d4a017" stroke-width="2"/>
  <text x="400" y="106" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#1a1a1a" text-anchor="middle">STUN Server</text>
  <text x="400" y="124" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#555555" text-anchor="middle">stun.google.com:3478</text>
  <text x="400" y="138" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#888888" text-anchor="middle">sees your public IP</text>

  <!-- A queries STUN -->
  <line x1="160" y1="120" x2="308" y2="105" stroke="#2980b9" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="230" y="100" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#2980b9" text-anchor="middle">What is my public IP?</text>

  <!-- STUN responds to A -->
  <line x1="308" y1="120" x2="160" y2="135" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="230" y="145" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#27ae60" text-anchor="middle">203.0.113.10:54321</text>

  <!-- B queries STUN -->
  <line x1="638" y1="105" x2="490" y2="110" stroke="#2980b9" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="565" y="98" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#2980b9" text-anchor="middle">What is my public IP?</text>

  <!-- STUN responds to B -->
  <line x1="490" y1="120" x2="638" y2="130" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="565" y="146" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#27ae60" text-anchor="middle">198.51.100.20:62442</text>

  <!-- Direct P2P connection (happy path) -->
  <rect x="220" y="200" width="360" height="50" rx="8" fill="#e8fde8" stroke="#4ab54a" stroke-width="2"/>
  <text x="400" y="222" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Direct Peer-to-Peer (STUN success)</text>
  <text x="400" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#555555" text-anchor="middle">UDP hole punching — no relay needed</text>

  <line x1="160" y1="160" x2="218" y2="222" stroke="#27ae60" stroke-width="2" marker-end="url(#arrow-green)"/>
  <line x1="638" y1="160" x2="582" y2="222" stroke="#27ae60" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- Divider -->
  <line x1="60" y1="280" x2="740" y2="280" stroke="#dddddd" stroke-width="1.5" stroke-dasharray="6,4"/>
  <text x="400" y="274" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#c0392b" text-anchor="middle" font-weight="bold">Fallback: Symmetric NAT blocks UDP hole punching</text>

  <!-- TURN Server -->
  <rect x="310" y="295" width="180" height="60" rx="8" fill="#fde8e8" stroke="#c0392b" stroke-width="2"/>
  <text x="400" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#1a1a1a" text-anchor="middle">TURN Server</text>
  <text x="400" y="338" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#555555" text-anchor="middle">turn.example.com</text>
  <text x="400" y="350" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#888888" text-anchor="middle">relays all traffic (costly)</text>

  <!-- A to TURN -->
  <line x1="160" y1="175" x2="308" y2="318" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-red)"/>
  <!-- B to TURN -->
  <line x1="638" y1="175" x2="492" y2="318" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arrow-red)"/>

  <!-- Labels on TURN arrows -->
  <text x="200" y="255" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#c0392b" text-anchor="middle">TURN relay</text>
  <text x="600" y="255" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#c0392b" text-anchor="middle">TURN relay</text>

  <!-- Annotation -->
  <rect x="50" y="380" width="700" height="60" rx="8" fill="#f9f9f9" stroke="#cccccc" stroke-width="1.5"/>
  <text x="400" y="400" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Interview Rule of Thumb</text>
  <text x="400" y="418" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#555555" text-anchor="middle">~80% of connections succeed via STUN (direct P2P). ~20% need TURN relay.</text>
  <text x="400" y="434" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#555555" text-anchor="middle">TURN is expensive (server bandwidth) — budget for it but don't rely on it as primary path.</text>
</svg>
