  <text x="450.0" y="305.0" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F" font-weight="bold">Key Selection Principles</text>
  <text x="450" y="290" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F">1. Minimize variance in writes per shard (flat is good)</text>
  <text x="450" y="310" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F">2. Hash a primary identifier: user_id, post_id, device_id</text>
  <text x="450" y="330" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F">3. Consider read paths: how many shards does each query hit?</text>

