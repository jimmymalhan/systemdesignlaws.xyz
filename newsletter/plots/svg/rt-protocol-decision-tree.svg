<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333333"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="#ffffff"/>

  <!-- Title -->
  <text x="400" y="34" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Protocol Selection Decision Tree</text>
  <text x="400" y="54" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#555555" text-anchor="middle">Use this flow in your next system design interview</text>

  <!-- Start node -->
  <rect x="310" y="70" width="180" height="40" rx="20" fill="#1a1a1a" stroke="none"/>
  <text x="400" y="95" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">Start</text>

  <!-- Arrow down -->
  <line x1="400" y1="110" x2="400" y2="130" stroke="#333333" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Q1: Need real-time updates? -->
  <rect x="270" y="130" width="260" height="44" rx="8" fill="#e8f4fd" stroke="#4a90d9" stroke-width="2"/>
  <text x="400" y="148" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Need real-time or near-</text>
  <text x="400" y="166" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#1a1a1a" text-anchor="middle">real-time updates?</text>

  <!-- No branch: Simple Polling -->
  <line x1="270" y1="152" x2="175" y2="152" stroke="#333333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="218" y="146" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#c0392b" text-anchor="middle">No</text>
  <rect x="50" y="134" width="125" height="36" rx="8" fill="#fdf8e8" stroke="#d4a017" stroke-width="2"/>
  <text x="112" y="150" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#1a1a1a" text-anchor="middle" font-weight="bold">Simple</text>
  <text x="112" y="165" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#1a1a1a" text-anchor="middle" font-weight="bold">Polling</text>
  <text x="112" y="182" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#555555" text-anchor="middle">dashboards, feeds</text>
  <text x="112" y="196" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#555555" text-anchor="middle">poll every 5-30s</text>

  <!-- Yes arrow down -->
  <line x1="400" y1="174" x2="400" y2="200" stroke="#333333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="410" y="190" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#27ae60">Yes</text>

  <!-- Q2: Bidirectional? -->
  <rect x="270" y="200" width="260" height="44" rx="8" fill="#e8f4fd" stroke="#4a90d9" stroke-width="2"/>
  <text x="400" y="218" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Client needs to send</text>
  <text x="400" y="236" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#1a1a1a" text-anchor="middle">data back to server?</text>

  <!-- No branch: SSE or Long Poll -->
  <line x1="270" y1="222" x2="175" y2="260" stroke="#333333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="218" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#c0392b" text-anchor="middle">No (server</text>
  <text x="218" y="253" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#c0392b" text-anchor="middle">-to-client)</text>

  <rect x="50" y="252" width="125" height="60" rx="8" fill="#e8fde8" stroke="#4ab54a" stroke-width="2"/>
  <text x="112" y="272" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#1a1a1a" text-anchor="middle" font-weight="bold">SSE</text>
  <text x="112" y="288" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#555555" text-anchor="middle">live scores, notifs</text>
  <text x="112" y="302" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#555555" text-anchor="middle">comments, feeds</text>
  <text x="70" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#888888">(Long Poll if SSE blocked</text>
  <text x="70" y="332" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#888888"> by proxies/firewalls)</text>

  <!-- Yes arrow down -->
  <line x1="400" y1="244" x2="400" y2="270" stroke="#333333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="410" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#27ae60">Yes</text>

  <!-- Q3: Audio/Video? -->
  <rect x="270" y="270" width="260" height="44" rx="8" fill="#e8f4fd" stroke="#4a90d9" stroke-width="2"/>
  <text x="400" y="288" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Requires audio, video,</text>
  <text x="400" y="306" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#1a1a1a" text-anchor="middle">or low-latency P2P?</text>

  <!-- No branch: WebSocket -->
  <line x1="270" y1="292" x2="175" y2="340" stroke="#333333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="218" y="318" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#c0392b" text-anchor="middle">No</text>

  <rect x="50" y="332" width="125" height="60" rx="8" fill="#f5e8ff" stroke="#8e44ad" stroke-width="2"/>
  <text x="112" y="352" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#1a1a1a" text-anchor="middle" font-weight="bold">WebSocket</text>
  <text x="112" y="368" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#555555" text-anchor="middle">chat, collab docs</text>
  <text x="112" y="384" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#555555" text-anchor="middle">multiplayer games</text>

  <!-- Yes arrow down: WebRTC -->
  <line x1="400" y1="314" x2="400" y2="340" stroke="#333333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="410" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#27ae60">Yes</text>

  <rect x="270" y="340" width="260" height="60" rx="8" fill="#fde8e8" stroke="#c0392b" stroke-width="2"/>
  <text x="400" y="364" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#1a1a1a" text-anchor="middle">WebRTC</text>
  <text x="400" y="382" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#555555" text-anchor="middle">video calls, voice, screen share</text>
  <text x="400" y="396" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#555555" text-anchor="middle">P2P data channels, gaming</text>

  <!-- Complexity spectrum -->
  <rect x="50" y="425" width="700" height="60" rx="8" fill="#f9f9f9" stroke="#cccccc" stroke-width="1.5"/>
  <text x="400" y="444" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Complexity Spectrum (left = simpler)</text>
  <text x="75" y="462" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#d4a017">Polling</text>
  <text x="200" y="462" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#d4a017">Long Poll</text>
  <text x="340" y="462" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#27ae60">SSE</text>
  <text x="460" y="462" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#8e44ad">WebSocket</text>
  <text x="600" y="462" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#c0392b">WebRTC</text>
  <line x1="130" y1="462" x2="180" y2="462" stroke="#cccccc" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="270" y1="462" x2="320" y2="462" stroke="#cccccc" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="390" y1="462" x2="440" y2="462" stroke="#cccccc" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="530" y1="462" x2="580" y2="462" stroke="#cccccc" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="400" y="479" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#888888" text-anchor="middle">Start simple. Justify every step up.</text>
</svg>
