<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" style="background:#FFFFFF">
  <text x="450" y="32" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="22" fill="#1B1B1F" font-weight="bold">Distributed Locks: Cross-System Coordination</text>

  <!-- Process A -->
  <rect x="30" y="60" width="170" height="55" rx="6" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
  <text x="115" y="82" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F" font-weight="bold">Process A</text>
  <text x="115" y="102" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Transfer service</text>

  <!-- Process B -->
  <rect x="700" y="60" width="170" height="55" rx="6" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
  <text x="785" y="82" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F" font-weight="bold">Process B</text>
  <text x="785" y="102" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Transfer service</text>

  <!-- Lock store -->
  <rect x="320" y="60" width="260" height="55" rx="6" fill="#F3E5F5" stroke="#1B1B1F" stroke-width="2"/>
  <text x="450" y="82" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F" font-weight="bold">Lock Store</text>
  <text x="450" y="102" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#7B1FA2">Redis / ZooKeeper / Database</text>

  <!-- Step 1: A acquires -->
  <rect x="30" y="135" width="840" height="55" rx="4" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1" opacity="0.3"/>
  <text x="55" y="152" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#2E7D32" font-weight="bold">1.</text>
  <text x="115" y="152" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#2E7D32">ACQUIRE lock:user:123</text>
  <text x="450" y="152" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#2E7D32" font-weight="bold">GRANTED (token=7, TTL=30s)</text>
  <text x="450" y="175" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#2E7D32">SET lock:user:123 NX EX 30</text>

  <!-- Step 2: B tries -->
  <rect x="30" y="200" width="840" height="55" rx="4" fill="#FFEBEE" stroke="#D32F2F" stroke-width="1" opacity="0.3"/>
  <text x="55" y="217" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#D32F2F" font-weight="bold">2.</text>
  <text x="785" y="217" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#D32F2F">ACQUIRE lock:user:123</text>
  <text x="450" y="217" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#D32F2F" font-weight="bold">DENIED (already held)</text>
  <text x="785" y="240" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#D32F2F">Retry with backoff or fail</text>

  <!-- Step 3: A finishes, releases -->
  <rect x="30" y="265" width="840" height="40" rx="4" fill="#E8F4FD" stroke="#1565C0" stroke-width="1" opacity="0.3"/>
  <text x="55" y="290" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1565C0" font-weight="bold">3.</text>
  <text x="115" y="290" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1565C0">RELEASE lock:user:123</text>
  <text x="450" y="290" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1565C0" font-weight="bold">Lock freed (or TTL expires)</text>

  <!-- Key properties -->
  <rect x="30" y="320" width="270" height="75" rx="6" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="165" y="340" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#2E7D32" font-weight="bold">Mutual exclusion</text>
  <text x="165" y="358" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Only one holder at a time</text>
  <text x="165" y="378" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">NX flag = atomic check-and-set</text>

  <rect x="315" y="320" width="270" height="75" rx="6" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/>
  <text x="450" y="340" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#E65100" font-weight="bold">TTL prevents deadlock</text>
  <text x="450" y="358" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Lock auto-expires if holder crashes</text>
  <text x="450" y="378" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">But: can expire while working</text>

  <rect x="600" y="320" width="270" height="75" rx="6" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1.5"/>
  <text x="735" y="340" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#7B1FA2" font-weight="bold">Fencing tokens</text>
  <text x="735" y="358" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Monotonic number per acquire</text>
  <text x="735" y="378" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Storage rejects stale tokens</text>

  <text x="878" y="412" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.22">systemdesignlaws.xyz</text>
</svg>