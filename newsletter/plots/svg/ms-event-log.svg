<text x="620" y="185" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">ShippingCreated</text>
<line x1="690" y1="172" x2="710" y2="172" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>
<rect x="710" y="145" width="140" height="55" rx="6" fill="#F3E5F5" stroke="#1B1B1F" stroke-width="2"/>
<text x="780" y="165" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#1B1B1F">Event 5</text>
<text x="780" y="185" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">EmailSent</text>
<rect x="100" y="240" width="320" height="80" rx="10" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
<text x="260" y="265" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#1B1B1F">Replay for Recovery</text>
<text x="260" y="285" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Worker crashes after Event 2?</text>
<text x="260" y="302" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">New worker reads from Event 3 onward.</text>
<rect x="480" y="240" width="320" height="80" rx="10" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
<text x="640" y="265" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#1B1B1F">Full Audit Trail</text>
<text x="640" y="285" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Every action is recorded.</text>
<text x="640" y="302" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Debug any order by replaying its events.</text>
<defs><marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#1B1B1F"/></marker></defs>
<text x="878" y="412" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.22">systemdesignlaws.xyz</text>
