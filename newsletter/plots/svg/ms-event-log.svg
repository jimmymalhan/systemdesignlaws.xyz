<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420">
<rect width="900" height="420" fill="#FFFFFF"/>

<text x="450" y="30" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="20" font-weight="bold" fill="#1B1B1F">Event Log: Append-Only History</text>
<text x="450" y="50" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F" opacity="0.6">Each event records what happened. Current state derived by replaying events.</text>
<rect x="50" y="80" width="800" height="45" rx="6" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
<text x="450" y="108" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#1B1B1F">Kafka Topic: order-events</text>
<rect x="60" y="145" width="140" height="55" rx="6" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
<text x="130" y="165" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#1B1B1F">Event 1</text>
<text x="130" y="185" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">OrderPlaced</text>
<line x1="200" y1="172" x2="220" y2="172" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>
<rect x="220" y="145" width="140" height="55" rx="6" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
<text x="290" y="165" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#1B1B1F">Event 2</text>
<text x="290" y="185" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">PaymentCharged</text>
<line x1="360" y1="172" x2="380" y2="172" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>
<rect x="380" y="145" width="150" height="55" rx="6" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
<text x="455" y="165" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#1B1B1F">Event 3</text>
<text x="455" y="185" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">InventoryReserved</text>
<line x1="530" y1="172" x2="550" y2="172" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>
<rect x="550" y="145" width="140" height="55" rx="6" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
