<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" width="900" height="420">
  <rect x="0" y="0" width="900" height="420" fill="#FFFFFF"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1B1B1F"/>
    </marker>
  </defs>
  <text x="450" y="35" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="22" fill="#1B1B1F" font-weight="bold">Job Queue Architecture</text>
  <!-- Client -->
  <rect x="30" y="155" width="120" height="55" rx="8" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
  <text x="90" y="178" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F">Client</text>
  <text x="90" y="198" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">sends request</text>
  <!-- API Server -->
  <rect x="200" y="100" width="140" height="170" rx="8" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
  <text x="270" y="130" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="15" fill="#1B1B1F" font-weight="bold">API Server</text>
  <text x="270" y="155" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">1. Validate input</text>
  <text x="270" y="175" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">2. Create job record</text>
  <text x="270" y="195" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">3. Enqueue task</text>
  <text x="270" y="215" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">4. Return job_id</text>
  <text x="270" y="255" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#E8F5E9">~50ms</text>
  <!-- Arrow Client to API -->
  <line x1="150" y1="180" x2="198" y2="180" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Message Queue -->
  <rect x="400" y="140" width="140" height="90" rx="8" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
  <text x="470" y="170" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="15" fill="#1B1B1F" font-weight="bold">Message Queue</text>
  <text x="470" y="195" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Redis / RabbitMQ</text>
  <text x="470" y="215" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">SQS / Kafka</text>
  <!-- Arrow API to Queue -->
  <line x1="340" y1="185" x2="398" y2="185" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Workers -->
  <rect x="600" y="90" width="130" height="50" rx="8" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
  <text x="665" y="120" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F">Worker 1</text>
  <rect x="600" y="160" width="130" height="50" rx="8" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
  <text x="665" y="190" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F">Worker 2</text>
  <rect x="600" y="230" width="130" height="50" rx="8" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
  <text x="665" y="260" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F">Worker N</text>
  <!-- Arrows Queue to Workers -->
  <line x1="540" y1="165" x2="598" y2="120" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="540" y1="185" x2="598" y2="185" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="540" y1="210" x2="598" y2="250" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Status Store -->
  <rect x="760" y="155" width="120" height="55" rx="8" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
  <text x="820" y="178" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F">Status Store</text>
  <text x="820" y="198" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">(DB / Redis)</text>
  <!-- Arrows Workers to Status -->
  <line x1="730" y1="185" x2="758" y2="185" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Return path -->
  <path d="M 270 270 L 270 340 L 90 340 L 90 210" stroke="#1B1B1F" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow)" fill="none"/>
  <text x="180" y="335" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Immediate: {job_id: "abc123"}</text>
  <!-- Bottom summary -->
  <rect x="100" y="370" width="700" height="35" rx="6" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="1"/>
  <text x="450" y="393" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F">Split: fast acknowledgment (50ms) + background execution (minutes)</text>
  <text x="878" y="412" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.22">systemdesignlaws.xyz</text>
</svg>