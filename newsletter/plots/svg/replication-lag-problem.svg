<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" style="background:#FFFFFF">
  <defs>
    <marker id="arr-rl" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0.5 L9,3.5 L0,6.5" fill="#1B1B1F" stroke="#1B1B1F" stroke-width="1"/>
    </marker>
    <marker id="arr-rl-b" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0.5 L9,3.5 L0,6.5" fill="#1565C0" stroke="#1565C0" stroke-width="1"/>
    </marker>
    <marker id="arr-rl-r" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0.5 L9,3.5 L0,6.5" fill="#D32F2F" stroke="#D32F2F" stroke-width="1"/>
    </marker>
    <marker id="arr-rl-g" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0.5 L9,3.5 L0,6.5" fill="#2E7D32" stroke="#2E7D32" stroke-width="1"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="28" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="20" fill="#1B1B1F" font-weight="bold">Replication Lag: Read-Your-Own-Writes Problem</text>

  <!-- Timeline axis -->
  <path d="M80,65 L830,65" stroke="#1B1B1F" stroke-width="2.5" fill="none" marker-end="url(#arr-rl)"/>
  <text x="850" y="70" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#888">time</text>

  <!-- Time markers -->
  <line x1="150" y1="58" x2="150" y2="72" stroke="#1B1B1F" stroke-width="2"/>
  <text x="150" y="52" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F" font-weight="bold">t=0</text>

  <line x1="400" y1="58" x2="400" y2="72" stroke="#1B1B1F" stroke-width="2"/>
  <text x="400" y="52" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F" font-weight="bold">t=100ms</text>

  <line x1="660" y1="58" x2="660" y2="72" stroke="#1B1B1F" stroke-width="2"/>
  <text x="660" y="52" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F" font-weight="bold">t=500ms</text>

  <!-- Row labels -->
  <text x="55" y="118" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#888">User</text>
  <text x="55" y="210" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#888">Primary</text>
  <text x="55" y="300" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#888">Replica</text>

  <!-- Horizontal lane lines -->
  <line x1="65" y1="150" x2="830" y2="150" stroke="#EEE" stroke-width="1"/>
  <line x1="65" y1="245" x2="830" y2="245" stroke="#EEE" stroke-width="1"/>

  <!-- EVENT 1: t=0 User writes post -->
  <rect x="110" y="88" width="80" height="48" rx="6" fill="#E8F4FD" stroke="#1565C0" stroke-width="2"/>
  <text x="150" y="109" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" font-weight="bold">WRITE</text>
  <text x="150" y="127" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#666">"New Post"</text>

  <!-- Arrow: User write to Primary -->
  <path d="M150,136 C150,150 150,165 150,180" stroke="#1565C0" stroke-width="2" fill="none" marker-end="url(#arr-rl-b)"/>

  <!-- Primary receives write -->
  <rect x="117" y="184" width="66" height="35" rx="5" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
  <text x="150" y="206" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#2E7D32" font-weight="bold">Stored!</text>

  <!-- WAL replication arrow (slow, dashed) from Primary to Replica -->
  <path d="M183,202 C300,202 500,202 618,202" stroke="#FF9800" stroke-width="2" fill="none" marker-end="url(#arr-rl)" stroke-dasharray="6,3"/>
  <text x="400" y="194" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#FF9800" font-weight="bold">async replication (100-500ms delay)</text>

  <!-- Replica receives data at t=500ms -->
  <rect x="625" y="184" width="72" height="35" rx="5" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
  <text x="661" y="206" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#2E7D32">Replicated</text>

  <!-- EVENT 2: t=100ms User reads from Replica (FAIL) -->
  <rect x="360" y="88" width="80" height="48" rx="6" fill="#E8F4FD" stroke="#1565C0" stroke-width="2"/>
  <text x="400" y="109" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" font-weight="bold">READ</text>
  <text x="400" y="127" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#666">"My post?"</text>

  <!-- Arrow: User read to Replica -->
  <path d="M400,136 C400,170 400,248 400,266" stroke="#D32F2F" stroke-width="2" fill="none" marker-end="url(#arr-rl-r)" stroke-dasharray="5,3"/>
  <text x="418" y="175" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#D32F2F">read from replica</text>

  <!-- Replica: NOT FOUND at t=100ms -->
  <rect x="355" y="270" width="90" height="46" rx="6" fill="#FFEBEE" stroke="#D32F2F" stroke-width="2.5"/>
  <text x="400" y="290" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#D32F2F" font-weight="bold">Post not</text>
  <text x="400" y="306" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#D32F2F" font-weight="bold">found!</text>

  <!-- Red X -->
  <text x="400" y="340" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="24" fill="#D32F2F" font-weight="bold">X</text>

  <!-- EVENT 3: t=500ms User reads again (SUCCESS) -->
  <rect x="620" y="88" width="80" height="48" rx="6" fill="#E8F4FD" stroke="#1565C0" stroke-width="2"/>
  <text x="660" y="109" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" font-weight="bold">READ</text>
  <text x="660" y="127" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#666">"My post?"</text>

  <!-- Arrow: User read to Replica -->
  <path d="M660,136 C660,170 660,248 660,266" stroke="#2E7D32" stroke-width="2" fill="none" marker-end="url(#arr-rl-g)" stroke-dasharray="5,3"/>
  <text x="678" y="175" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#2E7D32">read from replica</text>

  <!-- Replica: FOUND at t=500ms -->
  <rect x="615" y="270" width="90" height="46" rx="6" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2.5"/>
  <text x="660" y="290" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#2E7D32" font-weight="bold">Post</text>
  <text x="660" y="306" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#2E7D32" font-weight="bold">found!</text>

  <!-- Green checkmark -->
  <text x="660" y="340" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="24" fill="#2E7D32" font-weight="bold">&#10003;</text>

  <!-- Annotation: replication lag bracket -->
  <line x1="150" y1="362" x2="150" y2="375" stroke="#E65100" stroke-width="2"/>
  <line x1="150" y1="375" x2="660" y2="375" stroke="#E65100" stroke-width="2"/>
  <line x1="660" y1="362" x2="660" y2="375" stroke="#E65100" stroke-width="2"/>
  <rect x="295" y="380" width="220" height="24" rx="5" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/>
  <text x="405" y="397" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#E65100" font-weight="bold">100-300ms replication lag window</text>

  <!-- Watermark -->
  <text x="878" y="412" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.22">systemdesignlaws.xyz</text>
</svg>