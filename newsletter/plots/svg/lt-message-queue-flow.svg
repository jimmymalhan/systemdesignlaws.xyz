<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" width="900" height="420">
  <rect x="0" y="0" width="900" height="420" fill="#FFFFFF"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1B1B1F"/>
    </marker>
  </defs>
  <text x="450" y="35" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="22" fill="#1B1B1F" font-weight="bold">Message Queue Flow</text>
  <!-- Producers -->
  <text x="120" y="70" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="15" fill="#1B1B1F" font-weight="bold">Producers</text>
  <rect x="40" y="85" width="160" height="45" rx="6" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
  <text x="120" y="113" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F">API Server 1</text>
  <rect x="40" y="145" width="160" height="45" rx="6" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
  <text x="120" y="173" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F">API Server 2</text>
  <rect x="40" y="205" width="160" height="45" rx="6" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
  <text x="120" y="233" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F">Scheduled Jobs</text>
  <!-- Queue -->
  <rect x="290" y="80" width="300" height="200" rx="10" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
  <text x="440" y="110" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="16" fill="#1B1B1F" font-weight="bold">Message Queue</text>
  <!-- Messages in queue -->
  <rect x="310" y="125" width="60" height="35" rx="4" fill="#FFFFFF" stroke="#1B1B1F" stroke-width="1"/>
  <text x="340" y="147" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">msg-1</text>
  <rect x="380" y="125" width="60" height="35" rx="4" fill="#FFFFFF" stroke="#1B1B1F" stroke-width="1"/>
  <text x="410" y="147" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">msg-2</text>
  <rect x="450" y="125" width="60" height="35" rx="4" fill="#FFFFFF" stroke="#1B1B1F" stroke-width="1"/>
  <text x="480" y="147" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">msg-3</text>
  <rect x="520" y="125" width="60" height="35" rx="4" fill="#FFFFFF" stroke="#1B1B1F" stroke-width="1"/>
  <text x="550" y="147" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">msg-4</text>
  <!-- Queue properties -->
  <text x="440" y="195" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">FIFO ordering</text>
  <text x="440" y="215" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">At-least-once delivery</text>
  <text x="440" y="235" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Persistence to disk</text>
  <text x="440" y="255" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Visibility timeout</text>
  <!-- Consumers -->
  <text x="760" y="70" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="15" fill="#1B1B1F" font-weight="bold">Consumers</text>
  <rect x="680" y="85" width="160" height="45" rx="6" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
  <text x="760" y="113" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F">Worker 1</text>
  <rect x="680" y="145" width="160" height="45" rx="6" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
  <text x="760" y="173" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F">Worker 2</text>
  <rect x="680" y="205" width="160" height="45" rx="6" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
  <text x="760" y="233" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F">Worker 3</text>
  <!-- Arrows -->
  <line x1="200" y1="107" x2="288" y2="140" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="200" y1="167" x2="288" y2="170" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="200" y1="227" x2="288" y2="200" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="590" y1="140" x2="678" y2="107" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="590" y1="170" x2="678" y2="167" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="590" y1="200" x2="678" y2="227" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Guarantees -->
  <rect x="100" y="310" width="200" height="80" rx="8" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
  <text x="200" y="335" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F" font-weight="bold">Publish</text>
  <text x="200" y="355" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Serialize message</text>
  <text x="200" y="375" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Get ACK from queue</text>
  <rect x="350" y="310" width="200" height="80" rx="8" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
  <text x="450" y="335" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F" font-weight="bold">Store</text>
  <text x="450" y="355" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Persist to disk</text>
  <text x="450" y="375" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Replicate if configured</text>
  <rect x="600" y="310" width="200" height="80" rx="8" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
  <text x="700" y="335" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F" font-weight="bold">Consume</text>
  <text x="700" y="355" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Pull or push delivery</text>
  <text x="700" y="375" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">ACK after processing</text>
  <!-- Flow arrows -->
  <line x1="300" y1="350" x2="348" y2="350" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="550" y1="350" x2="598" y2="350" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="878" y="412" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.22">systemdesignlaws.xyz</text>
</svg>