<text x="250" y="320" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Serverless. Limits: 1 year max, 256KB state.</text>
<text x="250" y="335" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Good for AWS-heavy environments.</text>
