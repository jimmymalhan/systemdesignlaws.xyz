<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" style="background:#FFFFFF">
  <defs>
    <marker id="arr-pl" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0.5 L9,3.5 L0,6.5" fill="#1B1B1F" stroke="#1B1B1F" stroke-width="1"/>
    </marker>
  </defs>
  <text x="450" y="32" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="22" fill="#1B1B1F" font-weight="bold">Pessimistic Locking: SELECT FOR UPDATE</text>

  <!-- Timeline columns -->
  <line x1="120" y1="50" x2="120" y2="395" stroke="#CCC" stroke-width="1.5" stroke-dasharray="5,4"/>
  <line x1="450" y1="50" x2="450" y2="395" stroke="#CCC" stroke-width="1.5" stroke-dasharray="5,4"/>
  <line x1="750" y1="50" x2="750" y2="395" stroke="#CCC" stroke-width="1.5" stroke-dasharray="5,4"/>

  <!-- Headers -->
  <rect x="50" y="48" width="140" height="30" rx="4" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
  <text x="120" y="68" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F" font-weight="bold">Alice (Txn A)</text>
  <rect x="380" y="48" width="140" height="30" rx="4" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
  <text x="450" y="68" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F" font-weight="bold">Database</text>
  <rect x="680" y="48" width="140" height="30" rx="4" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
  <text x="750" y="68" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F" font-weight="bold">Bob (Txn B)</text>

  <!-- Alice locks -->
  <line x1="120" y1="100" x2="438" y2="100" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr-pl)"/>
  <text x="280" y="95" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">SELECT ... FOR UPDATE</text>

  <!-- Lock granted -->
  <rect x="390" y="110" width="120" height="24" rx="4" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="450" y="127" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#2E7D32" font-weight="bold">LOCK GRANTED</text>

  <!-- Alice gets row -->
  <line x1="450" y1="145" x2="132" y2="145" stroke="#1B1B1F" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arr-pl)"/>
  <text x="290" y="140" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">seats = 1 (locked)</text>

  <!-- Bob tries to lock -->
  <line x1="750" y1="175" x2="462" y2="175" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr-pl)"/>
  <text x="610" y="170" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">SELECT ... FOR UPDATE</text>

  <!-- Bob blocked -->
  <rect x="620" y="195" width="260" height="80" rx="4" fill="#FFEBEE" stroke="#D32F2F" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="750" y="220" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#D32F2F" font-weight="bold">BLOCKED</text>
  <text x="750" y="240" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#D32F2F">Waiting for Alice to COMMIT</text>
  <text x="750" y="258" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#D32F2F">or ROLLBACK</text>

  <!-- Alice updates and commits -->
  <line x1="120" y1="215" x2="438" y2="215" stroke="#2E7D32" stroke-width="2" marker-end="url(#arr-pl)"/>
  <text x="280" y="210" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#2E7D32">UPDATE seats=0, COMMIT</text>

  <!-- Lock released -->
  <rect x="390" y="290" width="120" height="24" rx="4" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="450" y="307" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#2E7D32" font-weight="bold">LOCK RELEASED</text>

  <!-- Bob unblocked, sees 0 -->
  <line x1="450" y1="325" x2="738" y2="325" stroke="#1B1B1F" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arr-pl)"/>
  <text x="600" y="320" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">seats = 0 (sold out)</text>

  <!-- Bob rolls back -->
  <rect x="670" y="340" width="160" height="28" rx="4" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/>
  <text x="750" y="359" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#E65100" font-weight="bold">ROLLBACK (sold out)</text>

  <!-- Result -->
  <rect x="200" y="380" width="500" height="24" rx="4" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="450" y="397" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#2E7D32" font-weight="bold">Only Alice gets the ticket. No double-booking.</text>

  <text x="878" y="412" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.22">systemdesignlaws.xyz</text>
</svg>