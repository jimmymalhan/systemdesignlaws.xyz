  <rect x="80" y="70" width="740" height="200" rx="4" fill="#FAFAFA" stroke="#1B1B1F" stroke-width="1"/>
  <line x1="80" y1="270" x2="820" y2="270" stroke="#1B1B1F" stroke-width="1.5"/>
