  <text x="230.0" y="319.0" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Incoming (bursty)</text>
  <rect x="400" y="300" width="180" height="30" rx="4" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="490.0" y="319.0" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">DB writes (steady)</text>
