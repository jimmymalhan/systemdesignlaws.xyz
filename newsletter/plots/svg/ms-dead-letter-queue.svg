<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420">
<rect width="900" height="420" fill="#FFFFFF"/>

<text x="450" y="30" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="20" font-weight="bold" fill="#1B1B1F">Dead Letter Queue: Handling Poison Messages</text>
<rect x="50" y="70" width="200" height="50" rx="8" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
<text x="150" y="100" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F">Main Queue / Topic</text>
<line x1="250" y1="95" x2="300" y2="95" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>
<rect x="300" y="70" width="200" height="50" rx="8" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
<text x="400" y="100" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F">Worker Processing</text>
<line x1="500" y1="95" x2="550" y2="75" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>
<rect x="550" y="55" width="170" height="40" rx="8" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
<text x="635" y="80" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Success: next step</text>
<line x1="500" y1="95" x2="550" y2="120" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>
<rect x="550" y="105" width="170" height="40" rx="8" fill="#FFEBEE" stroke="#1B1B1F" stroke-width="2"/>
<text x="635" y="118" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Fail: Retry 1,2,3</text>
<text x="635" y="135" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">Max retries exceeded</text>
<line x1="635" y1="145" x2="635" y2="175" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>
<rect x="530" y="175" width="210" height="55" rx="8" fill="#FFEBEE" stroke="#1B1B1F" stroke-width="2"/>
<text x="635" y="200" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#1B1B1F">Dead Letter Queue</text>
<text x="635" y="218" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Poison messages stored here</text>
<rect x="100" y="265" width="700" height="90" rx="10" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
<text x="450" y="290" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#1B1B1F">DLQ Processing</text>
<text x="450" y="310" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">1. Alert operations team for manual review</text>
<text x="450" y="327" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">2. Fix the underlying issue (bad data, bug, service down)</text>
<text x="450" y="344" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">3. Replay messages from DLQ back to main queue</text>
<defs><marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#1B1B1F"/></marker></defs>
<text x="878" y="412" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.22">systemdesignlaws.xyz</text>
</svg>