<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420">
<rect width="900" height="420" fill="#FFFFFF"/>

<text x="450" y="35" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="20" font-weight="bold" fill="#1B1B1F">E-Commerce Order Fulfillment Flow</text>
<text x="450" y="55" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F" opacity="0.6">Each step calls a different service. Any step can fail.</text>
<rect x="30" y="80" width="120" height="50" rx="8" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
<text x="90" y="108" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F">User Request</text>
<line x1="150" y1="105" x2="180" y2="105" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>
<rect x="180" y="80" width="120" height="50" rx="8" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
<text x="240" y="108" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F">Charge Payment</text>
<line x1="300" y1="105" x2="330" y2="105" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>
<rect x="330" y="80" width="130" height="50" rx="8" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
<text x="395" y="108" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F">Reserve Inventory</text>
<line x1="460" y1="105" x2="490" y2="105" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>
<rect x="490" y="80" width="130" height="50" rx="8" fill="#F3E5F5" stroke="#1B1B1F" stroke-width="2"/>
<text x="555" y="108" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F">Create Shipping</text>
<line x1="620" y1="105" x2="650" y2="105" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>
<rect x="650" y="80" width="120" height="50" rx="8" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
<text x="710" y="108" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F">Wait for Pickup</text>
<line x1="770" y1="105" x2="800" y2="105" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>
<rect x="30" y="160" width="120" height="50" rx="8" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
<text x="90" y="188" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F">Send Email</text>
<line x1="800" y1="130" x2="800" y2="155" stroke="#1B1B1F" stroke-width="2"/>
<line x1="800" y1="155" x2="30" y2="155" stroke="#1B1B1F" stroke-width="2" stroke-dasharray="6,3"/>
<line x1="30" y1="155" x2="30" y2="160" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>
<rect x="200" y="250" width="500" height="60" rx="10" fill="#FFEBEE" stroke="#1B1B1F" stroke-width="2"/>
<text x="450" y="275" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#1B1B1F">Problem: Server crashes after step 2</text>
<text x="450" y="297" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Payment charged, but inventory never reserved. Money taken, no item.</text>
<defs><marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#1B1B1F"/></marker></defs>
<text x="878" y="412" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.22">systemdesignlaws.xyz</text>
</svg>