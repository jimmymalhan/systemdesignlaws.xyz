<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333333"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c0392b"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#27ae60"/>
    </marker>
  </defs>
  <rect width="800" height="480" fill="#ffffff"/>

  <!-- Title -->
  <text x="400" y="34" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#1a1a1a" text-anchor="middle">The Celebrity Problem</text>
  <text x="400" y="54" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#555555" text-anchor="middle">10M followers — naive direct fan-out causes thundering herd. Hierarchical distribution solves it.</text>

  <!-- Divider -->
  <line x1="400" y1="65" x2="400" y2="450" stroke="#dddddd" stroke-width="1.5"/>
  <text x="195" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#c0392b" text-anchor="middle">Naive Approach (PROBLEM)</text>
  <text x="600" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#27ae60" text-anchor="middle">Hierarchical Distribution (SOLUTION)</text>

  <!-- NAIVE SIDE -->
  <!-- Celebrity post -->
  <rect x="30" y="95" width="110" height="50" rx="8" fill="#fde8e8" stroke="#c0392b" stroke-width="2"/>
  <text x="85" y="117" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Celebrity</text>
  <text x="85" y="133" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#555555" text-anchor="middle">posts update</text>

  <!-- Fan-out arrows (show many) -->
  <line x1="140" y1="120" x2="185" y2="95" stroke="#c0392b" stroke-width="1.2" marker-end="url(#arrow-red)"/>
  <line x1="140" y1="120" x2="185" y2="110" stroke="#c0392b" stroke-width="1.2" marker-end="url(#arrow-red)"/>
  <line x1="140" y1="120" x2="185" y2="125" stroke="#c0392b" stroke-width="1.2" marker-end="url(#arrow-red)"/>
  <line x1="140" y1="120" x2="185" y2="140" stroke="#c0392b" stroke-width="1.2" marker-end="url(#arrow-red)"/>
  <line x1="140" y1="120" x2="185" y2="155" stroke="#c0392b" stroke-width="1.2" marker-end="url(#arrow-red)"/>
  <line x1="140" y1="120" x2="185" y2="170" stroke="#c0392b" stroke-width="1.2" marker-end="url(#arrow-red)"/>

  <!-- Follower dots -->
  <text x="200" y="98" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#c0392b">Follower 1</text>
  <text x="200" y="113" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#c0392b">Follower 2</text>
  <text x="200" y="128" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#c0392b">Follower 3</text>
  <text x="200" y="143" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#c0392b">Follower 4</text>
  <text x="200" y="158" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#c0392b">...</text>
  <text x="200" y="175" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#c0392b">Follower 10M</text>

  <rect x="30" y="200" width="340" height="70" rx="6" fill="#fde8e8" stroke="#c0392b" stroke-width="1.5"/>
  <text x="200" y="222" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#c0392b" text-anchor="middle">What happens:</text>
  <text x="200" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#333333" text-anchor="middle">10M writes to message queue instantly.</text>
  <text x="200" y="256" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#333333" text-anchor="middle">Queue saturates. Delivery takes hours.</text>
  <text x="200" y="272" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#333333" text-anchor="middle">System overloaded. Other users affected.</text>

  <!-- SOLUTION SIDE -->
  <!-- Celebrity post -->
  <rect x="420" y="95" width="110" height="50" rx="8" fill="#e8fde8" stroke="#4ab54a" stroke-width="2"/>
  <text x="475" y="117" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Celebrity</text>
  <text x="475" y="133" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#555555" text-anchor="middle">posts update</text>

  <!-- Cache write once -->
  <rect x="420" y="175" width="110" height="40" rx="6" fill="#fdf8e8" stroke="#d4a017" stroke-width="1.5"/>
  <text x="475" y="193" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Cache (CDN)</text>
  <text x="475" y="208" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#555555" text-anchor="middle">written once</text>

  <line x1="475" y1="145" x2="475" y2="173" stroke="#333333" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Regional servers -->
  <rect x="570" y="150" width="110" height="36" rx="5" fill="#e8f4fd" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="625" y="167" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#1a1a1a" text-anchor="middle">US Server</text>
  <text x="625" y="180" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#555555" text-anchor="middle">pulls from cache</text>

  <rect x="570" y="200" width="110" height="36" rx="5" fill="#e8f4fd" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="625" y="217" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#1a1a1a" text-anchor="middle">EU Server</text>
  <text x="625" y="230" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#555555" text-anchor="middle">pulls from cache</text>

  <rect x="570" y="250" width="110" height="36" rx="5" fill="#e8f4fd" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="625" y="267" font-family="system-ui, -apple-system, sans-serif" font-size="11" font-weight="bold" fill="#1a1a1a" text-anchor="middle">APAC Server</text>
  <text x="625" y="280" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#555555" text-anchor="middle">pulls from cache</text>

  <!-- Cache to regional servers -->
  <line x1="530" y1="190" x2="568" y2="168" stroke="#d4a017" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="530" y1="195" x2="568" y2="218" stroke="#d4a017" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="530" y1="200" x2="568" y2="268" stroke="#d4a017" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Local clients -->
  <text x="700" y="168" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#27ae60">→ 3M local clients</text>
  <text x="700" y="218" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#27ae60">→ 4M local clients</text>
  <text x="700" y="268" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#27ae60">→ 3M local clients</text>

  <line x1="680" y1="168" x2="698" y2="168" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="680" y1="218" x2="698" y2="218" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <line x1="680" y1="268" x2="698" y2="268" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- Result box -->
  <rect x="420" y="310" width="355" height="70" rx="6" fill="#e8fde8" stroke="#4ab54a" stroke-width="1.5"/>
  <text x="597" y="332" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#27ae60" text-anchor="middle">What happens:</text>
  <text x="597" y="350" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#333333" text-anchor="middle">1 cache write. Regional servers pull lazily.</text>
  <text x="597" y="366" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#333333" text-anchor="middle">Clients pull from local regional server.</text>
  <text x="597" y="382" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#333333" text-anchor="middle">Network load distributes geographically.</text>

  <!-- General note -->
  <rect x="30" y="400" width="740" height="58" rx="8" fill="#f9f9f9" stroke="#cccccc" stroke-width="1.5"/>
  <text x="400" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Interview Trigger</text>
  <text x="400" y="438" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#555555" text-anchor="middle">When interviewer says "10M followers" — ask "are there celebrity accounts?" and propose this pattern.</text>
  <text x="400" y="453" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#555555" text-anchor="middle">Same solution applies to: trending topics, breaking news, viral posts.</text>
</svg>
