<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" style="background:#FFFFFF">
  <defs>
    <marker id="arr-rr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0.5 L9,3.5 L0,6.5" fill="#1B1B1F" stroke="#1B1B1F" stroke-width="1"/>
    </marker>
  </defs>
  <text x="450" y="32" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="22" fill="#1B1B1F" font-weight="bold">REPEATABLE READ: Snapshot Isolation</text>

  <line x1="150" y1="55" x2="150" y2="385" stroke="#CCC" stroke-width="1.5" stroke-dasharray="5,4"/>
  <line x1="450" y1="55" x2="450" y2="385" stroke="#CCC" stroke-width="1.5" stroke-dasharray="5,4"/>
  <line x1="750" y1="55" x2="750" y2="385" stroke="#CCC" stroke-width="1.5" stroke-dasharray="5,4"/>

  <rect x="70" y="50" width="160" height="28" rx="4" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
  <text x="150" y="69" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F" font-weight="bold">Transaction A</text>
  <rect x="370" y="50" width="160" height="28" rx="4" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
  <text x="450" y="69" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F" font-weight="bold">Database</text>
  <rect x="670" y="50" width="160" height="28" rx="4" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
  <text x="750" y="69" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F" font-weight="bold">Transaction B</text>

  <!-- Txn A begins, takes snapshot -->
  <line x1="150" y1="100" x2="438" y2="100" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr-rr)"/>
  <text x="294" y="95" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">BEGIN (takes snapshot)</text>

  <rect x="30" y="110" width="240" height="24" rx="4" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="1"/>
  <text x="150" y="127" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Snapshot: seats=1, price=$50</text>

  <!-- Txn A reads -->
  <line x1="150" y1="150" x2="438" y2="150" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr-rr)"/>
  <text x="294" y="145" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">SELECT seats, price</text>
  <text x="294" y="167" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#2E7D32">Returns: seats=1, price=$50</text>

  <!-- Txn B changes price and commits -->
  <line x1="750" y1="195" x2="462" y2="195" stroke="#E65100" stroke-width="2" marker-end="url(#arr-rr)"/>
  <text x="606" y="190" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#E65100">UPDATE price=$75; COMMIT</text>

  <rect x="390" y="205" width="120" height="24" rx="4" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/>
  <text x="450" y="222" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#E65100">price = $75 (new)</text>

  <!-- Txn A reads again, same result -->
  <line x1="150" y1="250" x2="438" y2="250" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr-rr)"/>
  <text x="294" y="245" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">SELECT seats, price (again)</text>

  <rect x="30" y="265" width="240" height="38" rx="4" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="150" y="282" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#2E7D32" font-weight="bold">Still returns price=$50!</text>
  <text x="150" y="297" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#2E7D32">Uses snapshot, not latest</text>

  <!-- Comparison -->
  <rect x="80" y="320" width="340" height="40" rx="6" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="250" y="337" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#2E7D32" font-weight="bold">REPEATABLE READ</text>
  <text x="250" y="354" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#2E7D32">Both reads return same value</text>

  <rect x="480" y="320" width="340" height="40" rx="6" fill="#FFEBEE" stroke="#D32F2F" stroke-width="1.5"/>
  <text x="650" y="337" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#D32F2F" font-weight="bold">READ COMMITTED</text>
  <text x="650" y="354" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#D32F2F">Second read would show $75</text>

  <!-- Note -->
  <rect x="160" y="375" width="580" height="28" rx="4" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1.5"/>
  <text x="450" y="394" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#7B1FA2">MySQL default. Still allows phantom reads (new rows appearing).</text>

  <text x="878" y="412" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.22">systemdesignlaws.xyz</text>
</svg>