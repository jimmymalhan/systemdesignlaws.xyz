<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420">
<rect width="900" height="420" fill="#FFFFFF"/>

<!-- Title -->
<text x="450" y="32" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="20" font-weight="bold" fill="#1B1B1F">Cloud Provider Object Storage Comparison</text>

<!-- AWS S3 -->
<rect x="40" y="60" width="260" height="155" rx="8" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
<text x="170" y="85" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="15" font-weight="bold" fill="#1B1B1F">AWS S3</text>
<text x="60" y="108" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Max object: 5 TB</text>
<text x="60" y="126" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Max part size: 5 GB</text>
<text x="60" y="144" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Max parts: 10,000</text>
<text x="60" y="162" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Presigned URLs: yes</text>
<text x="60" y="180" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Multipart upload: yes</text>
<text x="60" y="198" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">CDN: CloudFront</text>

<!-- GCS -->
<rect x="320" y="60" width="260" height="155" rx="8" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
<text x="450" y="85" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="15" font-weight="bold" fill="#1B1B1F">Google Cloud Storage</text>
<text x="340" y="108" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Max object: 5 TB</text>
<text x="340" y="126" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Max part size: 5 GB</text>
<text x="340" y="144" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Max parts: 10,000</text>
<text x="340" y="162" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Signed URLs: yes</text>
<text x="340" y="180" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Resumable upload: yes</text>
<text x="340" y="198" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">CDN: Cloud CDN</text>

<!-- Azure Blob -->
<rect x="600" y="60" width="260" height="155" rx="8" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
<text x="730" y="85" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="15" font-weight="bold" fill="#1B1B1F">Azure Blob Storage</text>
<text x="620" y="108" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Max blob: 190.7 TB</text>
<text x="620" y="126" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Max block: 4 GB</text>
<text x="620" y="144" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Max blocks: 50,000</text>
<text x="620" y="162" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">SAS tokens: yes</text>
<text x="620" y="180" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Block upload: yes</text>
<text x="620" y="198" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">CDN: Azure CDN</text>

<!-- Common pattern box -->
<rect x="40" y="235" width="820" height="70" rx="8" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
<text x="450" y="258" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#1B1B1F">Common Pattern Across All Providers</text>
<text x="450" y="278" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">1. Client requests presigned/signed URL from your server</text>
<text x="450" y="295" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">2. Client uploads directly to object storage (bypasses your server)</text>

<!-- Interview tip -->
<rect x="40" y="325" width="820" height="70" rx="8" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
<text x="450" y="348" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#1B1B1F">Interview Tip</text>
<text x="450" y="368" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Say "object storage" or "S3-compatible storage" instead of locking to one provider.</text>
<text x="450" y="385" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">The concepts (presigned URLs, multipart, CDN) are identical across clouds.</text>

<!-- Watermark -->
<text x="878" y="412" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.22">systemdesignlaws.xyz</text>
</svg>