<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420">
<rect width="900" height="420" fill="#FFFFFF"/>
<defs>
  <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
    <path d="M0,0.5 L9,3.5 L0,6.5" fill="#1B1B1F" stroke="#1B1B1F" stroke-width="1"/>
  </marker>
</defs>

<!-- Title -->
<text x="450" y="32" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="20" font-weight="bold" fill="#1B1B1F">Dropbox Sync Flow</text>
<text x="450" y="52" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F" opacity="0.6">File sync across devices using chunked upload and content addressing</text>

<!-- Client A -->
<rect x="40" y="75" width="130" height="55" rx="8" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
<text x="105" y="97" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#1B1B1F">Client A</text>
<text x="105" y="117" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">Edits file</text>

<line x1="170" y1="102" x2="215" y2="102" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>

<!-- Chunking -->
<rect x="220" y="70" width="150" height="65" rx="8" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
<text x="295" y="92" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#1B1B1F">Chunk + Hash</text>
<text x="295" y="110" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">4MB chunks</text>
<text x="295" y="125" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">SHA-256 per chunk</text>

<line x1="370" y1="102" x2="415" y2="102" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>

<!-- Metadata server -->
<rect x="420" y="70" width="160" height="65" rx="8" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
<text x="500" y="92" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#1B1B1F">Metadata Server</text>
<text x="500" y="110" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">Check: which chunks</text>
<text x="500" y="125" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">already exist?</text>

<line x1="580" y1="102" x2="625" y2="102" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>

<!-- Block server -->
<rect x="630" y="75" width="130" height="55" rx="8" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
<text x="695" y="97" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#1B1B1F">Block Storage</text>
<text x="695" y="117" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">Only new chunks</text>

<line x1="760" y1="102" x2="795" y2="102" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>

<rect x="800" y="75" width="70" height="55" rx="8" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
<text x="835" y="97" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" font-weight="bold" fill="#1B1B1F">S3</text>
<text x="835" y="117" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">Stored</text>

<!-- Sync notification -->
<line x1="500" y1="135" x2="500" y2="165" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>

<rect x="380" y="170" width="240" height="45" rx="8" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
<text x="500" y="190" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#1B1B1F">Notification Service</text>
<text x="500" y="207" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">Push: "file changed" to all devices</text>

<line x1="500" y1="215" x2="500" y2="245" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>

<!-- Client B -->
<rect x="420" y="250" width="160" height="55" rx="8" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
<text x="500" y="272" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#1B1B1F">Client B</text>
<text x="500" y="292" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">Downloads only changed chunks</text>

<!-- Key insight: dedup -->
<rect x="40" y="170" width="310" height="80" rx="8" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
<text x="195" y="192" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#1B1B1F">Content-Addressable Storage</text>
<text x="60" y="212" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Chunk key = SHA-256(content)</text>
<text x="60" y="228" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Same content = same hash = stored once</text>
<text x="60" y="244" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">10 users upload same PDF: 1 copy stored</text>

<!-- Delta sync -->
<rect x="40" y="325" width="820" height="65" rx="8" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
<text x="450" y="348" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#1B1B1F">Delta Sync: Only Transfer What Changed</text>
<text x="450" y="368" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Edit 1 paragraph in a 100MB doc: only the changed 4MB chunk is uploaded and synced.</text>
<text x="450" y="385" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Massive bandwidth savings. This is why Dropbox feels instant for small edits to large files.</text>

<!-- Watermark -->
<text x="878" y="412" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.22">systemdesignlaws.xyz</text>
</svg>