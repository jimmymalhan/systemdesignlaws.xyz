<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" style="background:#FFFFFF">
  <defs>
    <marker id="arr-wt" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0.5 L9,3.5 L0,6.5" fill="#1B1B1F" stroke="#1B1B1F" stroke-width="1"/>
    </marker>
    <marker id="arr-wt-b" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0.5 L9,3.5 L0,6.5" fill="#2980b9" stroke="#2980b9" stroke-width="1"/>
    </marker>
    <marker id="arr-wt-g" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0.5 L9,3.5 L0,6.5" fill="#27ae60" stroke="#27ae60" stroke-width="1"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#1a1a1a" font-weight="bold">Write-Through Cache</text>
  <text x="400" y="52" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#888">Cache and DB are always in sync - every write updates both</text>

  <!-- Step 1: App writes to Cache -->
  <rect x="60" y="120" width="140" height="70" rx="8" fill="#E8F4FD" stroke="#2980b9" stroke-width="2"/>
  <text x="130" y="148" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#1a1a1a" font-weight="bold">Application</text>
  <text x="130" y="168" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#2980b9">write(key, value)</text>
  <rect x="80" y="95" width="100" height="22" rx="8" fill="#E8F4FD" stroke="#2980b9" stroke-width="1.5"/>
  <text x="130" y="110" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#2980b9" font-weight="bold">Step 1</text>

  <!-- Arrow App to Cache -->
  <path d="M200,155 L290,155" stroke="#2980b9" stroke-width="2.5" fill="none" marker-end="url(#arr-wt-b)"/>
  <text x="245" y="145" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#2980b9" font-weight="bold">Write</text>

  <!-- Cache -->
  <rect x="300" y="120" width="140" height="70" rx="8" fill="#E8F5E9" stroke="#27ae60" stroke-width="2"/>
  <text x="370" y="148" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#1a1a1a" font-weight="bold">Cache</text>
  <text x="370" y="168" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#27ae60">Redis / Memcached</text>
  <rect x="320" y="95" width="100" height="22" rx="8" fill="#E8F5E9" stroke="#27ae60" stroke-width="1.5"/>
  <text x="370" y="110" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#27ae60" font-weight="bold">Step 2</text>

  <!-- Arrow Cache to DB (synchronous) -->
  <path d="M440,155 L530,155" stroke="#d4a017" stroke-width="2.5" fill="none" marker-end="url(#arr-wt)"/>
  <text x="485" y="145" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#d4a017" font-weight="bold">Sync Write</text>

  <!-- Database -->
  <rect x="540" y="120" width="140" height="70" rx="8" fill="#FFF8E8" stroke="#d4a017" stroke-width="2"/>
  <text x="610" y="148" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="15" fill="#1a1a1a" font-weight="bold">Database</text>
  <text x="610" y="168" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#d4a017">PostgreSQL</text>
  <rect x="560" y="95" width="100" height="22" rx="8" fill="#FFF8E8" stroke="#d4a017" stroke-width="1.5"/>
  <text x="610" y="110" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#d4a017" font-weight="bold">Step 2b</text>

  <!-- Return arrow -->
  <path d="M610,190 C610,230 370,250 130,190" stroke="#27ae60" stroke-width="2" fill="none" stroke-dasharray="6,4" marker-end="url(#arr-wt-g)"/>
  <rect x="320" y="225" width="120" height="22" rx="8" fill="#E8F5E9" stroke="#27ae60" stroke-width="1.5"/>
  <text x="380" y="240" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#27ae60" font-weight="bold">Step 3: ACK</text>

  <!-- Characteristics -->
  <rect x="60" y="280" width="320" height="120" rx="8" fill="#E8F5E9" stroke="#27ae60" stroke-width="1.5"/>
  <text x="220" y="305" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#27ae60" font-weight="bold">Advantages</text>
  <text x="80" y="325" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#333333">- Cache is always fresh</text>
  <text x="80" y="345" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#333333">- Strong consistency</text>
  <text x="80" y="365" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#333333">- Reads never see stale data</text>
  <text x="80" y="385" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#333333">- Simple mental model</text>

  <rect x="420" y="280" width="320" height="120" rx="8" fill="#FFEBEE" stroke="#c0392b" stroke-width="1.5"/>
  <text x="580" y="305" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#c0392b" font-weight="bold">Disadvantages</text>
  <text x="440" y="325" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#333333">- Slower writes (2x latency)</text>
  <text x="440" y="345" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#333333">- Cache polluted with unread data</text>
  <text x="440" y="365" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#333333">- Dual-write failure risk</text>
  <text x="440" y="385" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#333333">- Not natively supported by Redis</text>

  <!-- Tradeoffs box -->
  <rect x="60" y="420" width="680" height="40" rx="8" fill="#fff8e8" stroke="#d4a017" stroke-width="1"/>
  <text x="400" y="445" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#333333" font-weight="bold">Use when: reads must always return fresh data and you accept slower writes</text>

  <!-- Watermark -->
  <text x="778" y="472" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#1a1a1a" opacity="0.22">systemdesignlaws.xyz</text>
</svg>