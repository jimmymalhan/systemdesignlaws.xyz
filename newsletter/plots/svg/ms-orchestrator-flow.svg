<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420">
<rect width="900" height="420" fill="#FFFFFF"/>

<text x="450" y="30" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="20" font-weight="bold" fill="#1B1B1F">Orchestrator Flow: Step-by-Step</text>
<rect x="350" y="50" width="200" height="45" rx="8" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
<text x="450" y="78" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#1B1B1F">Orchestrator</text>
<line x1="450" y1="95" x2="450" y2="115" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>
<rect x="50" y="115" width="150" height="40" rx="6" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
<text x="125" y="140" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">1. processPayment()</text>
<line x1="200" y1="135" x2="240" y2="135" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>
<rect x="240" y="115" width="130" height="40" rx="6" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
<text x="305" y="133" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Success?</text>
<text x="305" y="148" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" font-weight="bold">Yes</text>
<line x1="370" y1="135" x2="410" y2="135" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>
<rect x="410" y="115" width="170" height="40" rx="6" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
<text x="495" y="140" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">2. reserveInventory()</text>
<line x1="580" y1="135" x2="620" y2="135" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>
<rect x="620" y="115" width="130" height="40" rx="6" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
<text x="685" y="133" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Success?</text>
<text x="685" y="148" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" font-weight="bold">Yes</text>
<line x1="450" y1="155" x2="450" y2="185" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>
<rect x="300" y="185" width="150" height="40" rx="6" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
<text x="375" y="210" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">3. shipOrder()</text>
<line x1="450" y1="225" x2="450" y2="255" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>
<rect x="300" y="255" width="150" height="40" rx="6" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
<text x="375" y="280" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">4. sendEmail()</text>
<rect x="620" y="185" width="200" height="80" rx="8" fill="#FFEBEE" stroke="#1B1B1F" stroke-width="2"/>
<text x="720" y="210" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#1B1B1F">On Any Failure</text>
<text x="720" y="230" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Run compensating actions</text>
<text x="720" y="250" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">in reverse order</text>
<line x1="685" y1="155" x2="720" y2="185" stroke="#1B1B1F" stroke-width="1.5" stroke-dasharray="4,3"/>
<rect x="150" y="330" width="600" height="50" rx="10" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
<text x="450" y="352" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Orchestrator controls flow. Knows which step is current.</text>
<text x="450" y="370" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Can checkpoint state between steps for recovery.</text>
<defs><marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#1B1B1F"/></marker></defs>
<text x="878" y="412" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.22">systemdesignlaws.xyz</text>
</svg>