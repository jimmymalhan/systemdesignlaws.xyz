<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 475" style="background:#FFFFFF">
  <defs>
    <marker id="arr-ci" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0.5 L9,3.5 L0,6.5" fill="#1B1B1F" stroke="#1B1B1F" stroke-width="1"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="35" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="20" fill="#1B1B1F" font-weight="bold">Cache Invalidation Strategies</text>
  <text x="450" y="55" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#888">When cached data changes, how do you keep caches fresh?</text>

  <!-- Strategy 1: TTL -->
  <rect x="20" y="75" width="165" height="175" rx="8" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
  <text x="102" y="100" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#2E7D32" font-weight="bold">TTL (Time-Based)</text>
  <circle cx="102" cy="130" r="18" fill="none" stroke="#2E7D32" stroke-width="2"/>
  <line x1="102" y1="130" x2="102" y2="118" stroke="#2E7D32" stroke-width="2"/>
  <line x1="102" y1="130" x2="112" y2="130" stroke="#2E7D32" stroke-width="2"/>
  <text x="102" y="165" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">Set expiry: 5min</text>
  <text x="102" y="180" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">Auto-expire</text>
  <text x="102" y="200" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="9" fill="#2E7D32">+ Simple</text>
  <text x="102" y="215" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="9" fill="#D32F2F">- Stale until expiry</text>
  <text x="102" y="238" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="9" fill="#888" font-style="italic">Best default choice</text>

  <!-- Strategy 2: Write-Through -->
  <rect x="195" y="75" width="165" height="175" rx="8" fill="#E8F4FD" stroke="#1565C0" stroke-width="2"/>
  <text x="277" y="100" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1565C0" font-weight="bold">Write-Through</text>
  <rect x="237" y="112" width="35" height="20" rx="3" fill="#E8F4FD" stroke="#1565C0" stroke-width="1.5"/>
  <text x="254" y="126" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="8" fill="#1565C0">App</text>
  <line x1="272" y1="122" x2="297" y2="122" stroke="#1565C0" stroke-width="1.5" marker-end="url(#arr-ci)"/>
  <rect x="300" y="112" width="40" height="20" rx="3" fill="#E8F4FD" stroke="#1565C0" stroke-width="1.5"/>
  <text x="320" y="126" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="7" fill="#1565C0">Cache</text>
  <line x1="277" y1="132" x2="277" y2="145" stroke="#1565C0" stroke-width="1.5" marker-end="url(#arr-ci)"/>
  <rect x="257" y="148" width="40" height="20" rx="3" fill="#E8F4FD" stroke="#1565C0" stroke-width="1.5"/>
  <text x="277" y="162" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="8" fill="#1565C0">DB</text>
  <text x="277" y="185" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">Update both on write</text>
  <text x="277" y="200" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="9" fill="#2E7D32">+ Always fresh</text>
  <text x="277" y="215" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="9" fill="#D32F2F">- Slower writes</text>
  <text x="277" y="238" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="9" fill="#888" font-style="italic">Strong consistency</text>

  <!-- Strategy 3: Write-Behind -->
  <rect x="370" y="75" width="165" height="175" rx="8" fill="#FFF3E0" stroke="#E65100" stroke-width="2"/>
  <text x="452" y="100" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#E65100" font-weight="bold">Write-Behind</text>
  <rect x="412" y="112" width="35" height="20" rx="3" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/>
  <text x="429" y="126" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="8" fill="#E65100">App</text>
  <line x1="447" y1="122" x2="472" y2="122" stroke="#E65100" stroke-width="1.5" marker-end="url(#arr-ci)"/>
  <rect x="475" y="112" width="40" height="20" rx="3" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/>
  <text x="495" y="126" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="7" fill="#E65100">Cache</text>
  <line x1="452" y1="132" x2="452" y2="145" stroke="#E65100" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#arr-ci)"/>
  <rect x="432" y="148" width="40" height="20" rx="3" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/>
  <text x="452" y="162" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="8" fill="#E65100">DB</text>
  <text x="480" y="155" font-family="Virgil, Segoe UI, sans-serif" font-size="8" fill="#E65100">async</text>
  <text x="452" y="185" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">Queue, batch to DB</text>
  <text x="452" y="200" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="9" fill="#2E7D32">+ Fast writes</text>
  <text x="452" y="215" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="9" fill="#D32F2F">- Stale window</text>
  <text x="452" y="238" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="9" fill="#888" font-style="italic">Eventual consistency</text>

  <!-- Strategy 4: Tagged Invalidation -->
  <rect x="545" y="75" width="165" height="175" rx="8" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="2"/>
  <text x="627" y="100" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#7B1FA2" font-weight="bold">Tagged</text>
  <rect x="582" y="115" width="90" height="16" rx="8" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1"/>
  <text x="627" y="127" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="9" fill="#7B1FA2">user:123:posts</text>
  <rect x="582" y="135" width="90" height="16" rx="8" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1"/>
  <text x="627" y="147" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="9" fill="#7B1FA2">user:123:feed</text>
  <rect x="582" y="155" width="90" height="16" rx="8" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1"/>
  <text x="627" y="167" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="9" fill="#7B1FA2">user:123:stats</text>
  <text x="627" y="190" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">Group by tag, flush all</text>
  <text x="627" y="205" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="9" fill="#2E7D32">+ Complex deps</text>
  <text x="627" y="220" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="9" fill="#D32F2F">- Tag tracking</text>
  <text x="627" y="238" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="9" fill="#888" font-style="italic">Object graph changes</text>

  <!-- Strategy 5: Versioned Keys -->
  <rect x="720" y="75" width="165" height="175" rx="8" fill="#FFF8E1" stroke="#F57F17" stroke-width="2"/>
  <text x="802" y="100" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#F57F17" font-weight="bold">Versioned Keys</text>
  <rect x="745" y="115" width="110" height="18" rx="4" fill="#FFF8E1" stroke="#BDBDBD" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="800" y="128" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="9" fill="#999" text-decoration="line-through">event:123:v42</text>
  <rect x="745" y="140" width="110" height="18" rx="4" fill="#FFF8E1" stroke="#F57F17" stroke-width="1.5"/>
  <text x="800" y="153" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="9" fill="#F57F17" font-weight="bold">event:123:v43</text>
  <text x="802" y="178" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">Old key unreachable</text>
  <text x="802" y="200" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="9" fill="#2E7D32">+ No race conditions</text>
  <text x="802" y="215" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="9" fill="#D32F2F">- 2 lookups per read</text>
  <text x="802" y="238" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="9" fill="#888" font-style="italic">Atomic, no deletion</text>

  <!-- Spectrum bar -->
  <rect x="40" y="280" width="820" height="50" rx="8" fill="#FAFAFA" stroke="#DDD" stroke-width="1"/>
  <text x="450" y="298" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F" font-weight="bold">Trade-off Spectrum</text>
  <rect x="60" y="308" width="156" height="12" rx="6" fill="#E8F5E9"/>
  <rect x="216" y="308" width="156" height="12" fill="#E8F4FD"/>
  <rect x="372" y="308" width="156" height="12" fill="#FFF3E0"/>
  <rect x="528" y="308" width="156" height="12" fill="#F3E5F5"/>
  <rect x="684" y="308" width="156" height="12" rx="6" fill="#FFF8E1"/>
  <text x="60" y="338" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#2E7D32">Simple</text>
  <text x="840" y="338" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#F57F17">Complex</text>
  <text x="60" y="352" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#D32F2F">Stale data OK</text>
  <text x="840" y="352" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#2E7D32">Always fresh</text>

  <!-- TTL Guidelines -->
  <rect x="40" y="370" width="820" height="100" rx="8" fill="#FAFAFA" stroke="#DDD" stroke-width="1"/>
  <text x="450" y="392" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F" font-weight="bold">TTL Guidelines (driven by staleness requirements)</text>
  <rect x="60" y="405" width="185" height="50" rx="6" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1"/>
  <text x="152" y="425" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" font-weight="bold">User Profiles</text>
  <text x="152" y="445" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#2E7D32">5-15 min</text>
  <rect x="260" y="405" width="185" height="50" rx="6" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
  <text x="352" y="425" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" font-weight="bold">Feed / Timeline</text>
  <text x="352" y="445" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#E65100">30-60 sec</text>
  <rect x="460" y="405" width="185" height="50" rx="6" fill="#E8F4FD" stroke="#1565C0" stroke-width="1"/>
  <text x="552" y="425" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" font-weight="bold">Config / Flags</text>
  <text x="552" y="445" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1565C0">1-5 min</text>
  <rect x="660" y="405" width="185" height="50" rx="6" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1"/>
  <text x="752" y="425" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" font-weight="bold">Session Data</text>
  <text x="752" y="445" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#7B1FA2">Hours</text>

  <!-- Watermark -->
  <text x="878" y="372" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.22">systemdesignlaws.xyz</text>
</svg>
