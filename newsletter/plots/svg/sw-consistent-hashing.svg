  <text x="695.0" y="150.0" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F" font-weight="bold">How It Works</text>
  <text x="695" y="115" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Keys map to a position on the ring</text>
  <text x="695" y="140" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Walk clockwise to find the node</text>
  <text x="695" y="165" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Add node: only neighbors re-map</text>
  <text x="695" y="190" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Remove node: only its keys move</text>
  <rect x="520" y="250" width="350" height="100" rx="6" fill="#F3E5F5" stroke="#1B1B1F" stroke-width="2"/>
  <text x="695.0" y="305.0" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F" font-weight="bold">Why This Matters for Writes</text>
  <text x="695" y="290" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Add shard: ~1/N keys re-map</text>
  <text x="695" y="315" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">vs rehash all: 100% keys re-map</text>
  <text x="695" y="340" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Minimal disruption during scaling</text>

