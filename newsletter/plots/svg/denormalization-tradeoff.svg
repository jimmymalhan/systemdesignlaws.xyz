<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" style="background:#FFFFFF">
  <defs>
    <marker id="arr-dn" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0.5 L9,3.5 L0,6.5" fill="#1B1B1F" stroke="#1B1B1F" stroke-width="1"/>
    </marker>
    <marker id="arr-dn-b" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0.5 L9,3.5 L0,6.5" fill="#1565C0" stroke="#1565C0" stroke-width="1"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="30" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="22" fill="#1B1B1F" font-weight="bold">Normalization vs Denormalization Trade-off</text>

  <!-- LEFT SIDE label -->
  <text x="195" y="55" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#555" font-style="italic">Normalized: Clean writes, Slow reads</text>

  <!-- users table -->
  <rect x="50" y="70" width="140" height="90" rx="6" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
  <text x="120" y="90" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F" font-weight="bold">users</text>
  <line x1="55" y1="98" x2="185" y2="98" stroke="#1B1B1F" stroke-width="1" opacity="0.4"/>
  <text x="65" y="115" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#666">user_id (PK)</text>
  <text x="65" y="131" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#666">name</text>
  <text x="65" y="147" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#666">email</text>

  <!-- orders table -->
  <rect x="115" y="192" width="155" height="105" rx="6" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
  <text x="192" y="213" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F" font-weight="bold">orders</text>
  <line x1="120" y1="220" x2="265" y2="220" stroke="#1B1B1F" stroke-width="1" opacity="0.4"/>
  <text x="127" y="237" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#666">order_id (PK)</text>
  <text x="127" y="253" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#666">user_id (FK)</text>
  <text x="127" y="269" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#666">product_id (FK)</text>
  <text x="127" y="285" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#666">quantity</text>

  <!-- products table -->
  <rect x="225" y="70" width="140" height="90" rx="6" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
  <text x="295" y="90" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F" font-weight="bold">products</text>
  <line x1="230" y1="98" x2="360" y2="98" stroke="#1B1B1F" stroke-width="1" opacity="0.4"/>
  <text x="237" y="115" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#666">product_id (PK)</text>
  <text x="237" y="131" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#666">name</text>
  <text x="237" y="147" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#666">price</text>

  <!-- FK arrow: users to orders -->
  <path d="M120,160 C120,172 145,182 160,192" stroke="#1565C0" stroke-width="1.8" fill="none" marker-end="url(#arr-dn-b)"/>
  <text x="108" y="182" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1565C0" font-weight="bold">JOIN</text>

  <!-- FK arrow: products to orders -->
  <path d="M295,160 C295,172 245,182 230,192" stroke="#1565C0" stroke-width="1.8" fill="none" marker-end="url(#arr-dn-b)"/>
  <text x="275" y="182" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1565C0" font-weight="bold">JOIN</text>

  <!-- Center arrow: Denormalize -->
  <path d="M385,190 L485,190" stroke="#1B1B1F" stroke-width="3" fill="none" marker-end="url(#arr-dn)"/>
  <text x="435" y="178" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="15" fill="#1B1B1F" font-weight="bold">Denormalize</text>
  <text x="435" y="210" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#888">(flatten into one table)</text>

  <!-- RIGHT SIDE label -->
  <text x="670" y="55" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#555" font-style="italic">Denormalized: Fast reads, Complex writes</text>

  <!-- order_summary big box -->
  <rect x="510" y="68" width="310" height="240" rx="6" fill="#FFF3E0" stroke="#E65100" stroke-width="2.5"/>
  <text x="665" y="92" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="17" fill="#1B1B1F" font-weight="bold">order_summary</text>
  <line x1="520" y1="100" x2="810" y2="100" stroke="#1B1B1F" stroke-width="1" opacity="0.4"/>

  <!-- Fields -->
  <text x="530" y="120" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#666">order_id (PK)</text>
  <text x="530" y="140" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#666">user_id</text>
  <text x="530" y="160" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1565C0">user_name  (duplicated)</text>
  <text x="530" y="180" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1565C0">user_email  (duplicated)</text>
  <text x="530" y="200" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#666">product_id</text>
  <text x="530" y="220" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1565C0">product_name  (duplicated)</text>
  <text x="530" y="240" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1565C0">product_price  (duplicated)</text>
  <text x="530" y="260" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#666">quantity</text>
  <text x="530" y="280" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#666">order_total</text>

  <!-- Origin badges -->
  <rect x="730" y="150" width="75" height="18" rx="4" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="1"/>
  <text x="767" y="163" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="9" fill="#1B1B1F">from users</text>
  <rect x="730" y="170" width="75" height="18" rx="4" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="1"/>
  <text x="767" y="183" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="9" fill="#1B1B1F">from users</text>
  <rect x="730" y="210" width="75" height="18" rx="4" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="1"/>
  <text x="767" y="223" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="9" fill="#1B1B1F">from products</text>
  <rect x="730" y="230" width="75" height="18" rx="4" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="1"/>
  <text x="767" y="243" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="9" fill="#1B1B1F">from products</text>

  <!-- Bottom: Green bar (Reads) -->
  <rect x="40" y="330" width="390" height="40" rx="8" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
  <text x="235" y="356" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#2E7D32" font-weight="bold">Reads 1000x faster (no JOINs, ~1ms)</text>

  <!-- Bottom: Red bar (Write overhead) -->
  <rect x="460" y="330" width="390" height="40" rx="8" fill="#FFEBEE" stroke="#C62828" stroke-width="2"/>
  <text x="655" y="356" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#C62828" font-weight="bold">Write overhead (update many rows)</text>

  <!-- Bottom summary -->
  <text x="450" y="395" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#888">Choose based on your read/write ratio. Read-heavy? Denormalize. Write-heavy? Keep normalized.</text>

  <!-- Watermark -->
  <text x="878" y="412" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.22">systemdesignlaws.xyz</text>
</svg>