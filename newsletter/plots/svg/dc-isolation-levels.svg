<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" style="background:#FFFFFF">
  <text x="450" y="32" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="22" fill="#1B1B1F" font-weight="bold">SQL Isolation Levels: Protection Spectrum</text>

  <!-- Spectrum bar -->
  <defs>
    <linearGradient id="spectrum" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#FFEBEE"/>
      <stop offset="33%" style="stop-color:#FFF3E0"/>
      <stop offset="66%" style="stop-color:#E8F4FD"/>
      <stop offset="100%" style="stop-color:#E8F5E9"/>
    </linearGradient>
  </defs>
  <rect x="60" y="55" width="780" height="30" rx="6" fill="url(#spectrum)" stroke="#1B1B1F" stroke-width="2"/>
  <text x="60" y="100" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#D32F2F">Least protection</text>
  <text x="840" y="100" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#2E7D32">Most protection</text>

  <!-- Level 1: Read Uncommitted -->
  <rect x="30" y="120" width="195" height="105" rx="6" fill="#FFEBEE" stroke="#1B1B1F" stroke-width="2"/>
  <text x="128" y="142" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F" font-weight="bold">READ UNCOMMITTED</text>
  <text x="128" y="162" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Can see uncommitted</text>
  <text x="128" y="178" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">changes (dirty reads)</text>
  <text x="128" y="198" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#D32F2F">Rarely used</text>
  <text x="128" y="216" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Fastest, least safe</text>

  <!-- Level 2: Read Committed -->
  <rect x="240" y="120" width="195" height="105" rx="6" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
  <text x="338" y="142" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F" font-weight="bold">READ COMMITTED</text>
  <text x="338" y="162" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Only committed data</text>
  <text x="338" y="178" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">visible to reads</text>
  <text x="338" y="198" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#E65100" font-weight="bold">PostgreSQL default</text>
  <text x="338" y="216" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Still allows race conditions</text>

  <!-- Level 3: Repeatable Read -->
  <rect x="450" y="120" width="195" height="105" rx="6" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
  <text x="548" y="142" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F" font-weight="bold">REPEATABLE READ</text>
  <text x="548" y="162" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Same query returns</text>
  <text x="548" y="178" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">same data in a txn</text>
  <text x="548" y="198" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1565C0" font-weight="bold">MySQL default</text>
  <text x="548" y="216" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Prevents non-repeatable reads</text>

  <!-- Level 4: Serializable -->
  <rect x="660" y="120" width="210" height="105" rx="6" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
  <text x="765" y="142" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F" font-weight="bold">SERIALIZABLE</text>
  <text x="765" y="162" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Transactions appear</text>
  <text x="765" y="178" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">to run one after another</text>
  <text x="765" y="198" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#2E7D32" font-weight="bold">Strongest isolation</text>
  <text x="765" y="216" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">DB aborts on conflict</text>

  <!-- Anomaly table header -->
  <text x="450" y="255" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="16" fill="#1B1B1F" font-weight="bold">What Each Level Prevents</text>

  <!-- Anomaly rows -->
  <rect x="30" y="270" width="195" height="55" rx="4" fill="#FFEBEE" stroke="#1B1B1F" stroke-width="1"/>
  <text x="128" y="290" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#D32F2F" font-weight="bold">Dirty Reads</text>
  <text x="128" y="306" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#D32F2F">X prevents nothing</text>
  <text x="128" y="320" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">Sees rolled-back data</text>

  <rect x="240" y="270" width="195" height="55" rx="4" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="1"/>
  <text x="338" y="290" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#E65100" font-weight="bold">Non-repeatable Reads</text>
  <text x="338" y="308" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">Row changes between</text>
  <text x="338" y="320" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">two reads in same txn</text>

  <rect x="450" y="270" width="195" height="55" rx="4" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="1"/>
  <text x="548" y="290" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1565C0" font-weight="bold">Phantom Reads</text>
  <text x="548" y="308" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">New rows appear in</text>
  <text x="548" y="320" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">range query re-run</text>

  <rect x="660" y="270" width="210" height="55" rx="4" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="1"/>
  <text x="765" y="290" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#2E7D32" font-weight="bold">Write Skew</text>
  <text x="765" y="308" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">Two txns read same data,</text>
  <text x="765" y="320" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">write different rows</text>

  <!-- Tradeoff note -->
  <rect x="140" y="345" width="620" height="50" rx="6" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1.5"/>
  <text x="450" y="366" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#7B1FA2" font-weight="bold">Tradeoff: Higher isolation = more overhead + more aborts</text>
  <text x="450" y="386" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#7B1FA2">Use explicit FOR UPDATE locks when you know which rows need protection</text>

  <text x="878" y="412" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.22">systemdesignlaws.xyz</text>
</svg>