<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420">
<rect width="900" height="420" fill="#FFFFFF"/>

<text x="450" y="30" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="20" font-weight="bold" fill="#1B1B1F">External Events: Signals and Timers</text>
<text x="450" y="50" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F" opacity="0.6">Workflow waits for human action or webhook. No polling. No resource waste.</text>
<rect x="50" y="80" width="800" height="140" rx="10" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
<text x="450" y="103" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="15" font-weight="bold" fill="#1B1B1F">Document Signing Workflow</text>
<rect x="70" y="115" width="150" height="40" rx="6" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="1.5"/>
<text x="145" y="140" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Send Doc for Signing</text>
<line x1="220" y1="135" x2="260" y2="135" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>
<rect x="260" y="115" width="190" height="40" rx="6" fill="#F3E5F5" stroke="#1B1B1F" stroke-width="1.5"/>
<text x="355" y="132" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Wait for Signal:</text>
<text x="355" y="148" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" font-weight="bold">"document_signed"</text>
<line x1="450" y1="135" x2="490" y2="135" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>
<rect x="490" y="115" width="150" height="40" rx="6" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="1.5"/>
<text x="565" y="140" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Process Document</text>
<line x1="640" y1="135" x2="680" y2="135" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>
<rect x="680" y="115" width="150" height="40" rx="6" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="1.5"/>
<text x="755" y="140" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Continue Workflow</text>
<text x="355" y="195" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">Timeout: 30 days. If no signal: send reminder, wait 7 more days.</text>
<rect x="50" y="240" width="380" height="100" rx="10" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
<text x="240" y="265" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#1B1B1F">How Signals Work</text>
<text x="240" y="285" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">External system calls workflow engine API</text>
<text x="240" y="302" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">with workflow ID + signal name + data.</text>
<text x="240" y="322" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Workflow wakes up and processes signal.</text>
<rect x="470" y="240" width="380" height="100" rx="10" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
<text x="660" y="265" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#1B1B1F">Use Cases</text>
<text x="660" y="285" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Human tasks (sign document, approve loan)</text>
<text x="660" y="302" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Webhook callbacks (payment confirmed)</text>
<text x="660" y="322" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">External integrations (partner API response)</text>
<defs><marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#1B1B1F"/></marker></defs>
<text x="878" y="412" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.22">systemdesignlaws.xyz</text>
</svg>