<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420">
<rect width="900" height="420" fill="#FFFFFF"/>
<defs>
  <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
    <path d="M0,0.5 L9,3.5 L0,6.5" fill="#1B1B1F" stroke="#1B1B1F" stroke-width="1"/>
  </marker>
</defs>

<!-- Title -->
<text x="450" y="30" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="20" font-weight="bold" fill="#1B1B1F">Uber Ride Workflow (Temporal)</text>
<text x="450" y="50" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F" opacity="0.6">Multi-step process with human-in-the-loop, signals, and compensation</text>

<!-- Row 1: Steps -->
<rect x="30" y="70" width="120" height="50" rx="8" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
<text x="90" y="90" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#1B1B1F">1. Request</text>
<text x="90" y="108" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">Rider opens app</text>

<line x1="150" y1="95" x2="175" y2="95" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>

<rect x="180" y="70" width="120" height="50" rx="8" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
<text x="240" y="90" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#1B1B1F">2. Match</text>
<text x="240" y="108" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">Find nearby driver</text>

<line x1="300" y1="95" x2="325" y2="95" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>

<rect x="330" y="65" width="130" height="60" rx="8" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
<text x="395" y="85" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#1B1B1F">3. Wait Accept</text>
<text x="395" y="102" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">Signal: driver_accept</text>
<text x="395" y="118" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">Timeout: 15s</text>

<line x1="460" y1="95" x2="485" y2="95" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>

<rect x="490" y="65" width="120" height="60" rx="8" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
<text x="550" y="85" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#1B1B1F">4. Wait Pickup</text>
<text x="550" y="102" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">Signal: arrived</text>
<text x="550" y="118" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">GPS tracking</text>

<line x1="610" y1="95" x2="635" y2="95" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>

<rect x="640" y="65" width="120" height="60" rx="8" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
<text x="700" y="85" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#1B1B1F">5. Wait Drop</text>
<text x="700" y="102" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">Signal: completed</text>
<text x="700" y="118" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">Track route</text>

<line x1="760" y1="95" x2="785" y2="95" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>

<rect x="790" y="70" width="80" height="50" rx="8" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
<text x="830" y="90" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#1B1B1F">6. Pay</text>
<text x="830" y="108" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">Charge rider</text>

<!-- Temporal engine bar -->
<rect x="30" y="155" width="840" height="40" rx="6" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
<text x="450" y="180" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#1B1B1F">Temporal Workflow Engine: durable state, automatic retries, signal-based waits</text>

<!-- Failure paths -->
<text x="450" y="220" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#1B1B1F">Failure and Compensation Paths</text>

<rect x="30" y="240" width="250" height="55" rx="8" fill="#FFEBEE" stroke="#1B1B1F" stroke-width="2"/>
<text x="155" y="260" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#1B1B1F">Driver Timeout (15s)</text>
<text x="155" y="280" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Retry: match next available driver</text>

<rect x="310" y="240" width="260" height="55" rx="8" fill="#FFEBEE" stroke="#1B1B1F" stroke-width="2"/>
<text x="440" y="260" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#1B1B1F">Rider Cancel Mid-Ride</text>
<text x="440" y="280" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Compensate: partial charge, notify driver</text>

<rect x="600" y="240" width="270" height="55" rx="8" fill="#FFEBEE" stroke="#1B1B1F" stroke-width="2"/>
<text x="735" y="260" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#1B1B1F">Payment Failure</text>
<text x="735" y="280" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Retry with backoff, flag account</text>

<!-- Key insight -->
<rect x="100" y="320" width="700" height="65" rx="8" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
<text x="450" y="342" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#1B1B1F">Why Temporal for Uber?</text>
<text x="450" y="362" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">3 human-in-the-loop waits. Each can timeout. Multiple compensation paths.</text>
<text x="450" y="378" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Without a workflow engine, this becomes unmaintainable state machine code.</text>

<!-- Watermark -->
<text x="878" y="412" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.22">systemdesignlaws.xyz</text>
</svg>