<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420">
<rect width="900" height="420" fill="#FFFFFF"/>
<defs>
  <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
    <path d="M0,0.5 L9,3.5 L0,6.5" fill="#1B1B1F" stroke="#1B1B1F" stroke-width="1"/>
  </marker>
</defs>

<!-- Title -->
<text x="450" y="32" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="20" font-weight="bold" fill="#1B1B1F">Managing Long-Running Tasks: Summary</text>

<!-- Core architecture -->
<rect x="40" y="55" width="820" height="50" rx="8" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
<text x="450" y="77" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#1B1B1F">Core Architecture: Queue + Workers + Status Store</text>
<text x="450" y="97" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Accept immediately (return job_id), process asynchronously, notify on completion.</text>

<!-- Key patterns -->
<text x="450" y="130" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#1B1B1F">Key Patterns to Remember</text>

<rect x="40" y="145" width="200" height="65" rx="8" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
<text x="140" y="167" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#1B1B1F">Submit and Poll</text>
<text x="140" y="185" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Return job_id, poll status</text>
<text x="140" y="200" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Client-facing default</text>

<rect x="260" y="145" width="200" height="65" rx="8" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
<text x="360" y="167" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#1B1B1F">Retry + Backoff</text>
<text x="360" y="185" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Exponential backoff + jitter</text>
<text x="360" y="200" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Max retries, then DLQ</text>

<rect x="480" y="145" width="200" height="65" rx="8" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
<text x="580" y="167" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#1B1B1F">Idempotency</text>
<text x="580" y="185" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Same input = same result</text>
<text x="580" y="200" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Safe to retry any job</text>

<rect x="700" y="145" width="160" height="65" rx="8" fill="#FFEBEE" stroke="#1B1B1F" stroke-width="2"/>
<text x="780" y="167" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#1B1B1F">Dead Letter Queue</text>
<text x="780" y="185" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Poison messages</text>
<text x="780" y="200" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Inspect and fix</text>

<!-- Scaling patterns -->
<text x="450" y="240" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#1B1B1F">Scaling and Reliability</text>

<rect x="40" y="255" width="200" height="55" rx="8" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
<text x="140" y="277" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#1B1B1F">Backpressure</text>
<text x="140" y="298" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Queue absorbs burst load</text>

<rect x="260" y="255" width="200" height="55" rx="8" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
<text x="360" y="277" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#1B1B1F">Priority Queues</text>
<text x="360" y="298" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Paid users first</text>

<rect x="480" y="255" width="200" height="55" rx="8" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
<text x="580" y="277" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#1B1B1F">Auto-Scaling</text>
<text x="580" y="298" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Workers scale on queue depth</text>

<rect x="700" y="255" width="160" height="55" rx="8" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
<text x="780" y="277" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#1B1B1F">Rate Limiting</text>
<text x="780" y="298" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Protect downstream</text>

<!-- Implementation -->
<rect x="40" y="330" width="820" height="55" rx="8" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
<text x="450" y="352" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#1B1B1F">Implementation Choices</text>
<text x="60" y="375" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Redis + Bull: simple, fast</text>
<text x="270" y="375" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">RabbitMQ: robust, routing</text>
<text x="480" y="375" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">SQS + Lambda: serverless</text>
<text x="690" y="375" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Kafka: high throughput</text>

<!-- Bottom -->
<rect x="150" y="395" width="600" height="20" rx="4" fill="#FAFAFA" stroke="#DDD" stroke-width="1"/>
<text x="450" y="409" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" font-weight="bold" fill="#1B1B1F">Default: SQS + Lambda for serverless. Redis + Bull for self-managed.</text>

<!-- Watermark -->
<text x="878" y="412" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.22">systemdesignlaws.xyz</text>
</svg>