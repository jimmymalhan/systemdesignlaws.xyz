<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" width="900" height="420">
  <rect x="0" y="0" width="900" height="420" fill="#FFFFFF"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1B1B1F"/>
    </marker>
  </defs>
  <text x="450" y="35" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="22" fill="#1B1B1F" font-weight="bold">Submit and Poll Pattern</text>
  <!-- Client column -->
  <rect x="50" y="60" width="120" height="35" rx="6" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
  <text x="110" y="83" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F">Client</text>
  <line x1="110" y1="95" x2="110" y2="395" stroke="#1B1B1F" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- API column -->
  <rect x="310" y="60" width="120" height="35" rx="6" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
  <text x="370" y="83" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F">API Server</text>
  <line x1="370" y1="95" x2="370" y2="395" stroke="#1B1B1F" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- Worker column -->
  <rect x="590" y="60" width="120" height="35" rx="6" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
  <text x="650" y="83" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F">Worker</text>
  <line x1="650" y1="95" x2="650" y2="395" stroke="#1B1B1F" stroke-width="1" stroke-dasharray="4,4"/>
  <!-- Step 1: Submit -->
  <line x1="110" y1="120" x2="368" y2="120" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="240" y="115" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">POST /tasks</text>
  <!-- Step 2: Return job_id -->
  <line x1="370" y1="145" x2="112" y2="145" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="240" y="140" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">202 {job_id: "abc"}</text>
  <!-- Step 3: Enqueue -->
  <line x1="370" y1="155" x2="648" y2="155" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="6,3"/>
  <text x="510" y="150" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">enqueue task</text>
  <!-- Step 4: Poll (pending) -->
  <line x1="110" y1="200" x2="368" y2="200" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="240" y="195" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">GET /tasks/abc</text>
  <line x1="370" y1="215" x2="112" y2="215" stroke="#FFF3E0" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="170" y="218" width="140" height="22" rx="4" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="1"/>
  <text x="240" y="234" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">status: "processing"</text>
  <!-- Step 5: Poll again (pending) -->
  <line x1="110" y1="265" x2="368" y2="265" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="240" y="260" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">GET /tasks/abc</text>
  <line x1="370" y1="280" x2="112" y2="280" stroke="#FFF3E0" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="170" y="283" width="140" height="22" rx="4" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="1"/>
  <text x="240" y="299" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">status: "processing"</text>
  <!-- Worker completes -->
  <line x1="650" y1="310" x2="372" y2="310" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arrow)" stroke-dasharray="6,3"/>
  <text x="510" y="305" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">update: complete</text>
  <!-- Step 6: Poll (complete) -->
  <line x1="110" y1="340" x2="368" y2="340" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="240" y="335" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">GET /tasks/abc</text>
  <line x1="370" y1="355" x2="112" y2="355" stroke="#E8F5E9" stroke-width="2" marker-end="url(#arrow)"/>
  <rect x="150" y="358" width="180" height="22" rx="4" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="1"/>
  <text x="240" y="374" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">status: "complete", result: URL</text>
  <text x="878" y="412" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.22">systemdesignlaws.xyz</text>
</svg>