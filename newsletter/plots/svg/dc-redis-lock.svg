<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" style="background:#FFFFFF">
  <defs>
    <marker id="arr-rl" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0.5 L9,3.5 L0,6.5" fill="#1B1B1F" stroke="#1B1B1F" stroke-width="1"/>
    </marker>
  </defs>
  <text x="450" y="32" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="22" fill="#1B1B1F" font-weight="bold">Redis Distributed Lock: SET NX EX</text>

  <!-- Redis server -->
  <rect x="340" y="55" width="220" height="50" rx="6" fill="#FFEBEE" stroke="#D32F2F" stroke-width="2"/>
  <text x="450" y="78" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="15" fill="#D32F2F" font-weight="bold">Redis</text>
  <text x="450" y="96" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">In-memory, single-threaded</text>

  <!-- Acquire -->
  <rect x="30" y="125" width="840" height="80" rx="6" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5" opacity="0.3"/>
  <text x="450" y="142" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#2E7D32" font-weight="bold">Acquire Lock</text>

  <text x="50" y="168" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F" font-weight="bold">SET lock:seat:42 owner_id NX EX 30</text>
  <text x="50" y="190" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">NX = only if Not eXists (atomic check)</text>
  <text x="450" y="190" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">EX 30 = expires in 30 seconds (TTL)</text>

  <!-- Release -->
  <rect x="30" y="215" width="840" height="65" rx="6" fill="#E8F4FD" stroke="#1565C0" stroke-width="1.5" opacity="0.3"/>
  <text x="450" y="232" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1565C0" font-weight="bold">Release Lock (Lua script for safety)</text>

  <text x="50" y="258" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">if redis.call("get", key) == owner_id then redis.call("del", key) end</text>
  <text x="50" y="275" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1565C0">Only delete if you still own it (prevent deleting someone else's lock)</text>

  <!-- Failure modes -->
  <text x="450" y="310" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="15" fill="#1B1B1F" font-weight="bold">Failure Modes</text>

  <rect x="30" y="325" width="270" height="80" rx="6" fill="#FFEBEE" stroke="#D32F2F" stroke-width="1.5"/>
  <text x="165" y="347" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#D32F2F" font-weight="bold">TTL expires early</text>
  <text x="165" y="365" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">GC pause, slow network</text>
  <text x="165" y="381" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Two holders at once!</text>
  <text x="165" y="397" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#2E7D32">Fix: fencing tokens</text>

  <rect x="315" y="325" width="270" height="80" rx="6" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/>
  <text x="450" y="347" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#E65100" font-weight="bold">Redis crashes</text>
  <text x="450" y="365" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Lock state lost (in-memory)</text>
  <text x="450" y="381" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">All locks gone on restart</text>
  <text x="450" y="397" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#2E7D32">Fix: Redlock (multi-node)</text>

  <rect x="600" y="325" width="270" height="80" rx="6" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1.5"/>
  <text x="735" y="347" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#7B1FA2" font-weight="bold">Clock skew</text>
  <text x="735" y="365" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">TTL based on wall clock</text>
  <text x="735" y="381" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Jumps can extend/shorten locks</text>
  <text x="735" y="397" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#2E7D32">Fix: monotonic clocks</text>

  <text x="878" y="412" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.22">systemdesignlaws.xyz</text>
</svg>