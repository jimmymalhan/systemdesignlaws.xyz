<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420">
<rect width="900" height="420" fill="#FFFFFF"/>
<defs>
  <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
    <path d="M0,0.5 L9,3.5 L0,6.5" fill="#1B1B1F" stroke="#1B1B1F" stroke-width="1"/>
  </marker>
</defs>

<!-- Title -->
<text x="450" y="32" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="20" font-weight="bold" fill="#1B1B1F">Human-in-the-Loop Workflow</text>
<text x="450" y="52" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F" opacity="0.6">Workflow pauses, waits for human action, resumes without resource consumption</text>

<!-- Step 1: Initiate -->
<rect x="40" y="80" width="150" height="50" rx="8" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
<text x="115" y="100" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#1B1B1F">1. Start Workflow</text>
<text x="115" y="118" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">e.g., Order placed</text>

<!-- Arrow -->
<line x1="190" y1="105" x2="235" y2="105" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>

<!-- Step 2: Auto steps -->
<rect x="240" y="80" width="160" height="50" rx="8" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
<text x="320" y="100" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#1B1B1F">2. Automated Steps</text>
<text x="320" y="118" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Payment, Inventory</text>

<!-- Arrow -->
<line x1="400" y1="105" x2="445" y2="105" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>

<!-- Step 3: Wait for human -->
<rect x="450" y="72" width="190" height="66" rx="8" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
<text x="545" y="95" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#1B1B1F">3. Wait for Human</text>
<text x="545" y="112" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Signal: "driver_accepted"</text>
<text x="545" y="128" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Timeout: 30s</text>

<!-- Arrow -->
<line x1="640" y1="105" x2="685" y2="105" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>

<!-- Step 4: Resume -->
<rect x="690" y="80" width="170" height="50" rx="8" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
<text x="775" y="100" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#1B1B1F">4. Continue Flow</text>
<text x="775" y="118" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Dispatch, Notify</text>

<!-- Workflow engine box -->
<rect x="100" y="170" width="700" height="65" rx="8" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
<text x="450" y="195" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#1B1B1F">Workflow Engine (Temporal)</text>
<text x="450" y="215" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Workflow suspends at step 3. No threads, no polling. Zero resource consumption while waiting.</text>

<!-- Human actor -->
<rect x="350" y="270" width="200" height="55" rx="8" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
<text x="450" y="292" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#1B1B1F">Human Actor</text>
<text x="450" y="312" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Driver, Approver, Customer</text>

<!-- Arrow from human to engine -->
<line x1="450" y1="270" x2="450" y2="235" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>
<text x="510" y="258" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Signal via API</text>

<!-- Timeout path -->
<rect x="100" y="345" width="340" height="50" rx="8" fill="#FFEBEE" stroke="#1B1B1F" stroke-width="2"/>
<text x="270" y="366" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#1B1B1F">Timeout Path</text>
<text x="270" y="384" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">No response in 30s: retry, reassign, or cancel</text>

<!-- Success path -->
<rect x="480" y="345" width="340" height="50" rx="8" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
<text x="650" y="366" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#1B1B1F">Success Path</text>
<text x="650" y="384" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Signal received: workflow resumes from checkpoint</text>

<!-- Watermark -->
<text x="878" y="412" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.22">systemdesignlaws.xyz</text>
</svg>