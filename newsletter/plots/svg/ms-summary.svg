<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420">
<rect width="900" height="420" fill="#FFFFFF"/>
<defs>
  <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
    <path d="M0,0.5 L9,3.5 L0,6.5" fill="#1B1B1F" stroke="#1B1B1F" stroke-width="1"/>
  </marker>
</defs>

<!-- Title -->
<text x="450" y="32" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="20" font-weight="bold" fill="#1B1B1F">Multi-step Processes: Summary</text>

<!-- Escalation ladder -->
<rect x="40" y="55" width="170" height="70" rx="8" fill="#FFEBEE" stroke="#1B1B1F" stroke-width="2"/>
<text x="125" y="78" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#1B1B1F">Single Server</text>
<text x="125" y="95" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">No durability</text>
<text x="125" y="112" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Simple, fragile</text>

<line x1="210" y1="90" x2="240" y2="90" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>

<rect x="245" y="55" width="170" height="70" rx="8" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
<text x="330" y="78" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#1B1B1F">State Persistence</text>
<text x="330" y="95" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">DB checkpoints</text>
<text x="330" y="112" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Complex, manual</text>

<line x1="415" y1="90" x2="445" y2="90" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>

<rect x="450" y="55" width="170" height="70" rx="8" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
<text x="535" y="78" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#1B1B1F">Event Sourcing</text>
<text x="535" y="95" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Kafka log, workers</text>
<text x="535" y="112" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Scalable, auditable</text>

<line x1="620" y1="90" x2="650" y2="90" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>

<rect x="655" y="55" width="200" height="70" rx="8" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
<text x="755" y="78" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#1B1B1F">Workflow Engine</text>
<text x="755" y="95" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Temporal / Step Functions</text>
<text x="755" y="112" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Durable, automatic</text>

<!-- Key concepts row -->
<text x="450" y="155" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#1B1B1F">Key Concepts to Remember</text>

<rect x="40" y="170" width="200" height="65" rx="8" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
<text x="140" y="192" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#1B1B1F">Idempotency</text>
<text x="140" y="210" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Same input = same result</text>
<text x="140" y="226" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Safe to retry any step</text>

<rect x="260" y="170" width="200" height="65" rx="8" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
<text x="360" y="192" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#1B1B1F">Compensation</text>
<text x="360" y="210" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Undo completed steps</text>
<text x="360" y="226" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Sagas, rollback logic</text>

<rect x="480" y="170" width="200" height="65" rx="8" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
<text x="580" y="192" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#1B1B1F">Signals / Waits</text>
<text x="580" y="210" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Pause for humans/events</text>
<text x="580" y="226" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">No resource consumption</text>

<rect x="700" y="170" width="160" height="65" rx="8" fill="#FFEBEE" stroke="#1B1B1F" stroke-width="2"/>
<text x="780" y="192" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#1B1B1F">Versioning</text>
<text x="780" y="210" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Patch running flows</text>
<text x="780" y="226" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Deploy new versions</text>

<!-- Implementation comparison -->
<text x="450" y="265" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#1B1B1F">Implementation Comparison</text>

<rect x="40" y="280" width="260" height="80" rx="8" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
<text x="170" y="302" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#1B1B1F">Temporal</text>
<text x="60" y="320" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Code-first, max flexibility</text>
<text x="60" y="338" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Operational overhead</text>
<text x="60" y="354" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Default interview choice</text>

<rect x="320" y="280" width="260" height="80" rx="8" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
<text x="450" y="302" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#1B1B1F">Step Functions</text>
<text x="340" y="320" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Declarative JSON state machine</text>
<text x="340" y="338" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Serverless, no ops</text>
<text x="340" y="354" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Less expressive, AWS-only</text>

<rect x="600" y="280" width="260" height="80" rx="8" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
<text x="730" y="302" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#1B1B1F">Event Sourcing</text>
<text x="620" y="320" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Kafka log, worker consumers</text>
<text x="620" y="338" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Build-your-own infrastructure</text>
<text x="620" y="354" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Most scalable, most complex</text>

<!-- Bottom insight -->
<rect x="150" y="375" width="600" height="28" rx="6" fill="#FAFAFA" stroke="#DDD" stroke-width="1"/>
<text x="450" y="394" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#1B1B1F">Default to Temporal. Mention Step Functions for AWS shops. Start simple, escalate when needed.</text>

<!-- Watermark -->
<text x="878" y="412" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.22">systemdesignlaws.xyz</text>
</svg>