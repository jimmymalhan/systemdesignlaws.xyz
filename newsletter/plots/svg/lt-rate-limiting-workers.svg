<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420">
<rect width="900" height="420" fill="#FFFFFF"/>
<defs>
  <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
    <path d="M0,0.5 L9,3.5 L0,6.5" fill="#1B1B1F" stroke="#1B1B1F" stroke-width="1"/>
  </marker>
</defs>

<!-- Title -->
<text x="450" y="32" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="20" font-weight="bold" fill="#1B1B1F">Rate-Limiting Workers</text>
<text x="450" y="52" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F" opacity="0.6">Control worker throughput to protect downstream services</text>

<!-- Queue -->
<rect x="40" y="90" width="150" height="60" rx="8" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
<text x="115" y="115" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#1B1B1F">Job Queue</text>
<text x="115" y="135" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">10,000 pending</text>

<!-- Worker pool -->
<line x1="190" y1="110" x2="240" y2="95" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>
<line x1="190" y1="120" x2="240" y2="120" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>
<line x1="190" y1="130" x2="240" y2="145" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>

<rect x="245" y="75" width="120" height="35" rx="6" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
<text x="305" y="97" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Worker 1</text>

<rect x="245" y="115" width="120" height="35" rx="6" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
<text x="305" y="137" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Worker 2</text>

<rect x="245" y="155" width="120" height="35" rx="6" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
<text x="305" y="177" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Worker N</text>

<!-- Rate limiter -->
<line x1="365" y1="92" x2="430" y2="120" stroke="#1B1B1F" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="365" y1="132" x2="430" y2="120" stroke="#1B1B1F" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="365" y1="172" x2="430" y2="120" stroke="#1B1B1F" stroke-width="1.5" marker-end="url(#arr)"/>

<rect x="435" y="85" width="160" height="70" rx="8" fill="#FFEBEE" stroke="#1B1B1F" stroke-width="2"/>
<text x="515" y="110" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#1B1B1F">Rate Limiter</text>
<text x="515" y="130" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">100 req/s max</text>
<text x="515" y="147" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">Token bucket / leaky bucket</text>

<line x1="595" y1="120" x2="645" y2="120" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>

<!-- Downstream -->
<rect x="650" y="90" width="200" height="60" rx="8" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
<text x="750" y="115" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#1B1B1F">Downstream Service</text>
<text x="750" y="135" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Payment API, Email, etc.</text>

<!-- Strategies -->
<text x="450" y="215" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" font-weight="bold" fill="#1B1B1F">Rate-Limiting Strategies for Workers</text>

<rect x="40" y="235" width="260" height="80" rx="8" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
<text x="170" y="257" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#1B1B1F">Concurrency Limit</text>
<text x="60" y="277" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Max N workers processing at once</text>
<text x="60" y="295" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Simple: set worker pool size</text>
<text x="60" y="308" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.6">Coarse control</text>

<rect x="320" y="235" width="260" height="80" rx="8" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
<text x="450" y="257" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#1B1B1F">Token Bucket</text>
<text x="340" y="277" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Workers acquire token before calling</text>
<text x="340" y="295" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Tokens replenish at fixed rate</text>
<text x="340" y="308" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.6">Precise rate control</text>

<rect x="600" y="235" width="260" height="80" rx="8" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
<text x="730" y="257" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#1B1B1F">Adaptive Rate</text>
<text x="620" y="277" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Monitor downstream latency</text>
<text x="620" y="295" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Reduce rate on high latency/errors</text>
<text x="620" y="308" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.6">Self-adjusting, complex</text>

<!-- Bottom tip -->
<rect x="100" y="340" width="700" height="55" rx="8" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
<text x="450" y="362" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#1B1B1F">Why Rate-Limit Workers?</text>
<text x="450" y="382" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Without limits, a burst of 10,000 jobs = 10,000 concurrent calls to payment API = cascading failure.</text>

<!-- Watermark -->
<text x="878" y="412" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.22">systemdesignlaws.xyz</text>
</svg>