<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333333"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2980b9"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#27ae60"/>
    </marker>
  </defs>
  <rect width="800" height="500" fill="#ffffff"/>

  <!-- Title -->
  <text x="400" y="36" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Long Polling</text>
  <text x="400" y="56" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#555555" text-anchor="middle">Server holds connection open until event occurs — near real-time, no wasted polls</text>

  <!-- Client column -->
  <rect x="50" y="75" width="120" height="44" rx="8" fill="#e8f4fd" stroke="#4a90d9" stroke-width="2"/>
  <text x="110" y="102" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Client</text>
  <line x1="110" y1="119" x2="110" y2="455" stroke="#4a90d9" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- Server column -->
  <rect x="350" y="75" width="120" height="44" rx="8" fill="#e8fde8" stroke="#4ab54a" stroke-width="2"/>
  <text x="410" y="102" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Server</text>
  <line x1="410" y1="119" x2="410" y2="455" stroke="#4ab54a" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- Request 1 -->
  <text x="28" y="140" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#888888">t=0ms</text>
  <line x1="120" y1="140" x2="395" y2="147" stroke="#2980b9" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="265" y="135" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#2980b9" text-anchor="middle" font-weight="bold">GET /updates?timeout=30s</text>

  <!-- Server waiting block -->
  <rect x="395" y="155" width="55" height="110" rx="4" fill="#fff8e8" stroke="#d4a017" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="422" y="178" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#d4a017" text-anchor="middle">wait-</text>
  <text x="422" y="192" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#d4a017" text-anchor="middle">ing</text>
  <text x="422" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#d4a017" text-anchor="middle">for</text>
  <text x="422" y="224" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#d4a017" text-anchor="middle">event</text>
  <text x="422" y="242" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#d4a017" text-anchor="middle">...</text>

  <!-- Event arrives annotation -->
  <text x="28" y="273" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#888888">t=800ms</text>
  <text x="480" y="268" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#8e44ad" font-weight="bold">Event arrives!</text>

  <!-- Response 1 -->
  <line x1="395" y1="275" x2="120" y2="285" stroke="#27ae60" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="265" y="270" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#27ae60" text-anchor="middle" font-weight="bold">200 OK {data: [event]}</text>

  <!-- Immediate re-request -->
  <text x="28" y="305" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#888888">t=900ms</text>
  <line x1="120" y1="305" x2="395" y2="312" stroke="#2980b9" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="265" y="300" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#2980b9" text-anchor="middle" font-weight="bold">GET /updates?timeout=30s</text>
  <text x="265" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#8e44ad" text-anchor="middle">(immediately re-requests)</text>

  <!-- Server waiting again -->
  <rect x="395" y="320" width="55" height="80" rx="4" fill="#fff8e8" stroke="#d4a017" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="422" y="345" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#d4a017" text-anchor="middle">wait-</text>
  <text x="422" y="360" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#d4a017" text-anchor="middle">ing</text>
  <text x="422" y="378" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#d4a017" text-anchor="middle">...</text>

  <!-- vs Simple polling comparison -->
  <line x1="550" y1="80" x2="550" y2="455" stroke="#eeeeee" stroke-width="1"/>
  <rect x="560" y="80" width="220" height="180" rx="8" fill="#f0f8ff" stroke="#4a90d9" stroke-width="1"/>
  <text x="670" y="102" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#1a1a1a" text-anchor="middle">vs Simple Polling</text>
  <text x="575" y="124" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#27ae60">+ Near real-time response</text>
  <text x="575" y="143" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#27ae60">+ No wasted empty responses</text>
  <text x="575" y="162" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#27ae60">+ Works through firewalls/proxies</text>
  <text x="575" y="188" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#c0392b">- Server holds open connections</text>
  <text x="575" y="207" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#c0392b">- 1 request per event (overhead)</text>
  <text x="575" y="226" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#c0392b">- Latency spikes with bursts</text>

  <!-- Tradeoffs -->
  <rect x="50" y="420" width="480" height="55" rx="8" fill="#f0fff0" stroke="#4ab54a" stroke-width="1.5"/>
  <text x="70" y="441" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#1a1a1a">Use when:</text>
  <text x="70" y="458" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#555555">Near-real-time needed, WebSocket not feasible (firewalls, older browsers).</text>
  <text x="70" y="473" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#555555">Example: GitHub Gist live updates, older chat systems.</text>
</svg>
