<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333333"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2980b9"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#27ae60"/>
    </marker>
  </defs>
  <rect width="800" height="480" fill="#ffffff"/>

  <!-- Title -->
  <text x="400" y="36" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Simple Polling</text>
  <text x="400" y="56" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#555555" text-anchor="middle">Client repeatedly requests updates on a fixed interval</text>

  <!-- Client column -->
  <rect x="40" y="75" width="130" height="44" rx="8" fill="#e8f4fd" stroke="#4a90d9" stroke-width="2"/>
  <text x="105" y="102" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Client</text>
  <line x1="105" y1="119" x2="105" y2="445" stroke="#4a90d9" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- Server column -->
  <rect x="340" y="75" width="130" height="44" rx="8" fill="#e8fde8" stroke="#4ab54a" stroke-width="2"/>
  <text x="405" y="102" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Server</text>
  <line x1="405" y1="119" x2="405" y2="445" stroke="#4ab54a" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- DB column -->
  <rect x="600" y="75" width="130" height="44" rx="8" fill="#fdf8e8" stroke="#d4a017" stroke-width="2"/>
  <text x="665" y="102" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Database</text>
  <line x1="665" y1="119" x2="665" y2="445" stroke="#d4a017" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- Round 1 t=0s -->
  <text x="20" y="148" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#888888">t=0s</text>
  <line x1="115" y1="148" x2="390" y2="155" stroke="#2980b9" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="250" y="143" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#2980b9" text-anchor="middle">GET /updates?since=0</text>

  <line x1="415" y1="160" x2="650" y2="165" stroke="#333333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="535" y="156" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#555555" text-anchor="middle">SELECT WHERE ts > 0</text>

  <line x1="650" y1="182" x2="415" y2="188" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="535" y="178" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#27ae60" text-anchor="middle">[] empty</text>

  <line x1="390" y1="195" x2="115" y2="202" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="250" y="190" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#27ae60" text-anchor="middle">200 OK {data: []}</text>

  <!-- Round 2 t=2s -->
  <text x="20" y="238" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#888888">t=2s</text>
  <line x1="115" y1="238" x2="390" y2="245" stroke="#2980b9" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="250" y="233" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#2980b9" text-anchor="middle">GET /updates?since=0</text>

  <line x1="415" y1="250" x2="650" y2="255" stroke="#333333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="535" y="246" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#555555" text-anchor="middle">SELECT WHERE ts > 0</text>

  <line x1="650" y1="270" x2="415" y2="276" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="535" y="266" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#27ae60" text-anchor="middle">[event1]</text>

  <line x1="390" y1="283" x2="115" y2="290" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="250" y="278" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#27ae60" text-anchor="middle">200 OK {data: [event1]}</text>

  <!-- Round 3 t=4s -->
  <text x="20" y="325" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#888888">t=4s</text>
  <line x1="115" y1="325" x2="390" y2="332" stroke="#2980b9" stroke-width="1.5" marker-end="url(#arrow-blue)"/>
  <text x="250" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#2980b9" text-anchor="middle">GET /updates?since=t2</text>

  <line x1="415" y1="337" x2="650" y2="342" stroke="#333333" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="650" y1="358" x2="415" y2="363" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="535" y="354" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#27ae60" text-anchor="middle">[] empty</text>
  <line x1="390" y1="370" x2="115" y2="377" stroke="#27ae60" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="250" y="365" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#27ae60" text-anchor="middle">200 OK {data: []}</text>

  <!-- Tradeoffs box -->
  <rect x="40" y="400" width="720" height="65" rx="8" fill="#fff8e8" stroke="#d4a017" stroke-width="1.5"/>
  <text x="60" y="422" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#1a1a1a">Tradeoffs:</text>
  <text x="60" y="440" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#555555">+ Simple. Works everywhere. No persistent connections.   - Latency = poll interval (2s lag worst case).   - Wastes resources on empty responses.</text>
  <text x="60" y="456" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#555555">Use when: update freshness of 1-30s is acceptable (dashboards, activity feeds).</text>
</svg>
