<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" style="background:#FFFFFF">
  <defs>
    <marker id="arr-cis" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0.5 L9,3.5 L0,6.5" fill="#1B1B1F" stroke="#1B1B1F" stroke-width="1"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#1a1a1a" font-weight="bold">Caching Interview Scenarios</text>
  <text x="400" y="52" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#888">Match the scenario to the right caching strategy</text>

  <!-- Scenario 1: High Read Traffic -->
  <rect x="30" y="70" width="360" height="90" rx="8" fill="#E8F4FD" stroke="#2980b9" stroke-width="2"/>
  <text x="210" y="95" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#2980b9" font-weight="bold">High Read Traffic</text>
  <text x="50" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#333333">URL shortener, user profiles, product pages</text>
  <text x="50" y="135" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#333333">Read/write ratio 100:1+</text>

  <!-- Arrow to solution -->
  <path d="M390,115 L425,115" stroke="#1a1a1a" stroke-width="1.5" fill="none" marker-end="url(#arr-cis)"/>

  <rect x="430" y="70" width="340" height="90" rx="8" fill="#E8F5E9" stroke="#27ae60" stroke-width="2"/>
  <text x="600" y="95" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#27ae60" font-weight="bold">Cache-Aside + Redis</text>
  <text x="450" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#333333">Default answer. Long TTL for stable data.</text>
  <text x="450" y="135" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#333333">Add CDN for global reach. LRU eviction.</text>
  <text x="450" y="152" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#888">Bit.ly, Instagram, YouTube metadata</text>

  <!-- Scenario 2: Global Static Assets -->
  <rect x="30" y="175" width="360" height="90" rx="8" fill="#FFF3E0" stroke="#d4a017" stroke-width="2"/>
  <text x="210" y="200" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#d4a017" font-weight="bold">Global Static Assets</text>
  <text x="50" y="220" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#333333">Images, CSS, JS, video thumbnails</text>
  <text x="50" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#333333">Users across multiple continents</text>

  <path d="M390,220 L425,220" stroke="#1a1a1a" stroke-width="1.5" fill="none" marker-end="url(#arr-cis)"/>

  <rect x="430" y="175" width="340" height="90" rx="8" fill="#E8F5E9" stroke="#27ae60" stroke-width="2"/>
  <text x="600" y="200" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#27ae60" font-weight="bold">CDN Edge Caching</text>
  <text x="450" y="220" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#333333">CloudFront/Akamai. Edge servers worldwide.</text>
  <text x="450" y="240" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#333333">90%+ reduction in origin load.</text>
  <text x="450" y="257" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#888">Netflix thumbnails, YouTube static</text>

  <!-- Scenario 3: Write-Heavy -->
  <rect x="30" y="280" width="360" height="90" rx="8" fill="#FFEBEE" stroke="#c0392b" stroke-width="2"/>
  <text x="210" y="305" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#c0392b" font-weight="bold">Write-Heavy Workloads</text>
  <text x="50" y="325" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#333333">Analytics ingestion, logging, IoT sensors</text>
  <text x="50" y="345" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#333333">Write throughput matters most</text>

  <path d="M390,325 L425,325" stroke="#1a1a1a" stroke-width="1.5" fill="none" marker-end="url(#arr-cis)"/>

  <rect x="430" y="280" width="340" height="90" rx="8" fill="#E8F5E9" stroke="#27ae60" stroke-width="2"/>
  <text x="600" y="305" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#27ae60" font-weight="bold">Write-Behind Cache</text>
  <text x="450" y="325" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#333333">Buffer writes in cache, batch to DB.</text>
  <text x="450" y="345" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#333333">Accept eventual consistency + data loss risk.</text>
  <text x="450" y="362" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#888">Metrics collection, view counts</text>

  <!-- Scenario 4: Real-time Fresh -->
  <rect x="30" y="385" width="360" height="75" rx="8" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="2"/>
  <text x="210" y="410" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#7B1FA2" font-weight="bold">Must-Be-Fresh Reads</text>
  <text x="50" y="430" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#333333">Inventory counts, financial balances</text>
  <text x="50" y="448" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#333333">Stale data causes real problems</text>

  <path d="M390,422 L425,422" stroke="#1a1a1a" stroke-width="1.5" fill="none" marker-end="url(#arr-cis)"/>

  <rect x="430" y="385" width="340" height="75" rx="8" fill="#E8F5E9" stroke="#27ae60" stroke-width="2"/>
  <text x="600" y="410" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#27ae60" font-weight="bold">Write-Through + Short TTL</text>
  <text x="450" y="430" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#333333">Sync writes to cache + DB. Or skip cache.</text>
  <text x="450" y="448" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#333333">Versioned keys for race-free invalidation.</text>

  <!-- Watermark -->
  <text x="778" y="472" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#1a1a1a" opacity="0.22">systemdesignlaws.xyz</text>
</svg>