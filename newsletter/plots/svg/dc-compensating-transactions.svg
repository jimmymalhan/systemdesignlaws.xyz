<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" style="background:#FFFFFF">
  <defs>
    <marker id="arr-ct" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0.5 L9,3.5 L0,6.5" fill="#1B1B1F" stroke="#1B1B1F" stroke-width="1"/>
    </marker>
    <marker id="arr-ct-r" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0.5 L9,3.5 L0,6.5" fill="#D32F2F" stroke="#D32F2F" stroke-width="1"/>
    </marker>
  </defs>
  <text x="450" y="30" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="22" fill="#1B1B1F" font-weight="bold">Compensating Transactions in Practice</text>

  <!-- Forward actions -->
  <text x="450" y="60" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#2E7D32" font-weight="bold">Forward Actions (each commits independently)</text>

  <rect x="30" y="75" width="195" height="65" rx="6" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
  <text x="128" y="95" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F" font-weight="bold">1. Reserve Flight</text>
  <text x="128" y="115" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#2E7D32">Status: RESERVED</text>
  <text x="128" y="130" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Airline DB</text>

  <line x1="225" y1="107" x2="258" y2="107" stroke="#2E7D32" stroke-width="2" marker-end="url(#arr-ct)"/>

  <rect x="260" y="75" width="195" height="65" rx="6" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
  <text x="358" y="95" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F" font-weight="bold">2. Reserve Hotel</text>
  <text x="358" y="115" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#2E7D32">Status: RESERVED</text>
  <text x="358" y="130" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Hotel DB</text>

  <line x1="455" y1="107" x2="488" y2="107" stroke="#2E7D32" stroke-width="2" marker-end="url(#arr-ct)"/>

  <rect x="490" y="75" width="195" height="65" rx="6" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
  <text x="588" y="95" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F" font-weight="bold">3. Charge Card</text>
  <text x="588" y="115" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#D32F2F" font-weight="bold">FAILED! Declined.</text>
  <text x="588" y="130" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Payment Service</text>

  <!-- Failure X -->
  <rect x="720" y="82" width="50" height="50" rx="25" fill="#FFEBEE" stroke="#D32F2F" stroke-width="2"/>
  <text x="745" y="114" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="22" fill="#D32F2F" font-weight="bold">X</text>

  <!-- Compensations -->
  <text x="450" y="175" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#D32F2F" font-weight="bold">Compensating Transactions (undo in reverse order)</text>

  <line x1="490" y1="200" x2="458" y2="200" stroke="#D32F2F" stroke-width="2" marker-end="url(#arr-ct-r)"/>

  <rect x="260" y="190" width="195" height="50" rx="6" fill="#FFEBEE" stroke="#D32F2F" stroke-width="2"/>
  <text x="358" y="210" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#D32F2F" font-weight="bold">Cancel Hotel</text>
  <text x="358" y="228" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#D32F2F">Status: CANCELLED</text>

  <line x1="260" y1="215" x2="228" y2="215" stroke="#D32F2F" stroke-width="2" marker-end="url(#arr-ct-r)"/>

  <rect x="30" y="190" width="195" height="50" rx="6" fill="#FFEBEE" stroke="#D32F2F" stroke-width="2"/>
  <text x="128" y="210" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#D32F2F" font-weight="bold">Cancel Flight</text>
  <text x="128" y="228" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#D32F2F">Status: CANCELLED</text>

  <!-- Rules -->
  <text x="450" y="275" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="15" fill="#1B1B1F" font-weight="bold">Compensation Rules</text>

  <rect x="30" y="290" width="260" height="65" rx="6" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="160" y="310" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F" font-weight="bold">Semantic undo, not rollback</text>
  <text x="160" y="328" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Flight was reserved and committed.</text>
  <text x="160" y="344" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Compensation = new cancel action.</text>

  <rect x="310" y="290" width="280" height="65" rx="6" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="450" y="310" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F" font-weight="bold">Must be idempotent</text>
  <text x="450" y="328" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Compensation may run multiple times</text>
  <text x="450" y="344" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">if orchestrator retries after crash.</text>

  <rect x="610" y="290" width="260" height="65" rx="6" fill="#F3E5F5" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="740" y="310" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F" font-weight="bold">Reverse order</text>
  <text x="740" y="328" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Undo most recent step first.</text>
  <text x="740" y="344" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Mirrors stack unwinding.</text>

  <rect x="120" y="370" width="660" height="30" rx="4" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="450" y="390" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#2E7D32" font-weight="bold">Every forward step must have a defined compensation before implementation</text>

  <text x="878" y="412" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.22">systemdesignlaws.xyz</text>
</svg>