<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" style="background:#FFFFFF">
  <defs>
    <marker id="arr-cdn" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0.5 L9,3.5 L0,6.5" fill="#1B1B1F" stroke="#1B1B1F" stroke-width="1"/>
    </marker>
    <marker id="arr-cdn-g" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0.5 L9,3.5 L0,6.5" fill="#2E7D32" stroke="#2E7D32" stroke-width="1"/>
    </marker>
    <marker id="arr-cdn-b" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0.5 L9,3.5 L0,6.5" fill="#1565C0" stroke="#1565C0" stroke-width="1"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="22" fill="#1B1B1F" font-weight="bold">CDN Download Optimization</text>

  <!-- Users around the world -->
  <rect x="30" y="80" width="100" height="40" rx="6" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
  <text x="80" y="105" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">User (NYC)</text>

  <rect x="30" y="150" width="100" height="40" rx="6" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
  <text x="80" y="175" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">User (London)</text>

  <rect x="30" y="220" width="100" height="40" rx="6" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
  <text x="80" y="245" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">User (Tokyo)</text>

  <!-- CDN Edge nodes -->
  <rect x="230" y="68" width="140" height="55" rx="6" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
  <text x="300" y="90" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#2E7D32" font-weight="bold">CDN Edge</text>
  <text x="300" y="108" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#666">US East (~20ms)</text>

  <rect x="230" y="140" width="140" height="55" rx="6" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
  <text x="300" y="162" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#2E7D32" font-weight="bold">CDN Edge</text>
  <text x="300" y="180" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#666">EU West (~25ms)</text>

  <rect x="230" y="210" width="140" height="55" rx="6" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
  <text x="300" y="232" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#2E7D32" font-weight="bold">CDN Edge</text>
  <text x="300" y="250" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#666">Asia (~30ms)</text>

  <!-- Arrows users to CDN -->
  <path d="M130,100 L226,95" stroke="#2E7D32" stroke-width="2" fill="none" marker-end="url(#arr-cdn-g)"/>
  <path d="M130,170 L226,167" stroke="#2E7D32" stroke-width="2" fill="none" marker-end="url(#arr-cdn-g)"/>
  <path d="M130,240 L226,237" stroke="#2E7D32" stroke-width="2" fill="none" marker-end="url(#arr-cdn-g)"/>

  <!-- Origin S3 -->
  <rect x="560" y="140" width="150" height="60" rx="6" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
  <text x="635" y="165" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F" font-weight="bold">S3 Origin</text>
  <text x="635" y="185" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#666">US East (Virginia)</text>

  <!-- Cache miss arrows (dashed) -->
  <path d="M370,95 C450,95 500,140 556,155" stroke="#1B1B1F" stroke-width="1.5" fill="none" stroke-dasharray="5,4" marker-end="url(#arr-cdn)"/>
  <text x="470" y="110" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="9" fill="#666">cache miss only</text>

  <path d="M370,167 L556,167" stroke="#1B1B1F" stroke-width="1.5" fill="none" stroke-dasharray="5,4" marker-end="url(#arr-cdn)"/>
  <path d="M370,237 C450,237 500,190 556,175" stroke="#1B1B1F" stroke-width="1.5" fill="none" stroke-dasharray="5,4" marker-end="url(#arr-cdn)"/>

  <!-- Comparison box -->
  <rect x="40" y="300" width="370" height="90" rx="8" fill="#FFEBEE" stroke="#D32F2F" stroke-width="1"/>
  <text x="60" y="322" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#D32F2F" font-weight="bold">Without CDN</text>
  <text x="60" y="342" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Tokyo user to Virginia S3 = 200-300ms</text>
  <text x="60" y="360" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Every request hits origin</text>
  <text x="60" y="378" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">S3 egress costs high</text>

  <rect x="460" y="300" width="390" height="90" rx="8" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1"/>
  <text x="480" y="322" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#2E7D32" font-weight="bold">With CDN</text>
  <text x="480" y="342" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Tokyo user to local edge = 20-30ms</text>
  <text x="480" y="360" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Cache hit: origin never touched</text>
  <text x="480" y="378" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">10x lower latency, lower egress cost</text>

  <!-- Watermark -->
  <text x="878" y="412" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.22">systemdesignlaws.xyz</text>
</svg>