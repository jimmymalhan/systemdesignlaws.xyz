  </defs>
  <text x="450" y="32" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="20" fill="#1B1B1F" font-weight="bold">Hot Key Problem</text>
  <text x="450" y="60" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F">One Key Overloads One Shard</text>
  <text x="225" y="85" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F">Normal: Even Distribution</text>
  <rect x="60" y="90" width="70" height="55" rx="3" fill="#66BB6A" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="95" y="160" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">Shard 1</text>
  <rect x="150" y="85" width="70" height="60" rx="3" fill="#66BB6A" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="185" y="160" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">Shard 2</text>
  <rect x="240" y="90" width="70" height="55" rx="3" fill="#66BB6A" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="275" y="160" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">Shard 3</text>
  <rect x="330" y="85" width="70" height="60" rx="3" fill="#66BB6A" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="365" y="160" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">Shard 4</text>
  <text x="675" y="85" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F">Hot Key: Viral Post</text>
  <rect x="510" y="25" width="70" height="120" rx="3" fill="#EF5350" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="545" y="160" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">Shard 1</text>
  <rect x="600" y="130" width="70" height="15" rx="3" fill="#66BB6A" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="635" y="160" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">Shard 2</text>
  <rect x="690" y="125" width="70" height="20" rx="3" fill="#66BB6A" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="725" y="160" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">Shard 3</text>
  <rect x="780" y="135" width="70" height="10" rx="3" fill="#66BB6A" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="815" y="160" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">Shard 4</text>
  <text x="555" y="40" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#B71C1C">100K w/s</text>
  <rect x="50" y="185" width="800" height="55" rx="6" fill="#FFEBEE" stroke="#1B1B1F" stroke-width="2"/>
  <text x="450.0" y="217.5" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F" font-weight="bold">Problem: Even perfect hashing sends all writes for one key to one shard</text>
  <text x="450" y="270" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="15" fill="#1B1B1F">Impact</text>
  <rect x="50" y="285" width="250" height="50" rx="4" fill="#FFEBEE" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="175.0" y="314.0" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F">Shard overloaded</text>
  <rect x="325" y="285" width="250" height="50" rx="4" fill="#FFEBEE" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="450.0" y="314.0" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F">Latency spikes</text>
