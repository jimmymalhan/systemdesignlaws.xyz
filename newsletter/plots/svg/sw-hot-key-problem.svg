  <text x="725.0" y="314.0" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F">Cascading failures</text>
  <text x="450" y="370" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#555" font-style="italic">Solution: Split the hot key across sub-keys (next diagram)</text>

