<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333333"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#27ae60"/>
    </marker>
    <marker id="arrow-blue" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2980b9"/>
    </marker>
  </defs>
  <rect width="800" height="460" fill="#ffffff"/>

  <!-- Title -->
  <text x="400" y="34" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Server-Sent Events (SSE) — Chunked Streaming</text>
  <text x="400" y="54" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#555555" text-anchor="middle">One HTTP connection stays open. Server pushes chunks — no connection churn.</text>

  <!-- Client column -->
  <rect x="50" y="75" width="130" height="44" rx="8" fill="#e8f4fd" stroke="#4a90d9" stroke-width="2"/>
  <text x="115" y="102" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Client</text>
  <text x="115" y="116" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#4a90d9" text-anchor="middle">EventSource API</text>
  <line x1="115" y1="125" x2="115" y2="410" stroke="#4a90d9" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- Server column -->
  <rect x="560" y="75" width="140" height="44" rx="8" fill="#e8fde8" stroke="#4ab54a" stroke-width="2"/>
  <text x="630" y="102" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Server</text>
  <text x="630" y="116" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#4ab54a" text-anchor="middle">Transfer-Encoding: chunked</text>
  <line x1="630" y1="125" x2="630" y2="410" stroke="#4ab54a" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- Initial HTTP request -->
  <text x="32" y="148" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#888888">t=0ms</text>
  <line x1="125" y1="148" x2="615" y2="155" stroke="#2980b9" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="375" y="143" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#2980b9" text-anchor="middle" font-weight="bold">GET /events  Accept: text/event-stream</text>

  <!-- 200 OK response header -->
  <line x1="615" y1="178" x2="125" y2="185" stroke="#27ae60" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="375" y="173" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#27ae60" text-anchor="middle">200 OK   Content-Type: text/event-stream</text>

  <!-- Connection stays open indicator -->
  <rect x="200" y="192" width="345" height="20" rx="4" fill="#f0fff0" stroke="#4ab54a" stroke-width="1"/>
  <text x="372" y="206" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#27ae60" text-anchor="middle">Connection stays open — server streams chunks below</text>

  <!-- Chunk 1 -->
  <text x="32" y="238" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#888888">t=500ms</text>
  <line x1="615" y1="238" x2="125" y2="245" stroke="#4ab54a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <rect x="270" y="220" width="300" height="28" rx="4" fill="#f5fff5" stroke="#4ab54a" stroke-width="1"/>
  <text x="420" y="239" font-family="monospace" font-size="11" fill="#1a1a1a" text-anchor="middle">data: {"id":1,"msg":"user joined"}\n\n</text>

  <!-- Chunk 2 -->
  <text x="32" y="288" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#888888">t=1200ms</text>
  <line x1="615" y1="288" x2="125" y2="295" stroke="#4ab54a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <rect x="270" y="270" width="300" height="28" rx="4" fill="#f5fff5" stroke="#4ab54a" stroke-width="1"/>
  <text x="420" y="289" font-family="monospace" font-size="11" fill="#1a1a1a" text-anchor="middle">data: {"id":2,"msg":"new comment"}\n\n</text>

  <!-- Chunk 3 -->
  <text x="32" y="338" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#888888">t=3100ms</text>
  <line x1="615" y1="338" x2="125" y2="345" stroke="#4ab54a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <rect x="270" y="320" width="300" height="28" rx="4" fill="#f5fff5" stroke="#4ab54a" stroke-width="1"/>
  <text x="420" y="339" font-family="monospace" font-size="11" fill="#1a1a1a" text-anchor="middle">data: {"id":3,"msg":"post liked"}\n\n</text>

  <!-- Chunk 4 -->
  <text x="32" y="385" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#888888">t=5800ms</text>
  <line x1="615" y1="385" x2="125" y2="392" stroke="#4ab54a" stroke-width="2" marker-end="url(#arrow-green)"/>
  <rect x="270" y="368" width="300" height="28" rx="4" fill="#f5fff5" stroke="#4ab54a" stroke-width="1"/>
  <text x="420" y="387" font-family="monospace" font-size="11" fill="#1a1a1a" text-anchor="middle">data: {"id":4,"msg":"reply added"}\n\n</text>

  <!-- No new connections annotation -->
  <rect x="50" y="410" width="700" height="38" rx="6" fill="#e8f4fd" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="400" y="428" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#1a1a1a" text-anchor="middle" font-weight="bold">All events delivered on the same TCP connection — zero connection churn</text>
  <text x="400" y="443" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#555555" text-anchor="middle">Server-side only: client cannot send messages over this channel (use separate HTTP POST for that)</text>
</svg>
