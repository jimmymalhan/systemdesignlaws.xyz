<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 380" width="900" height="380">
  <rect width="900" height="380" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="20" font-weight="bold" fill="#1B1B1F">Materialized View Pattern</text>

  <!-- Expensive Query (red box) -->
  <rect x="30" y="60" width="220" height="140" rx="8" ry="8" fill="#FFEBEE" stroke="#1B1B1F" stroke-width="2"/>
  <text x="140" y="88" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="15" font-weight="bold" fill="#1B1B1F">Expensive Query</text>
  <line x1="50" y1="96" x2="230" y2="96" stroke="#1B1B1F" stroke-width="1" opacity="0.3"/>
  <text x="140" y="120" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">AVG(rating) across</text>
  <text x="140" y="138" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">10M reviews</text>
  <!-- Clock icon (simple) -->
  <circle cx="105" cy="168" r="12" fill="none" stroke="#1B1B1F" stroke-width="1.5"/>
  <line x1="105" y1="168" x2="105" y2="160" stroke="#1B1B1F" stroke-width="1.5"/>
  <line x1="105" y1="168" x2="112" y2="168" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="125" y="172" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">runs every</text>
  <text x="125" y="186" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">page load</text>

  <!-- Arrow: Replace with -->
  <line x1="260" y1="130" x2="330" y2="130" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arrowhead)"/>
  <text x="295" y="118" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" font-style="italic">Replace</text>
  <text x="295" y="132" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" font-style="italic">with</text>

  <!-- Background Job (orange box) -->
  <rect x="340" y="60" width="200" height="140" rx="8" ry="8" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
  <text x="440" y="88" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="15" font-weight="bold" fill="#1B1B1F">Background Job</text>
  <line x1="360" y1="96" x2="520" y2="96" stroke="#1B1B1F" stroke-width="1" opacity="0.3"/>
  <text x="440" y="122" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Recalculates</text>
  <text x="440" y="140" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#1B1B1F">every 5 min</text>
  <!-- Circular refresh arrow -->
  <path d="M 420,172 A 16,16 0 1 1 455,168" fill="none" stroke="#1B1B1F" stroke-width="1.8"/>
  <polygon points="455,162 455,174 463,168" fill="#1B1B1F"/>

  <!-- Arrow to Materialized View -->
  <line x1="550" y1="130" x2="620" y2="130" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arrowhead)"/>

  <!-- Materialized View (green box) -->
  <rect x="630" y="60" width="240" height="140" rx="8" ry="8" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
  <text x="750" y="88" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="15" font-weight="bold" fill="#1B1B1F">Materialized View</text>
  <line x1="650" y1="96" x2="850" y2="96" stroke="#1B1B1F" stroke-width="1" opacity="0.3"/>
  <text x="750" y="116" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" font-style="italic" fill="#1B1B1F">product_ratings</text>

  <!-- Mini table -->
  <rect x="665" y="128" width="170" height="20" rx="2" ry="2" fill="#C8E6C9" stroke="#1B1B1F" stroke-width="1"/>
  <text x="710" y="142" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" font-weight="bold" fill="#1B1B1F">product_id</text>
  <line x1="750" y1="128" x2="750" y2="148" stroke="#1B1B1F" stroke-width="1"/>
  <text x="793" y="142" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" font-weight="bold" fill="#1B1B1F">avg_rating</text>

  <rect x="665" y="148" width="170" height="18" rx="0" ry="0" fill="#FFFFFF" stroke="#1B1B1F" stroke-width="0.5"/>
  <text x="710" y="160" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">1001</text>
  <line x1="750" y1="148" x2="750" y2="166" stroke="#1B1B1F" stroke-width="0.5"/>
  <text x="793" y="160" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">4.72</text>

  <rect x="665" y="166" width="170" height="18" rx="0" ry="0" fill="#F1F8E9" stroke="#1B1B1F" stroke-width="0.5"/>
  <text x="710" y="178" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">1002</text>
  <line x1="750" y1="166" x2="750" y2="184" stroke="#1B1B1F" stroke-width="0.5"/>
  <text x="793" y="178" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">3.89</text>

  <!-- Arrowhead marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1B1B1F"/>
    </marker>
  </defs>

  <!-- Divider line -->
  <line x1="30" y1="230" x2="870" y2="230" stroke="#1B1B1F" stroke-width="1" stroke-dasharray="6,4" opacity="0.4"/>

  <!-- Comparison section -->
  <text x="450" y="258" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="15" font-weight="bold" fill="#1B1B1F">Performance Comparison</text>

  <!-- Before bar (red) -->
  <text x="130" y="290" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F">Before:</text>
  <rect x="140" y="276" width="500" height="22" rx="4" ry="4" fill="#FFCDD2" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="390" y="292" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#1B1B1F">500ms per page load</text>
  <text x="660" y="292" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#C62828" font-weight="bold">SLOW</text>

  <!-- After bar (green) -->
  <text x="130" y="328" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F">After:</text>
  <rect x="140" y="314" width="20" height="22" rx="4" ry="4" fill="#A5D6A7" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="175" y="330" font-family="Virgil, Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#1B1B1F">1ms read from view</text>
  <text x="380" y="330" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#2E7D32" font-weight="bold">500x FASTER</text>

  <!-- Speed comparison annotation -->
  <text x="450" y="358" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.6">Trade freshness (5 min staleness) for massive read performance gains</text>

  <!-- Watermark -->
  <text x="878" y="372" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.22">systemdesignlaws.xyz</text>
</svg>