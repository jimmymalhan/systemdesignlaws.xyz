<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" style="background:#FFFFFF">
  <defs>
    <marker id="arr-ip" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0.5 L9,3.5 L0,6.5" fill="#1B1B1F" stroke="#1B1B1F" stroke-width="1"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#1a1a1a" font-weight="bold">In-Process Caching</text>
  <text x="400" y="52" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#888">Local memory inside the app process - no network hop, fastest possible</text>

  <!-- App Instance 1 -->
  <rect x="40" y="80" width="200" height="180" rx="8" fill="#E8F4FD" stroke="#2980b9" stroke-width="2"/>
  <text x="140" y="105" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#2980b9" font-weight="bold">App Instance 1</text>

  <rect x="60" y="120" width="160" height="55" rx="6" fill="#E8F5E9" stroke="#27ae60" stroke-width="1.5"/>
  <text x="140" y="142" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#27ae60" font-weight="bold">Local Cache</text>
  <text x="140" y="160" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#333333">feature_flags: {...}</text>

  <rect x="60" y="185" width="160" height="55" rx="6" fill="#FAFAFA" stroke="#DDD" stroke-width="1"/>
  <text x="140" y="207" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#333333">config: v2</text>
  <text x="140" y="225" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#333333">rate_limit: {max: 100}</text>

  <!-- App Instance 2 -->
  <rect x="300" y="80" width="200" height="180" rx="8" fill="#E8F4FD" stroke="#2980b9" stroke-width="2"/>
  <text x="400" y="105" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#2980b9" font-weight="bold">App Instance 2</text>

  <rect x="320" y="120" width="160" height="55" rx="6" fill="#E8F5E9" stroke="#27ae60" stroke-width="1.5"/>
  <text x="400" y="142" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#27ae60" font-weight="bold">Local Cache</text>
  <text x="400" y="160" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#333333">feature_flags: {...}</text>

  <rect x="320" y="185" width="160" height="55" rx="6" fill="#FAFAFA" stroke="#DDD" stroke-width="1"/>
  <text x="400" y="207" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#333333">config: v2</text>
  <text x="400" y="225" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#333333">rate_limit: {max: 100}</text>

  <!-- App Instance 3 -->
  <rect x="560" y="80" width="200" height="180" rx="8" fill="#E8F4FD" stroke="#2980b9" stroke-width="2"/>
  <text x="660" y="105" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#2980b9" font-weight="bold">App Instance 3</text>

  <rect x="580" y="120" width="160" height="55" rx="6" fill="#FFF3E0" stroke="#d4a017" stroke-width="1.5"/>
  <text x="660" y="142" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#d4a017" font-weight="bold">Local Cache</text>
  <text x="660" y="160" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#c0392b">feature_flags: STALE!</text>

  <rect x="580" y="185" width="160" height="55" rx="6" fill="#FAFAFA" stroke="#DDD" stroke-width="1"/>
  <text x="660" y="207" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#c0392b">config: v1 (outdated)</text>
  <text x="660" y="225" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#333333">rate_limit: {max: 100}</text>

  <!-- Problem callout -->
  <rect x="560" y="265" width="200" height="30" rx="6" fill="#FFEBEE" stroke="#c0392b" stroke-width="1.5"/>
  <text x="660" y="285" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#c0392b" font-weight="bold">No sharing between instances!</text>

  <!-- Latency comparison -->
  <rect x="40" y="310" width="720" height="70" rx="8" fill="#FAFAFA" stroke="#DDD" stroke-width="1"/>
  <text x="400" y="332" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#1a1a1a" font-weight="bold">Latency Comparison</text>
  <rect x="60" y="345" width="30" height="16" rx="3" fill="#E8F5E9" stroke="#27ae60" stroke-width="1"/>
  <text x="100" y="358" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#27ae60" font-weight="bold">In-process: ~0.1ms (no network)</text>
  <rect x="380" y="345" width="200" height="16" rx="3" fill="#FFF3E0" stroke="#d4a017" stroke-width="1"/>
  <text x="590" y="358" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#d4a017" font-weight="bold">Redis: ~1ms (network hop)</text>

  <!-- Good for list -->
  <rect x="40" y="400" width="340" height="60" rx="8" fill="#E8F5E9" stroke="#27ae60" stroke-width="1.5"/>
  <text x="210" y="420" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#27ae60" font-weight="bold">Good For</text>
  <text x="60" y="440" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#333333">Feature flags, config, rate limiters, hot keys</text>

  <rect x="400" y="400" width="360" height="60" rx="8" fill="#FFEBEE" stroke="#c0392b" stroke-width="1.5"/>
  <text x="580" y="420" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#c0392b" font-weight="bold">Limitation</text>
  <text x="420" y="440" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#333333">Each instance has its own copy. No cross-instance sync.</text>

  <!-- Watermark -->
  <text x="778" y="472" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#1a1a1a" opacity="0.22">systemdesignlaws.xyz</text>
</svg>