<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" style="background:#FFFFFF">
  <defs>
    <marker id="arr-cw" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0.5 L9,3.5 L0,6.5" fill="#1B1B1F" stroke="#1B1B1F" stroke-width="1"/>
    </marker>
    <marker id="arr-cw-g" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0.5 L9,3.5 L0,6.5" fill="#27ae60" stroke="#27ae60" stroke-width="1"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#1a1a1a" font-weight="bold">Cache Warming Strategies</text>
  <text x="400" y="52" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#888">Pre-populate cache to avoid cold start penalty</text>

  <!-- Problem: Cold Cache -->
  <rect x="40" y="70" width="720" height="55" rx="8" fill="#FFEBEE" stroke="#c0392b" stroke-width="1.5"/>
  <text x="400" y="92" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#c0392b" font-weight="bold">Problem: Cold Cache After Deploy / Restart</text>
  <text x="400" y="112" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#333333">100% cache miss rate. Every request hits DB. Latency spikes. DB may become overloaded.</text>

  <!-- Strategy 1: Pre-populate -->
  <rect x="30" y="145" width="230" height="200" rx="8" fill="#E8F4FD" stroke="#2980b9" stroke-width="2"/>
  <text x="145" y="172" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#2980b9" font-weight="bold">Pre-populate on Deploy</text>

  <rect x="50" y="190" width="80" height="30" rx="6" fill="#FFFFFF" stroke="#2980b9" stroke-width="1.5"/>
  <text x="90" y="210" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#2980b9">Deploy</text>

  <path d="M130,205 L155,205" stroke="#2980b9" stroke-width="1.5" fill="none" marker-end="url(#arr-cw)"/>

  <rect x="160" y="190" width="80" height="30" rx="6" fill="#E8F5E9" stroke="#27ae60" stroke-width="1.5"/>
  <text x="200" y="210" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#27ae60">Load hot</text>

  <text x="50" y="245" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#333333">Startup script loads top 1000</text>
  <text x="50" y="263" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#333333">most-accessed keys from DB</text>
  <text x="50" y="288" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#27ae60">+ Immediate hit rate</text>
  <text x="50" y="306" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#c0392b">- Requires access analytics</text>
  <text x="50" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#888" font-style="italic">Best for known hot datasets</text>

  <!-- Strategy 2: Lazy Loading -->
  <rect x="280" y="145" width="230" height="200" rx="8" fill="#E8F5E9" stroke="#27ae60" stroke-width="2"/>
  <text x="395" y="172" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#27ae60" font-weight="bold">Lazy Loading</text>

  <rect x="300" y="190" width="80" height="30" rx="6" fill="#FFFFFF" stroke="#d4a017" stroke-width="1.5"/>
  <text x="340" y="210" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#d4a017">Miss</text>

  <path d="M380,205 L405,205" stroke="#27ae60" stroke-width="1.5" fill="none" marker-end="url(#arr-cw-g)"/>

  <rect x="410" y="190" width="80" height="30" rx="6" fill="#E8F5E9" stroke="#27ae60" stroke-width="1.5"/>
  <text x="450" y="210" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#27ae60">Populate</text>

  <text x="300" y="245" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#333333">Cache fills organically as</text>
  <text x="300" y="263" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#333333">requests come in. Natural.</text>
  <text x="300" y="288" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#27ae60">+ Simple, no extra logic</text>
  <text x="300" y="306" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#c0392b">- Slow ramp-up period</text>
  <text x="300" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#888" font-style="italic">Default cache-aside behavior</text>

  <!-- Strategy 3: Predictive -->
  <rect x="530" y="145" width="230" height="200" rx="8" fill="#FFF8E8" stroke="#d4a017" stroke-width="2"/>
  <text x="645" y="172" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#d4a017" font-weight="bold">Predictive Warming</text>

  <rect x="550" y="190" width="80" height="30" rx="6" fill="#FFFFFF" stroke="#d4a017" stroke-width="1.5"/>
  <text x="590" y="210" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#d4a017">Analyze</text>

  <path d="M630,205 L655,205" stroke="#d4a017" stroke-width="1.5" fill="none" marker-end="url(#arr-cw)"/>

  <rect x="660" y="190" width="80" height="30" rx="6" fill="#E8F5E9" stroke="#27ae60" stroke-width="1.5"/>
  <text x="700" y="210" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#27ae60">Pre-load</text>

  <text x="550" y="245" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#333333">ML/heuristics predict what</text>
  <text x="550" y="263" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#333333">will be accessed next</text>
  <text x="550" y="288" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#27ae60">+ Proactive, high hit rate</text>
  <text x="550" y="306" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#c0392b">- Complex, may waste memory</text>
  <text x="550" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#888" font-style="italic">Netflix, recommendation systems</text>

  <!-- Hit Rate Timeline -->
  <rect x="40" y="365" width="720" height="95" rx="8" fill="#FAFAFA" stroke="#DDD" stroke-width="1"/>
  <text x="400" y="388" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#1a1a1a" font-weight="bold">Cache Hit Rate Over Time After Deploy</text>

  <!-- Lazy curve (slow ramp) -->
  <path d="M80,440 Q200,435 350,420 Q500,405 700,400" stroke="#d4a017" stroke-width="2" fill="none"/>
  <text x="710" y="398" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#d4a017">Lazy: slow ramp</text>

  <!-- Pre-populated curve (fast start) -->
  <path d="M80,415 Q150,402 250,400 Q400,398 700,397" stroke="#27ae60" stroke-width="2.5" fill="none"/>
  <text x="710" y="415" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#27ae60">Pre-populated: fast</text>

  <!-- Axes labels -->
  <text x="80" y="450" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#888">0% hit rate</text>
  <text x="640" y="450" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#888">95%+ hit rate</text>

  <!-- Watermark -->
  <text x="778" y="472" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#1a1a1a" opacity="0.22">systemdesignlaws.xyz</text>
</svg>