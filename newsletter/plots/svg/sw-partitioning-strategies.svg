<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" style="background:#FFFFFF">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0.5 L9,3.5 L0,6.5" fill="#1B1B1F" stroke="#1B1B1F" stroke-width="1"/>
    </marker>
  </defs>
  <text x="450" y="32" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="20" fill="#1B1B1F" font-weight="bold">Partitioning Strategies</text>
  <rect x="30" y="55" width="260" height="155" rx="6" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
  <text x="160.0" y="129.5" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F" font-weight="bold">Hash-Based</text>
  <text x="160.0" y="147.5" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#555">hash(user_id) % N</text>
  <text x="160" y="115" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#555">Even distribution</text>
  <text x="160" y="135" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#555">No locality guarantee</text>
  <text x="160" y="155" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#555">Best for: social, messaging</text>
  <rect x="55" y="170" width="210" height="25" rx="4" fill="#D0E8FA" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="160.0" y="186.5" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">user_id, post_id, device_id</text>
  <rect x="320" y="55" width="260" height="155" rx="6" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
  <text x="450.0" y="129.5" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F" font-weight="bold">Range-Based</text>
  <text x="450.0" y="147.5" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#555">timestamp ranges</text>
  <text x="450" y="115" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#555">Time-series friendly</text>
  <text x="450" y="135" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#555">Hot partition risk (recent)</text>
  <text x="450" y="155" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#555">Best for: metrics, logs</text>
  <rect x="345" y="170" width="210" height="25" rx="4" fill="#FFE0B2" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="450.0" y="186.5" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">2024-01, 2024-02, ...</text>
  <rect x="610" y="55" width="260" height="155" rx="6" fill="#F3E5F5" stroke="#1B1B1F" stroke-width="2"/>
  <text x="740.0" y="129.5" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F" font-weight="bold">Vertical</text>
  <text x="740.0" y="147.5" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#555">Split by access pattern</text>
  <text x="740" y="115" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#555">Isolate workloads</text>
  <text x="740" y="135" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#555">Different DBs per table</text>
  <text x="740" y="155" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#555">Best for: mixed read/write</text>
  <rect x="635" y="170" width="210" height="25" rx="4" fill="#E1BEE7" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="740.0" y="186.5" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">content, metrics, analytics</text>
  <rect x="50" y="245" width="800" height="120" rx="6" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
  <text x="450.0" y="310.0" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F" font-weight="bold">Choosing a Strategy</text>
  <text x="450" y="280" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F">Hash: when you need even write distribution across shards</text>
  <text x="450" y="305" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F">Range: when queries scan contiguous data (time windows)</text>
  <text x="450" y="330" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F">Vertical: when different columns have different write patterns</text>
  <text x="450" y="355" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F">Combine: hash-shard the metrics table, keep content on a single node</text>

  <text x="878" y="412" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.22">systemdesignlaws.xyz</text>
</svg>