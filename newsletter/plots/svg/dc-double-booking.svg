<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" style="background:#FFFFFF">
  <defs>
    <marker id="arr-db" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0.5 L9,3.5 L0,6.5" fill="#1B1B1F" stroke="#1B1B1F" stroke-width="1"/>
    </marker>
  </defs>
  <text x="450" y="32" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="22" fill="#1B1B1F" font-weight="bold">Double-Booking: What Goes Wrong</text>

  <!-- Alice -->
  <rect x="30" y="55" width="180" height="60" rx="6" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
  <text x="120" y="82" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="16" fill="#1B1B1F" font-weight="bold">Alice</text>
  <text x="120" y="102" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Clicks "Buy Now"</text>

  <!-- Bob -->
  <rect x="690" y="55" width="180" height="60" rx="6" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
  <text x="780" y="82" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="16" fill="#1B1B1F" font-weight="bold">Bob</text>
  <text x="780" y="102" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Clicks "Buy Now"</text>

  <!-- Database -->
  <rect x="360" y="55" width="180" height="60" rx="6" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
  <text x="450" y="82" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="16" fill="#1B1B1F" font-weight="bold">Database</text>
  <text x="450" y="102" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">seats = 1</text>

  <!-- Step 1: Both read -->
  <text x="450" y="145" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F" font-weight="bold">Step 1: Both READ seats</text>
  <line x1="210" y1="165" x2="358" y2="165" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr-db)"/>
  <text x="284" y="160" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">SELECT seats</text>
  <line x1="690" y1="175" x2="542" y2="175" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr-db)"/>
  <text x="616" y="170" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">SELECT seats</text>

  <!-- Both see 1 -->
  <rect x="100" y="195" width="120" height="30" rx="4" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="160" y="215" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Sees seats = 1</text>
  <rect x="680" y="195" width="120" height="30" rx="4" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="740" y="215" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Sees seats = 1</text>

  <!-- Step 2: Both write -->
  <text x="450" y="250" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F" font-weight="bold">Step 2: Both WRITE seats = 0</text>
  <line x1="210" y1="270" x2="358" y2="270" stroke="#D32F2F" stroke-width="2" marker-end="url(#arr-db)"/>
  <text x="284" y="265" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#D32F2F">UPDATE seats=0</text>
  <line x1="690" y1="280" x2="542" y2="280" stroke="#D32F2F" stroke-width="2" marker-end="url(#arr-db)"/>
  <text x="616" y="275" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#D32F2F">UPDATE seats=0</text>

  <!-- Result -->
  <rect x="260" y="310" width="380" height="55" rx="6" fill="#FFEBEE" stroke="#D32F2F" stroke-width="2"/>
  <text x="450" y="335" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="16" fill="#D32F2F" font-weight="bold">RESULT: Both get tickets!</text>
  <text x="450" y="355" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#D32F2F">One person turned away at the door</text>

  <!-- Lesson -->
  <rect x="180" y="378" width="540" height="26" rx="4" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/>
  <text x="450" y="396" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#E65100" font-weight="bold">Read-then-write without coordination = double-booking</text>

  <text x="878" y="412" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.22">systemdesignlaws.xyz</text>
</svg>