<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" style="background:#FFFFFF">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0.5 L9,3.5 L0,6.5" fill="#1B1B1F" stroke="#1B1B1F" stroke-width="1"/>
    </marker>
  </defs>
  <text x="450" y="32" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="20" fill="#1B1B1F" font-weight="bold">Fan-Out on Write vs Read</text>
  <text x="450" y="60" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F">Pre-Compute at Write Time vs Read Time</text>
  <rect x="30" y="80" width="400" height="160" rx="6" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
  <text x="230.0" y="165.0" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F" font-weight="bold">Fan-Out on Write</text>
  <text x="230" y="115" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F">User posts -> write to all follower feeds</text>
  <rect x="60" y="130" width="100" height="30" rx="4" fill="#FFE0B2" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="110.0" y="149.0" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F">Post Event</text>
  <line x1="160" y1="145" x2="200" y2="125" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="160" y1="145" x2="200" y2="150" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="160" y1="145" x2="200" y2="175" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="200" y="115" width="120" height="25" rx="4" fill="#FFE0B2" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="260.0" y="131.5" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">Feed: Alice</text>
  <rect x="200" y="143" width="120" height="25" rx="4" fill="#FFE0B2" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="260.0" y="159.5" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">Feed: Bob</text>
  <rect x="200" y="171" width="120" height="25" rx="4" fill="#FFE0B2" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="260.0" y="187.5" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">Feed: Carol</text>
  <text x="230" y="225" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#E65100">1 post = N writes (N = followers)</text>
  <rect x="470" y="80" width="400" height="160" rx="6" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
  <text x="670.0" y="165.0" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F" font-weight="bold">Fan-Out on Read</text>
  <text x="670" y="115" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F">User opens feed -> query all followed users</text>
  <rect x="500" y="130" width="120" height="25" rx="4" fill="#C8E6C9" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="560.0" y="146.5" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">Feed: Alice</text>
  <line x1="620" y1="142" x2="680" y2="160" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="500" y="160" width="120" height="25" rx="4" fill="#C8E6C9" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="560.0" y="176.5" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">Posts: User1</text>
  <rect x="500" y="190" width="120" height="25" rx="4" fill="#C8E6C9" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="560.0" y="206.5" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">Posts: User2</text>
  <text x="670" y="225" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#2E7D32">0 extra writes, slow reads</text>
  <rect x="100" y="270" width="700" height="80" rx="6" fill="#F3E5F5" stroke="#1B1B1F" stroke-width="2"/>
  <text x="450.0" y="315.0" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F" font-weight="bold">The Trade-off</text>
  <text x="450" y="305" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F">Fan-out on write: fast reads, expensive writes (celebrity problem)</text>
  <text x="450" y="330" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F">Fan-out on read: cheap writes, slow reads for popular content</text>
  <text x="450" y="375" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#555" font-style="italic">Hybrid: fan-out on write for normal users, fan-out on read for celebrities</text>

  <text x="878" y="412" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.22">systemdesignlaws.xyz</text>
</svg>