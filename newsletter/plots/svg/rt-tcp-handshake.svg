<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333333"/>
    </marker>
    <marker id="arrow-left" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="10 0, 0 3.5, 10 7" fill="#333333"/>
    </marker>
  </defs>
  <rect width="800" height="460" fill="#ffffff"/>

  <!-- Title -->
  <text x="400" y="36" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#1a1a1a" text-anchor="middle">TCP 3-Way Handshake + HTTP Request</text>

  <!-- Client column -->
  <rect x="60" y="60" width="140" height="50" rx="8" fill="#e8f4fd" stroke="#4a90d9" stroke-width="2"/>
  <text x="130" y="91" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Client</text>
  <line x1="130" y1="110" x2="130" y2="420" stroke="#4a90d9" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- Server column -->
  <rect x="600" y="60" width="140" height="50" rx="8" fill="#e8fde8" stroke="#4ab54a" stroke-width="2"/>
  <text x="670" y="91" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Server</text>
  <line x1="670" y1="110" x2="670" y2="420" stroke="#4ab54a" stroke-width="2" stroke-dasharray="6,4"/>

  <!-- SYN -->
  <line x1="140" y1="145" x2="655" y2="175" stroke="#333333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="390" y="150" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#c0392b" text-anchor="middle">SYN</text>
  <text x="140" y="140" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#555555">t=0ms</text>

  <!-- SYN-ACK -->
  <line x1="655" y1="205" x2="140" y2="235" stroke="#333333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="390" y="213" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#2980b9" text-anchor="middle">SYN-ACK</text>
  <text x="660" y="200" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#555555">t=50ms</text>

  <!-- ACK -->
  <line x1="140" y1="260" x2="655" y2="290" stroke="#333333" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="390" y="265" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#c0392b" text-anchor="middle">ACK</text>
  <text x="140" y="255" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#555555">t=100ms</text>

  <!-- Connection established label -->
  <rect x="270" y="295" width="260" height="28" rx="6" fill="#e8fde8" stroke="#4ab54a" stroke-width="1.5"/>
  <text x="400" y="314" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#27ae60" text-anchor="middle">Connection Established</text>

  <!-- HTTP GET -->
  <line x1="140" y1="345" x2="655" y2="370" stroke="#7b68ee" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="390" y="342" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#5a4fcf" text-anchor="middle" font-weight="bold">HTTP GET /updates?since=t</text>
  <text x="140" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#555555">t=100ms</text>

  <!-- Response -->
  <line x1="655" y1="395" x2="140" y2="420" stroke="#7b68ee" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="390" y="398" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#5a4fcf" text-anchor="middle" font-weight="bold">200 OK {data}</text>
  <text x="660" y="390" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#555555">t=150ms</text>

  <!-- Note -->
  <text x="400" y="445" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#666666" text-anchor="middle">Every new HTTP connection pays the handshake cost (100ms+ RTT) before any data flows.</text>
</svg>
