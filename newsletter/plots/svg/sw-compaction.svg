<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" style="background:#FFFFFF">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0.5 L9,3.5 L0,6.5" fill="#1B1B1F" stroke="#1B1B1F" stroke-width="1"/>
    </marker>
  </defs>
  <text x="450" y="32" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="20" fill="#1B1B1F" font-weight="bold">Compaction in LSM Storage</text>
  <text x="450" y="60" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F">Background Merging of Sorted Files</text>
  <text x="100" y="85" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#555">Level 0 (unsorted)</text>
  <rect x="50" y="95" width="100" height="35" rx="4" fill="#FFEBEE" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="100.0" y="116.5" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">SSTable 1</text>
  <rect x="160" y="95" width="100" height="35" rx="4" fill="#FFEBEE" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="210.0" y="116.5" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">SSTable 2</text>
  <rect x="270" y="95" width="100" height="35" rx="4" fill="#FFEBEE" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="320.0" y="116.5" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">SSTable 3</text>
  <rect x="380" y="95" width="100" height="35" rx="4" fill="#FFEBEE" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="430.0" y="116.5" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">SSTable 4</text>
  <line x1="250" y1="135" x2="250" y2="165" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>
  <text x="310" y="155" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#555">Merge + Sort</text>
  <text x="100" y="175" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#555">Level 1 (sorted, no overlap)</text>
  <rect x="100" y="190" width="200" height="35" rx="4" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="200.0" y="211.5" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">SSTable L1-1</text>
  <rect x="320" y="190" width="200" height="35" rx="4" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="420.0" y="211.5" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">SSTable L1-2</text>
  <line x1="250" y1="230" x2="250" y2="260" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>
  <text x="310" y="250" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#555">Merge + Sort</text>
  <text x="100" y="270" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#555">Level 2 (larger, sorted)</text>
  <rect x="100" y="285" width="400" height="35" rx="4" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="300.0" y="306.5" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">SSTable L2-1 (final)</text>
  <rect x="530" y="90" width="340" height="130" rx="6" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
  <text x="700.0" y="160.0" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F" font-weight="bold">Compaction Trade-offs</text>
  <text x="700" y="135" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Pro: Reads become faster (fewer files)</text>
  <text x="700" y="160" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Pro: Reclaims deleted/overwritten space</text>
  <text x="700" y="185" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Con: Background I/O competes with writes</text>
  <text x="700" y="210" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Con: Write amplification (data rewritten)</text>
  <rect x="100" y="345" width="350" height="50" rx="6" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
  <text x="275.0" y="367.0" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F" font-weight="bold">Size-Tiered (Cassandra)</text>
  <text x="275.0" y="385.0" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#555">Merge same-size files</text>
  <rect x="480" y="345" width="350" height="50" rx="6" fill="#F3E5F5" stroke="#1B1B1F" stroke-width="2"/>
  <text x="655.0" y="367.0" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F" font-weight="bold">Leveled (LevelDB)</text>
  <text x="655.0" y="385.0" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#555">Strict level sizes</text>

  <text x="878" y="412" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.22">systemdesignlaws.xyz</text>
</svg>