<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" style="background:#FFFFFF">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0.5 L9,3.5 L0,6.5" fill="#1B1B1F" stroke="#1B1B1F" stroke-width="1"/>
    </marker>
  </defs>
  <text x="450" y="32" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="20" fill="#1B1B1F" font-weight="bold">Resharding Strategy</text>
  <text x="450" y="60" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F">Add Shards Without Downtime</text>
  <text x="200" y="85" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F">Old: 4 Shards</text>
  <rect x="50" y="95" width="85" height="35" rx="4" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="92.5" y="116.5" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Shard 1</text>
  <rect x="150" y="95" width="85" height="35" rx="4" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="192.5" y="116.5" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Shard 2</text>
  <rect x="250" y="95" width="85" height="35" rx="4" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="292.5" y="116.5" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Shard 3</text>
  <rect x="350" y="95" width="85" height="35" rx="4" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="392.5" y="116.5" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Shard 4</text>
  <text x="650" y="85" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F">New: 8 Shards</text>
  <rect x="490" y="95" width="85" height="35" rx="4" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="532.5" y="116.5" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Shard 5</text>
  <rect x="590" y="95" width="85" height="35" rx="4" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="632.5" y="116.5" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Shard 6</text>
  <rect x="690" y="95" width="85" height="35" rx="4" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="732.5" y="116.5" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Shard 7</text>
  <rect x="790" y="95" width="85" height="35" rx="4" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="832.5" y="116.5" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Shard 8</text>
  <rect x="50" y="155" width="800" height="230" rx="6" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
  <text x="450.0" y="275.0" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F" font-weight="bold">Gradual Migration (Dual-Write)</text>
  <rect x="70" y="195" width="80" height="28" rx="4" fill="#D0E8FA" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="110.0" y="213.0" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Step 1</text>
  <text x="170" y="213" text-anchor="start" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Deploy new shard routing (writes go to BOTH old and new)</text>
  <rect x="70" y="235" width="80" height="28" rx="4" fill="#D0E8FA" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="110.0" y="253.0" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Step 2</text>
  <text x="170" y="253" text-anchor="start" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Background job copies existing data from old to new shards</text>
  <rect x="70" y="275" width="80" height="28" rx="4" fill="#D0E8FA" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="110.0" y="293.0" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Step 3</text>
  <text x="170" y="293" text-anchor="start" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Verify data consistency between old and new</text>
  <rect x="70" y="315" width="80" height="28" rx="4" fill="#D0E8FA" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="110.0" y="333.0" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Step 4</text>
  <text x="170" y="333" text-anchor="start" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Switch reads to new shards</text>
  <rect x="70" y="355" width="80" height="28" rx="4" fill="#D0E8FA" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="110.0" y="373.0" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Step 5</text>
  <text x="170" y="373" text-anchor="start" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Stop dual-writes, decommission old shards</text>
  <text x="450" y="400" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#2E7D32" font-style="italic">Zero downtime: system stays available throughout migration</text>

  <text x="878" y="412" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.22">systemdesignlaws.xyz</text>
</svg>