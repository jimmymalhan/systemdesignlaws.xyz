<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420">
  <rect width="900" height="420" fill="#FFFFFF"/>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="20" font-weight="bold" fill="#1B1B1F">Full Table Scan vs. Index Lookup</text>

  <!-- LEFT SIDE: Full Table Scan -->
  <text x="210" y="58" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="16" font-weight="bold" fill="#1B1B1F">Without Index: Sequential Scan</text>

  <!-- Table representation (vertical stack of rows) -->
  <rect x="140" y="70" width="140" height="280" rx="4" fill="#FFEBEE" stroke="#1B1B1F" stroke-width="2"/>
  <!-- Row lines -->
  <line x1="140" y1="90" x2="280" y2="90" stroke="#1B1B1F" stroke-width="0.8" opacity="0.4"/>
  <line x1="140" y1="110" x2="280" y2="110" stroke="#1B1B1F" stroke-width="0.8" opacity="0.4"/>
  <line x1="140" y1="130" x2="280" y2="130" stroke="#1B1B1F" stroke-width="0.8" opacity="0.4"/>
  <line x1="140" y1="150" x2="280" y2="150" stroke="#1B1B1F" stroke-width="0.8" opacity="0.4"/>
  <line x1="140" y1="170" x2="280" y2="170" stroke="#1B1B1F" stroke-width="0.8" opacity="0.4"/>
  <line x1="140" y1="190" x2="280" y2="190" stroke="#1B1B1F" stroke-width="0.8" opacity="0.4"/>
  <line x1="140" y1="210" x2="280" y2="210" stroke="#1B1B1F" stroke-width="0.8" opacity="0.4"/>
  <line x1="140" y1="230" x2="280" y2="230" stroke="#1B1B1F" stroke-width="0.8" opacity="0.4"/>
  <line x1="140" y1="250" x2="280" y2="250" stroke="#1B1B1F" stroke-width="0.8" opacity="0.4"/>
  <line x1="140" y1="270" x2="280" y2="270" stroke="#1B1B1F" stroke-width="0.8" opacity="0.4"/>
  <line x1="140" y1="290" x2="280" y2="290" stroke="#1B1B1F" stroke-width="0.8" opacity="0.4"/>
  <line x1="140" y1="310" x2="280" y2="310" stroke="#1B1B1F" stroke-width="0.8" opacity="0.4"/>
  <line x1="140" y1="330" x2="280" y2="330" stroke="#1B1B1F" stroke-width="0.8" opacity="0.4"/>
  <text x="210" y="85" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">row 1</text>
  <text x="210" y="105" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">row 2</text>
  <text x="210" y="125" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">row 3</text>
  <text x="210" y="220" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">...</text>
  <text x="210" y="305" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="9" fill="#1B1B1F">row 9,999,999</text>
  <text x="210" y="325" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="9" fill="#1B1B1F">row 10,000,000</text>
  <text x="210" y="345" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" font-weight="bold" fill="#1B1B1F">10M rows</text>

  <!-- Red scanning arrow -->
  <line x1="125" y1="75" x2="125" y2="340" stroke="#D32F2F" stroke-width="3" marker-end="url(#redArrow)"/>
  <defs>
    <marker id="redArrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#D32F2F"/>
    </marker>
    <marker id="greenArrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#2E7D32"/>
    </marker>
  </defs>
  <text x="108" y="210" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#D32F2F" transform="rotate(-90 108 210)">SCANNING EVERY ROW</text>

  <!-- Clock / metrics -->
  <rect x="300" y="120" width="110" height="80" rx="8" fill="#FFEBEE" stroke="#D32F2F" stroke-width="2"/>
  <text x="355" y="142" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" font-weight="bold" fill="#D32F2F">Latency</text>
  <text x="355" y="160" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="16" font-weight="bold" fill="#D32F2F">100-500ms</text>
  <text x="355" y="178" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">CPU: 100%</text>
  <text x="355" y="193" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">Disk I/O: MAXED</text>

  <!-- Divider -->
  <line x1="450" y1="50" x2="450" y2="400" stroke="#1B1B1F" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="450" y="405" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">vs</text>

  <!-- RIGHT SIDE: B-Tree Index Lookup -->
  <text x="680" y="58" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="16" font-weight="bold" fill="#1B1B1F">With Index: B-Tree Lookup</text>

  <!-- B-tree root -->
  <rect x="640" y="74" width="80" height="30" rx="6" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
  <text x="680" y="94" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Root</text>
  <!-- Lines to children -->
  <line x1="660" y1="104" x2="610" y2="130" stroke="#2E7D32" stroke-width="2"/>
  <line x1="700" y1="104" x2="750" y2="130" stroke="#2E7D32" stroke-width="2"/>

  <!-- Level 2 nodes -->
  <rect x="570" y="130" width="80" height="28" rx="6" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
  <text x="610" y="149" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">Branch</text>
  <rect x="710" y="130" width="80" height="28" rx="6" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
  <text x="750" y="149" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">Branch</text>

  <!-- Lines to leaves -->
  <line x1="595" y1="158" x2="560" y2="186" stroke="#2E7D32" stroke-width="2"/>
  <line x1="625" y1="158" x2="650" y2="186" stroke="#2E7D32" stroke-width="2"/>

  <!-- Leaf nodes -->
  <rect x="520" y="186" width="80" height="28" rx="6" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
  <text x="560" y="205" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">Leaf</text>
  <rect x="610" y="186" width="80" height="28" rx="6" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
  <text x="650" y="205" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">Leaf</text>

  <!-- Arrow to result -->
  <line x1="560" y1="214" x2="560" y2="248" stroke="#2E7D32" stroke-width="2" marker-end="url(#greenArrow)"/>

  <!-- Result row -->
  <rect x="500" y="250" width="120" height="30" rx="6" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2.5"/>
  <text x="560" y="270" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#2E7D32">Target Row</text>

  <!-- Hop count labels -->
  <text x="815" y="90" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#2E7D32">Hop 1</text>
  <text x="815" y="145" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#2E7D32">Hop 2</text>
  <text x="815" y="200" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#2E7D32">Hop 3</text>
  <text x="815" y="265" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#2E7D32">Hop 4</text>

  <!-- Right side metrics -->
  <rect x="620" y="300" width="130" height="80" rx="8" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
  <text x="685" y="322" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" font-weight="bold" fill="#2E7D32">Latency</text>
  <text x="685" y="342" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="16" font-weight="bold" fill="#2E7D32">0.1-1ms</text>
  <text x="685" y="360" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">Only 4 lookups needed</text>
  <text x="685" y="375" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">O(log n) complexity</text>

  <!-- Watermark -->
  <text x="878" y="409" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.22">systemdesignlaws.xyz</text>
</svg>