<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420">
<rect width="900" height="420" fill="#FFFFFF"/>
<defs>
  <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
    <path d="M0,0.5 L9,3.5 L0,6.5" fill="#1B1B1F" stroke="#1B1B1F" stroke-width="1"/>
  </marker>
  <marker id="arr-r" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
    <path d="M0,0.5 L9,3.5 L0,6.5" fill="#D32F2F" stroke="#D32F2F" stroke-width="1"/>
  </marker>
</defs>

<!-- Title -->
<text x="450" y="30" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="20" font-weight="bold" fill="#1B1B1F">Payment System Workflow</text>
<text x="450" y="50" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F" opacity="0.6">Idempotent steps, compensation on failure, exactly-once semantics</text>

<!-- Happy path -->
<text x="40" y="80" font-family="Virgil, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#1B1B1F">Happy Path</text>

<rect x="40" y="90" width="130" height="45" rx="8" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
<text x="105" y="117" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Validate Order</text>

<line x1="170" y1="112" x2="195" y2="112" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>

<rect x="200" y="90" width="130" height="45" rx="8" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
<text x="265" y="117" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Authorize Card</text>

<line x1="330" y1="112" x2="355" y2="112" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>

<rect x="360" y="90" width="130" height="45" rx="8" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
<text x="425" y="117" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Reserve Inventory</text>

<line x1="490" y1="112" x2="515" y2="112" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>

<rect x="520" y="90" width="130" height="45" rx="8" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
<text x="585" y="117" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Capture Payment</text>

<line x1="650" y1="112" x2="675" y2="112" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>

<rect x="680" y="90" width="130" height="45" rx="8" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
<text x="745" y="117" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Confirm + Email</text>

<!-- Failure at step 3 -->
<text x="40" y="170" font-family="Virgil, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#D32F2F">Failure: Inventory Unavailable</text>

<rect x="40" y="180" width="130" height="45" rx="8" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
<text x="105" y="207" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Validate Order</text>

<line x1="170" y1="202" x2="195" y2="202" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>

<rect x="200" y="180" width="130" height="45" rx="8" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
<text x="265" y="207" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Authorize Card</text>

<line x1="330" y1="202" x2="355" y2="202" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>

<rect x="360" y="180" width="130" height="45" rx="8" fill="#FFEBEE" stroke="#1B1B1F" stroke-width="2"/>
<text x="425" y="200" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#D32F2F">Inventory FAIL</text>
<text x="425" y="216" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="18" fill="#D32F2F">X</text>

<!-- Compensation arrows going back -->
<line x1="360" y1="215" x2="330" y2="250" stroke="#D32F2F" stroke-width="2" marker-end="url(#arr-r)"/>

<rect x="200" y="245" width="130" height="40" rx="8" fill="#FFEBEE" stroke="#D32F2F" stroke-width="2"/>
<text x="265" y="270" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#D32F2F">Release Auth Hold</text>

<line x1="200" y1="265" x2="170" y2="270" stroke="#D32F2F" stroke-width="2" marker-end="url(#arr-r)"/>

<rect x="40" y="260" width="130" height="40" rx="8" fill="#FFEBEE" stroke="#D32F2F" stroke-width="2"/>
<text x="105" y="285" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#D32F2F">Notify Customer</text>

<!-- Key properties box -->
<rect x="40" y="320" width="380" height="80" rx="8" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
<text x="230" y="342" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#1B1B1F">Key Properties</text>
<text x="60" y="360" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Each step has an idempotency key (order_id + step)</text>
<text x="60" y="378" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Auth before capture separates hold from charge</text>
<text x="60" y="394" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Every step has a defined compensation action</text>

<!-- Why workflow -->
<rect x="460" y="320" width="400" height="80" rx="8" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
<text x="660" y="342" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" font-weight="bold" fill="#1B1B1F">Why Workflow Engines Excel Here</text>
<text x="480" y="360" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Automatic retry with exponential backoff</text>
<text x="480" y="378" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Compensation logic defined alongside happy path</text>
<text x="480" y="394" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Full audit trail of every step and decision</text>

<!-- Watermark -->
<text x="878" y="412" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.22">systemdesignlaws.xyz</text>
</svg>