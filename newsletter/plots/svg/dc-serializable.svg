<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" style="background:#FFFFFF">
  <defs>
    <marker id="arr-sz" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0.5 L9,3.5 L0,6.5" fill="#1B1B1F" stroke="#1B1B1F" stroke-width="1"/>
    </marker>
  </defs>
  <text x="450" y="32" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="22" fill="#1B1B1F" font-weight="bold">SERIALIZABLE: Automatic Conflict Detection</text>

  <line x1="150" y1="55" x2="150" y2="380" stroke="#CCC" stroke-width="1.5" stroke-dasharray="5,4"/>
  <line x1="450" y1="55" x2="450" y2="380" stroke="#CCC" stroke-width="1.5" stroke-dasharray="5,4"/>
  <line x1="750" y1="55" x2="750" y2="380" stroke="#CCC" stroke-width="1.5" stroke-dasharray="5,4"/>

  <rect x="70" y="50" width="160" height="28" rx="4" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
  <text x="150" y="69" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F" font-weight="bold">Alice (Txn A)</text>
  <rect x="370" y="50" width="160" height="28" rx="4" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
  <text x="450" y="69" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F" font-weight="bold">Database (SSI)</text>
  <rect x="670" y="50" width="160" height="28" rx="4" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
  <text x="750" y="69" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F" font-weight="bold">Bob (Txn B)</text>

  <!-- Both read -->
  <line x1="150" y1="105" x2="438" y2="105" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr-sz)"/>
  <text x="294" y="100" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">SELECT seats (tracks read)</text>

  <line x1="750" y1="125" x2="462" y2="125" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr-sz)"/>
  <text x="606" y="120" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">SELECT seats (tracks read)</text>

  <!-- DB tracking -->
  <rect x="355" y="140" width="190" height="38" rx="4" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1.5"/>
  <text x="450" y="157" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#7B1FA2" font-weight="bold">Dependency tracking:</text>
  <text x="450" y="172" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#7B1FA2">A read seats, B read seats</text>

  <!-- Alice writes successfully -->
  <line x1="150" y1="200" x2="438" y2="200" stroke="#2E7D32" stroke-width="2" marker-end="url(#arr-sz)"/>
  <text x="294" y="195" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#2E7D32">UPDATE seats=0; COMMIT</text>

  <rect x="355" y="210" width="190" height="24" rx="4" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="450" y="227" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#2E7D32" font-weight="bold">Alice commits OK</text>

  <!-- Bob tries to write -->
  <line x1="750" y1="260" x2="462" y2="260" stroke="#D32F2F" stroke-width="2" marker-end="url(#arr-sz)"/>
  <text x="606" y="255" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#D32F2F">UPDATE seats=0; COMMIT</text>

  <!-- DB detects conflict -->
  <rect x="355" y="275" width="190" height="38" rx="4" fill="#FFEBEE" stroke="#D32F2F" stroke-width="2"/>
  <text x="450" y="292" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#D32F2F" font-weight="bold">CONFLICT DETECTED</text>
  <text x="450" y="308" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#D32F2F">B read data A modified</text>

  <!-- Bob aborted -->
  <line x1="450" y1="325" x2="738" y2="325" stroke="#D32F2F" stroke-width="2" marker-end="url(#arr-sz)"/>
  <text x="594" y="320" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#D32F2F" font-weight="bold">ABORT: serialization failure</text>

  <rect x="640" y="335" width="220" height="28" rx="4" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/>
  <text x="750" y="354" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#E65100">Bob must RETRY from scratch</text>

  <!-- Note -->
  <rect x="80" y="378" width="740" height="28" rx="4" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1.5"/>
  <text x="450" y="397" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#7B1FA2">More expensive than explicit locks. DB tracks all reads/writes for conflict detection.</text>

  <text x="878" y="412" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.22">systemdesignlaws.xyz</text>
</svg>