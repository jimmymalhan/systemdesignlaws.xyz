<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 480" style="background:#FFFFFF">
  <defs>
    <marker id="arr-cs2" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0.5 L9,3.5 L0,6.5" fill="#1B1B1F" stroke="#1B1B1F" stroke-width="1"/>
    </marker>
    <marker id="arr-cs2-b" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0.5 L9,3.5 L0,6.5" fill="#2980b9" stroke="#2980b9" stroke-width="1"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="400" y="32" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#1a1a1a" font-weight="bold">Client-Side Caching</text>
  <text x="400" y="52" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#888">Browser and on-device storage for offline-capable apps</text>

  <!-- Browser/Device -->
  <rect x="40" y="80" width="300" height="220" rx="8" fill="#E8F4FD" stroke="#2980b9" stroke-width="2"/>
  <text x="190" y="105" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#2980b9" font-weight="bold">Client (Browser / Mobile)</text>

  <!-- localStorage -->
  <rect x="60" y="120" width="120" height="50" rx="6" fill="#FFFFFF" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="120" y="142" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#1a1a1a" font-weight="bold">localStorage</text>
  <text x="120" y="158" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#888">5-10 MB, persistent</text>

  <!-- sessionStorage -->
  <rect x="200" y="120" width="120" height="50" rx="6" fill="#FFFFFF" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="260" y="142" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#1a1a1a" font-weight="bold">sessionStorage</text>
  <text x="260" y="158" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#888">Tab-scoped, volatile</text>

  <!-- IndexedDB -->
  <rect x="60" y="185" width="120" height="50" rx="6" fill="#FFFFFF" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="120" y="207" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#1a1a1a" font-weight="bold">IndexedDB</text>
  <text x="120" y="223" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#888">Large, structured</text>

  <!-- Service Worker Cache -->
  <rect x="200" y="185" width="120" height="50" rx="6" fill="#FFFFFF" stroke="#4a90d9" stroke-width="1.5"/>
  <text x="260" y="207" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#1a1a1a" font-weight="bold">Service Worker</text>
  <text x="260" y="223" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#888">Offline-first</text>

  <!-- Latency -->
  <rect x="80" y="255" width="220" height="30" rx="6" fill="#E8F5E9" stroke="#27ae60" stroke-width="1.5"/>
  <text x="190" y="275" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#27ae60" font-weight="bold">Latency: ~0ms (no network hop)</text>

  <!-- Network boundary -->
  <line x1="380" y1="80" x2="380" y2="300" stroke="#c0392b" stroke-width="2" stroke-dasharray="8,4"/>
  <text x="380" y="315" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#c0392b" font-weight="bold">Network Boundary</text>

  <!-- Online flow -->
  <path d="M340,170 L420,120" stroke="#27ae60" stroke-width="2" fill="none" marker-end="url(#arr-cs2)"/>
  <text x="395" y="135" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#27ae60">Online</text>

  <!-- Offline flow -->
  <path d="M340,210 L420,250" stroke="#c0392b" stroke-width="2" fill="none" stroke-dasharray="4,3" marker-end="url(#arr-cs2)"/>
  <text x="395" y="245" font-family="system-ui, -apple-system, sans-serif" font-size="9" fill="#c0392b">Offline</text>

  <!-- API Server -->
  <rect x="430" y="90" width="140" height="60" rx="8" fill="#E8F4FD" stroke="#2980b9" stroke-width="2"/>
  <text x="500" y="118" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="14" fill="#1a1a1a" font-weight="bold">API Server</text>
  <text x="500" y="138" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#2980b9">Fetch + Sync</text>

  <!-- Serve from local cache -->
  <rect x="430" y="230" width="160" height="55" rx="8" fill="#FFF3E0" stroke="#d4a017" stroke-width="2"/>
  <text x="510" y="255" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#d4a017" font-weight="bold">Serve from Local</text>
  <text x="510" y="272" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#d4a017">Stale but available</text>

  <!-- Example: Strava -->
  <rect x="620" y="90" width="140" height="100" rx="8" fill="#FAFAFA" stroke="#DDD" stroke-width="1.5"/>
  <text x="690" y="115" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#1a1a1a" font-weight="bold">Example: Strava</text>
  <text x="690" y="135" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#333333">Run data on device</text>
  <text x="690" y="150" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#333333">Works without network</text>
  <text x="690" y="165" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#333333">Syncs when online</text>
  <text x="690" y="180" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#27ae60">Reduces API calls</text>

  <!-- Tradeoffs -->
  <rect x="40" y="340" width="350" height="75" rx="8" fill="#E8F5E9" stroke="#27ae60" stroke-width="1.5"/>
  <text x="215" y="362" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#27ae60" font-weight="bold">Advantages</text>
  <text x="60" y="382" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#333333">- Zero latency (no network hop)</text>
  <text x="60" y="400" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#333333">- Works offline, reduces API calls</text>

  <rect x="410" y="340" width="350" height="75" rx="8" fill="#FFEBEE" stroke="#c0392b" stroke-width="1.5"/>
  <text x="585" y="362" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#c0392b" font-weight="bold">Disadvantages</text>
  <text x="430" y="382" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#333333">- Limited backend control over invalidation</text>
  <text x="430" y="400" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#333333">- Stale data risk, storage limits</text>

  <!-- Bottom note -->
  <rect x="40" y="430" width="720" height="30" rx="8" fill="#fff8e8" stroke="#d4a017" stroke-width="1"/>
  <text x="400" y="450" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#333333" font-weight="bold">Mention as optimization layer. Limited backend control makes it secondary to server-side caching.</text>

  <!-- Watermark -->
  <text x="778" y="472" text-anchor="end" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#1a1a1a" opacity="0.22">systemdesignlaws.xyz</text>
</svg>