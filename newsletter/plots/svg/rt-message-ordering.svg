<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#333333"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c0392b"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#27ae60"/>
    </marker>
  </defs>
  <rect width="800" height="460" fill="#ffffff"/>

  <!-- Title -->
  <text x="400" y="34" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Message Ordering Problem</text>
  <text x="400" y="54" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#555555" text-anchor="middle">Multiple servers = multiple network paths = out-of-order delivery</text>

  <!-- Problem section -->
  <text x="400" y="80" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#c0392b" text-anchor="middle">Problem: Two Messages, Two Servers</text>

  <!-- S1 -->
  <rect x="40" y="100" width="100" height="44" rx="6" fill="#e8f4fd" stroke="#4a90d9" stroke-width="2"/>
  <text x="90" y="126" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Server S1</text>

  <!-- S2 -->
  <rect x="40" y="175" width="100" height="44" rx="6" fill="#e8f4fd" stroke="#4a90d9" stroke-width="2"/>
  <text x="90" y="201" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Server S2</text>

  <!-- Msg A (via S1 at t=1ms) -->
  <rect x="165" y="105" width="130" height="32" rx="5" fill="#fdf8e8" stroke="#d4a017" stroke-width="1.5"/>
  <text x="230" y="120" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#1a1a1a" text-anchor="middle" font-weight="bold">Msg A  t=1ms</text>
  <text x="230" y="133" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#555555" text-anchor="middle">"Hello"</text>

  <!-- Msg B (via S2 at t=2ms) -->
  <rect x="165" y="180" width="130" height="32" rx="5" fill="#fdf8e8" stroke="#d4a017" stroke-width="1.5"/>
  <text x="230" y="195" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#1a1a1a" text-anchor="middle" font-weight="bold">Msg B  t=2ms</text>
  <text x="230" y="208" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#555555" text-anchor="middle">"World"</text>

  <!-- Network paths (squiggly routes) -->
  <path d="M 295 121 Q 340 90 380 145" fill="none" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="5,3"/>
  <path d="M 295 196 Q 360 240 380 155" fill="none" stroke="#c0392b" stroke-width="1.5" stroke-dasharray="5,3"/>

  <!-- Network cloud label -->
  <text x="340" y="220" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#c0392b" text-anchor="middle">Different</text>
  <text x="340" y="236" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#c0392b" text-anchor="middle">network</text>
  <text x="340" y="252" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#c0392b" text-anchor="middle">paths</text>

  <!-- Client receives out of order -->
  <rect x="390" y="95" width="120" height="90" rx="6" fill="#fde8e8" stroke="#c0392b" stroke-width="2"/>
  <text x="450" y="115" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#c0392b" text-anchor="middle">Client sees:</text>
  <text x="450" y="133" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#c0392b" text-anchor="middle">Msg B first!</text>
  <text x="450" y="150" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#333333" text-anchor="middle">"World"</text>
  <text x="450" y="167" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#333333" text-anchor="middle">"Hello" (late)</text>

  <!-- Solutions section -->
  <line x1="30" y1="258" x2="770" y2="258" stroke="#dddddd" stroke-width="1.5"/>
  <text x="400" y="278" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="bold" fill="#27ae60" text-anchor="middle">Solutions</text>

  <!-- Solution 1: Logical timestamps -->
  <rect x="30" y="292" width="220" height="110" rx="8" fill="#e8fde8" stroke="#4ab54a" stroke-width="1.5"/>
  <text x="140" y="313" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Logical Timestamps</text>
  <text x="45" y="333" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#333333">Each msg has seq number.</text>
  <text x="45" y="350" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#333333">Client buffers out-of-order.</text>
  <text x="45" y="367" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#333333">Reorders by seq before</text>
  <text x="45" y="384" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#333333">displaying.</text>
  <text x="45" y="397" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#27ae60">Used by: most chat apps</text>

  <!-- Solution 2: Vector clocks -->
  <rect x="270" y="292" width="220" height="110" rx="8" fill="#e8fde8" stroke="#4ab54a" stroke-width="1.5"/>
  <text x="380" y="313" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Vector Clocks</text>
  <text x="285" y="333" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#333333">Track causality across</text>
  <text x="285" y="350" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#333333">distributed nodes.</text>
  <text x="285" y="367" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#333333">Detect concurrent vs</text>
  <text x="285" y="384" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#333333">causally related events.</text>
  <text x="285" y="397" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#27ae60">Used by: DynamoDB, Riak</text>

  <!-- Solution 3: Single partition -->
  <rect x="510" y="292" width="260" height="110" rx="8" fill="#e8fde8" stroke="#4ab54a" stroke-width="1.5"/>
  <text x="640" y="313" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Single Partition (Kafka)</text>
  <text x="525" y="333" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#333333">Route by conversation_id</text>
  <text x="525" y="350" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#333333">to one Kafka partition.</text>
  <text x="525" y="367" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#333333">Strict ordering within</text>
  <text x="525" y="384" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#333333">partition guaranteed.</text>
  <text x="525" y="397" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#27ae60">Used by: Slack, Messenger</text>

  <!-- Note -->
  <rect x="30" y="418" width="740" height="32" rx="6" fill="#fff8e8" stroke="#d4a017" stroke-width="1"/>
  <text x="400" y="438" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#555555" text-anchor="middle">Interview shortcut: "Route conversation X always to the same Kafka partition — strict ordering guaranteed within the partition."</text>
</svg>
