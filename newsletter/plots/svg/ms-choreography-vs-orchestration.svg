<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420">
<rect width="900" height="420" fill="#FFFFFF"/>

<text x="450" y="30" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="20" font-weight="bold" fill="#1B1B1F">Choreography vs Orchestration</text>
<text x="225" y="65" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="16" font-weight="bold" fill="#1B1B1F">Choreography (Event-Driven)</text>
<rect x="50" y="80" width="120" height="40" rx="6" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
<text x="110" y="105" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Payment Svc</text>
<rect x="50" y="140" width="120" height="40" rx="6" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
<text x="110" y="165" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Inventory Svc</text>
<rect x="50" y="200" width="120" height="40" rx="6" fill="#F3E5F5" stroke="#1B1B1F" stroke-width="2"/>
<text x="110" y="225" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Shipping Svc</text>
<rect x="220" y="130" width="130" height="50" rx="8" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
<text x="285" y="150" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#1B1B1F">Event Bus</text>
<text x="285" y="168" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">Kafka / SQS</text>
<line x1="170" y1="100" x2="220" y2="145" stroke="#1B1B1F" stroke-width="1.5"/>
<line x1="170" y1="160" x2="220" y2="155" stroke="#1B1B1F" stroke-width="1.5"/>
<line x1="170" y1="220" x2="220" y2="165" stroke="#1B1B1F" stroke-width="1.5"/>
<text x="225" y="275" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Services emit and react to events</text>
<text x="225" y="290" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">No central coordinator</text>
<line x1="450" y1="80" x2="450" y2="310" stroke="#1B1B1F" stroke-width="1" stroke-dasharray="4,4"/>
<text x="675" y="65" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="16" font-weight="bold" fill="#1B1B1F">Orchestration (Central Coordinator)</text>
<rect x="610" y="80" width="130" height="50" rx="8" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
<text x="675" y="100" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" font-weight="bold" fill="#1B1B1F">Orchestrator</text>
<text x="675" y="118" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#1B1B1F">Temporal / Step Fn</text>
<rect x="500" y="160" width="110" height="40" rx="6" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
<text x="555" y="185" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Payment</text>
<rect x="620" y="160" width="110" height="40" rx="6" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
<text x="675" y="185" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Inventory</text>
<rect x="740" y="160" width="110" height="40" rx="6" fill="#F3E5F5" stroke="#1B1B1F" stroke-width="2"/>
<text x="795" y="185" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Shipping</text>
<line x1="640" y1="130" x2="555" y2="160" stroke="#1B1B1F" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="675" y1="130" x2="675" y2="160" stroke="#1B1B1F" stroke-width="1.5" marker-end="url(#arr)"/>
<line x1="710" y1="130" x2="795" y2="160" stroke="#1B1B1F" stroke-width="1.5" marker-end="url(#arr)"/>
<text x="675" y="275" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Central coordinator directs each step</text>
<text x="675" y="290" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Easier to reason about, single view</text>
<rect x="100" y="330" width="700" height="45" rx="8" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
<text x="450" y="357" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Interview default: Orchestration (Temporal). Choreography for simple, loosely coupled flows.</text>
<defs><marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto"><path d="M 0 0 L 10 5 L 0 10 z" fill="#1B1B1F"/></marker></defs>
<text x="878" y="412" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.22">systemdesignlaws.xyz</text>
</svg>