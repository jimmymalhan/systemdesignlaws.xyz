<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" style="background:#FFFFFF">
  <text x="450" y="32" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="22" fill="#1B1B1F" font-weight="bold">MVCC: Multi-Version Concurrency Control</text>

  <!-- Database storage -->
  <rect x="30" y="55" width="840" height="145" rx="6" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
  <text x="450" y="78" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="15" fill="#1B1B1F" font-weight="bold">Database keeps multiple row versions</text>

  <!-- Version 1 -->
  <rect x="60" y="95" width="235" height="90" rx="6" fill="#FFFFFF" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="178" y="115" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F" font-weight="bold">Version 1 (xmin=100)</text>
  <text x="178" y="135" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">seats = 5</text>
  <text x="178" y="152" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#888">Created by txn 100</text>
  <text x="178" y="175" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#888">Visible to txns before 200</text>

  <!-- Version 2 -->
  <rect x="330" y="95" width="235" height="90" rx="6" fill="#FFFFFF" stroke="#1B1B1F" stroke-width="1.5"/>
  <text x="448" y="115" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#1B1B1F" font-weight="bold">Version 2 (xmin=200)</text>
  <text x="448" y="135" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">seats = 3</text>
  <text x="448" y="152" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#888">Created by txn 200</text>
  <text x="448" y="175" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#888">Visible to txns 200-299</text>

  <!-- Version 3 -->
  <rect x="600" y="95" width="245" height="90" rx="6" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="723" y="115" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#2E7D32" font-weight="bold">Version 3 (xmin=300)</text>
  <text x="723" y="135" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#2E7D32">seats = 1</text>
  <text x="723" y="152" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#2E7D32">Created by txn 300</text>
  <text x="723" y="175" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#2E7D32">Current version</text>

  <!-- How it works -->
  <text x="450" y="225" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="15" fill="#1B1B1F" font-weight="bold">How MVCC Serves Different Transactions</text>

  <!-- Reader -->
  <rect x="30" y="245" width="260" height="80" rx="6" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1.5"/>
  <text x="160" y="268" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#2E7D32" font-weight="bold">Reader (txn 250)</text>
  <text x="160" y="288" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Sees Version 2 (seats=3)</text>
  <text x="160" y="306" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#2E7D32">Snapshot from txn start time</text>
  <text x="160" y="320" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#2E7D32">Does NOT block writers</text>

  <!-- Writer -->
  <rect x="320" y="245" width="260" height="80" rx="6" fill="#FFF3E0" stroke="#E65100" stroke-width="1.5"/>
  <text x="450" y="268" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#E65100" font-weight="bold">Writer (txn 350)</text>
  <text x="450" y="288" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Creates Version 4 (seats=0)</text>
  <text x="450" y="306" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#E65100">New version, old stays for readers</text>
  <text x="450" y="320" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#E65100">Does NOT block readers</text>

  <!-- Vacuum -->
  <rect x="610" y="245" width="260" height="80" rx="6" fill="#F3E5F5" stroke="#7B1FA2" stroke-width="1.5"/>
  <text x="740" y="268" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#7B1FA2" font-weight="bold">Vacuum / Cleanup</text>
  <text x="740" y="288" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F">Removes old versions</text>
  <text x="740" y="306" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#7B1FA2">When no txn needs them</text>
  <text x="740" y="320" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#7B1FA2">PostgreSQL: VACUUM, MySQL: purge</text>

  <!-- Key insight -->
  <rect x="60" y="345" width="780" height="55" rx="6" fill="#E8F4FD" stroke="#1565C0" stroke-width="1.5"/>
  <text x="450" y="367" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1565C0" font-weight="bold">Readers never block writers, writers never block readers</text>
  <text x="450" y="388" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1565C0">This is how PostgreSQL and MySQL achieve high concurrency. Only writer-writer conflicts need locks.</text>

  <text x="878" y="412" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.22">systemdesignlaws.xyz</text>
</svg>