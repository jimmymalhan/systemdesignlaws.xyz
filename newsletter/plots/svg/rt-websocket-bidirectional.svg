<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 440">
  <defs>
    <marker id="arrow-right" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#2980b9"/>
    </marker>
    <marker id="arrow-left" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#c0392b"/>
    </marker>
  </defs>
  <rect width="800" height="440" fill="#ffffff"/>

  <!-- Title -->
  <text x="400" y="34" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="bold" fill="#1a1a1a" text-anchor="middle">WebSocket Full-Duplex Communication</text>
  <text x="400" y="54" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#555555" text-anchor="middle">Both sides send independently — no waiting for request/response cycle</text>

  <!-- Client box -->
  <rect x="40" y="75" width="200" height="280" rx="10" fill="#e8f4fd" stroke="#4a90d9" stroke-width="2"/>
  <text x="140" y="102" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Client</text>
  <line x1="40" y1="112" x2="240" y2="112" stroke="#4a90d9" stroke-width="1"/>
  <text x="140" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#2980b9" text-anchor="middle">Sends:</text>
  <text x="140" y="150" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#333333" text-anchor="middle">typing indicator</text>
  <text x="140" y="170" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#333333" text-anchor="middle">send message</text>
  <text x="140" y="190" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#333333" text-anchor="middle">mark as read</text>
  <text x="140" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#333333" text-anchor="middle">join channel</text>
  <text x="140" y="248" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#c0392b" text-anchor="middle">Receives:</text>
  <text x="140" y="268" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#333333" text-anchor="middle">new message from alice</text>
  <text x="140" y="288" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#333333" text-anchor="middle">read receipt</text>
  <text x="140" y="308" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#333333" text-anchor="middle">user joined event</text>
  <text x="140" y="328" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#333333" text-anchor="middle">presence update</text>

  <!-- Server box -->
  <rect x="560" y="75" width="200" height="280" rx="10" fill="#e8fde8" stroke="#4ab54a" stroke-width="2"/>
  <text x="660" y="102" font-family="system-ui, -apple-system, sans-serif" font-size="16" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Server</text>
  <line x1="560" y1="112" x2="760" y2="112" stroke="#4ab54a" stroke-width="1"/>
  <text x="660" y="130" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#c0392b" text-anchor="middle">Receives:</text>
  <text x="660" y="150" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#333333" text-anchor="middle">typing indicator</text>
  <text x="660" y="170" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#333333" text-anchor="middle">send message</text>
  <text x="660" y="190" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#333333" text-anchor="middle">mark as read</text>
  <text x="660" y="210" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#333333" text-anchor="middle">join channel</text>
  <text x="660" y="248" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#2980b9" text-anchor="middle">Sends:</text>
  <text x="660" y="268" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#333333" text-anchor="middle">new message from alice</text>
  <text x="660" y="288" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#333333" text-anchor="middle">read receipt</text>
  <text x="660" y="308" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#333333" text-anchor="middle">user joined event</text>
  <text x="660" y="328" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#333333" text-anchor="middle">presence update</text>

  <!-- Center channel -->
  <rect x="270" y="100" width="260" height="240" rx="8" fill="#f9f4ff" stroke="#8e44ad" stroke-width="2"/>
  <text x="400" y="125" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#8e44ad" text-anchor="middle">Single Persistent</text>
  <text x="400" y="143" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="bold" fill="#8e44ad" text-anchor="middle">TCP Connection</text>
  <text x="400" y="165" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#555555" text-anchor="middle">ws://chat.example.com</text>

  <!-- Bidirectional arrows -->
  <line x1="310" y1="190" x2="370" y2="190" stroke="#2980b9" stroke-width="2" marker-end="url(#arrow-right)"/>
  <text x="340" y="182" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#2980b9" text-anchor="middle">Client</text>
  <text x="340" y="203" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#2980b9" text-anchor="middle">frames</text>

  <line x1="430" y1="220" x2="490" y2="220" stroke="#c0392b" stroke-width="2" marker-end="url(#arrow-left)"/>
  <text x="460" y="212" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#c0392b" text-anchor="middle">Server</text>
  <text x="460" y="233" font-family="system-ui, -apple-system, sans-serif" font-size="10" fill="#c0392b" text-anchor="middle">frames</text>

  <!-- Full duplex note -->
  <text x="400" y="265" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#8e44ad" text-anchor="middle" font-weight="bold">Full duplex:</text>
  <text x="400" y="283" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#555555" text-anchor="middle">Both sides can send</text>
  <text x="400" y="299" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#555555" text-anchor="middle">at the same time</text>
  <text x="400" y="319" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#555555" text-anchor="middle">No polling needed</text>

  <!-- Connection arrows -->
  <line x1="240" y1="215" x2="270" y2="215" stroke="#8e44ad" stroke-width="2.5" marker-end="url(#arrow-right)"/>
  <line x1="530" y1="215" x2="560" y2="215" stroke="#8e44ad" stroke-width="2.5" marker-end="url(#arrow-left)"/>

  <!-- Tradeoffs -->
  <rect x="40" y="375" width="720" height="52" rx="8" fill="#fff8e8" stroke="#d4a017" stroke-width="1.5"/>
  <text x="400" y="393" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="bold" fill="#1a1a1a" text-anchor="middle">Interview Point: When to use WebSocket vs SSE</text>
  <text x="400" y="410" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#555555" text-anchor="middle">Use WebSocket when client MUST send messages (chat, games, collaborative editing).</text>
  <text x="400" y="424" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#555555" text-anchor="middle">Use SSE when server-to-client only (live scores, notifications, feeds) — simpler infrastructure.</text>
</svg>
