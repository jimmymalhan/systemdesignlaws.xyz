  <line x1="230" y1="110" x2="320" y2="110" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="680" y="80" width="180" height="50" rx="6" fill="#E8F5E9" stroke="#1B1B1F" stroke-width="2"/>
  <text x="770.0" y="102.0" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F" font-weight="bold">Accepted</text>
  <text x="770.0" y="120.0" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#555">10K/sec</text>
  <line x1="580" y1="100" x2="680" y2="100" stroke="#1B1B1F" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="680" y="160" width="180" height="50" rx="6" fill="#FFEBEE" stroke="#1B1B1F" stroke-width="2"/>
  <text x="770.0" y="182.0" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F" font-weight="bold">Dropped</text>
  <text x="770.0" y="200.0" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#555">5K/sec</text>
