<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 420" style="background:#FFFFFF">
  <defs>
    <marker id="arr-mu" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0.5 L9,3.5 L0,6.5" fill="#1B1B1F" stroke="#1B1B1F" stroke-width="1"/>
    </marker>
    <marker id="arr-mu-g" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <path d="M0,0.5 L9,3.5 L0,6.5" fill="#2E7D32" stroke="#2E7D32" stroke-width="1"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="450" y="32" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="22" fill="#1B1B1F" font-weight="bold">Multipart Upload: Large File Strategy</text>

  <!-- Original file -->
  <rect x="30" y="70" width="160" height="120" rx="6" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
  <text x="110" y="95" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="14" fill="#1B1B1F" font-weight="bold">Original File</text>
  <text x="110" y="115" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#666">5 GB video</text>

  <!-- Chunk arrows -->
  <rect x="50" y="130" width="120" height="15" rx="3" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1"/>
  <text x="110" y="142" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="9" fill="#1B1B1F">Chunk 1 (100MB)</text>
  <rect x="50" y="147" width="120" height="15" rx="3" fill="#FFF3E0" stroke="#E65100" stroke-width="1"/>
  <text x="110" y="159" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="9" fill="#1B1B1F">Chunk 2 (100MB)</text>
  <rect x="50" y="164" width="120" height="15" rx="3" fill="#E8F4FD" stroke="#1565C0" stroke-width="1"/>
  <text x="110" y="176" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="9" fill="#1B1B1F">Chunk 3...50</text>

  <!-- Step 1: Initiate -->
  <rect x="240" y="65" width="180" height="50" rx="6" fill="#E8F4FD" stroke="#1B1B1F" stroke-width="2"/>
  <text x="260" y="85" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1565C0" font-weight="bold">Step 1</text>
  <text x="260" y="102" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Initiate multipart upload</text>
  <path d="M190,90 L236,90" stroke="#1B1B1F" stroke-width="2" fill="none" marker-end="url(#arr-mu)"/>

  <!-- Step 2: Upload chunks -->
  <rect x="240" y="130" width="180" height="65" rx="6" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
  <text x="260" y="150" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#2E7D32" font-weight="bold">Step 2</text>
  <text x="260" y="167" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Upload each chunk</text>
  <text x="260" y="184" font-family="Virgil, Segoe UI, sans-serif" font-size="10" fill="#666">Each gets its own ETag</text>
  <path d="M190,160 L236,160" stroke="#2E7D32" stroke-width="2" fill="none" marker-end="url(#arr-mu-g)"/>

  <!-- Step 3: Complete -->
  <rect x="240" y="210" width="180" height="50" rx="6" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
  <text x="260" y="230" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#E65100" font-weight="bold">Step 3</text>
  <text x="260" y="247" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">Complete (send all ETags)</text>

  <!-- Arrows to S3 -->
  <path d="M420,90 L548,90" stroke="#1B1B1F" stroke-width="2" fill="none" marker-end="url(#arr-mu)"/>
  <path d="M420,160 L548,160" stroke="#2E7D32" stroke-width="2" fill="none" marker-end="url(#arr-mu-g)"/>
  <path d="M420,235 L548,235" stroke="#1B1B1F" stroke-width="2" fill="none" marker-end="url(#arr-mu)"/>

  <!-- S3 -->
  <rect x="552" y="70" width="170" height="210" rx="6" fill="#FFF3E0" stroke="#1B1B1F" stroke-width="2"/>
  <text x="637" y="100" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="16" fill="#1B1B1F" font-weight="bold">S3</text>
  <text x="637" y="125" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#666">Stores each part</text>
  <text x="637" y="145" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#666">independently</text>

  <rect x="572" y="162" width="130" height="18" rx="3" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1"/>
  <text x="637" y="175" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="9" fill="#1B1B1F">Part 1: ETag-abc</text>
  <rect x="572" y="183" width="130" height="18" rx="3" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1"/>
  <text x="637" y="196" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="9" fill="#1B1B1F">Part 2: ETag-def</text>
  <rect x="572" y="204" width="130" height="18" rx="3" fill="#E8F5E9" stroke="#2E7D32" stroke-width="1"/>
  <text x="637" y="217" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="9" fill="#1B1B1F">Part 3...50</text>

  <!-- Assembled result -->
  <path d="M637,280 L637,310" stroke="#2E7D32" stroke-width="2" fill="none" marker-end="url(#arr-mu-g)"/>
  <rect x="552" y="314" width="170" height="50" rx="6" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
  <text x="637" y="336" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="13" fill="#2E7D32" font-weight="bold">Assembled Object</text>
  <text x="637" y="354" text-anchor="middle" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#666">5GB complete file</text>

  <!-- Key facts -->
  <rect x="30" y="310" width="240" height="85" rx="6" fill="#FAFAFA" stroke="#DDD" stroke-width="1"/>
  <text x="50" y="332" font-family="Virgil, Segoe UI, sans-serif" font-size="12" fill="#1B1B1F" font-weight="bold">Key Details</text>
  <text x="50" y="350" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">- Min part size: 5MB</text>
  <text x="50" y="366" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">- Max parts: 10,000</text>
  <text x="50" y="382" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F">- Max object: 5TB on S3</text>

  <!-- Watermark -->
  <text x="878" y="412" text-anchor="end" font-family="Virgil, Segoe UI, sans-serif" font-size="11" fill="#1B1B1F" opacity="0.22">systemdesignlaws.xyz</text>
</svg>